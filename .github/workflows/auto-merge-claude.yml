name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    name: Merge to develop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure develop and qualidade branches exist
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin

          if ! git ls-remote --exit-code origin develop; then
            echo "Creating develop branch from main..."
            git checkout -b develop origin/main
            git push origin develop
          else
            echo "Branch develop already exists."
          fi

          if ! git ls-remote --exit-code origin qualidade; then
            echo "Creating qualidade branch from main..."
            git checkout -b qualidade origin/main
            git push origin qualidade
          else
            echo "Branch qualidade already exists."
          fi

      - name: Query DB via REST API and save result
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          SUPABASE_URL="https://dakleqewbwbryuchlrzm.supabase.co"
          SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRha2xlcWV3Yndicnl1Y2hscnptIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjQ4MzgxNywiZXhwIjoyMDg4MDU5ODE3fQ.83h_4hueK3-znXpjy35TZJWJntcyI2X-hopw0QHQSts"
          mkdir -p data
          echo "--- produtos ---"
          curl -s "$SUPABASE_URL/rest/v1/produtos?select=id,nome,categoria&order=nome" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -o data/produtos.json
          cat data/produtos.json | head -30
          echo "--- receitas ---"
          curl -s "$SUPABASE_URL/rest/v1/receitas?select=*&order=produto_id" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -o data/receitas.json
          cat data/receitas.json | head -30
          echo "--- snapshot ---"
          echo "{\"produtos\": $(cat data/produtos.json), \"receitas\": $(cat data/receitas.json)}" > data/db-result.json
          git add data/produtos.json data/receitas.json data/db-result.json
          git diff --staged --quiet || (git commit -m "chore: db snapshot [skip ci]" && git push origin "$BRANCH")

      - name: Merge branch into develop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Try direct git merge into develop
          git fetch origin develop
          git checkout develop
          git merge --no-ff "origin/$BRANCH" -m "chore: merge $BRANCH into develop"
          if git push origin develop; then
            echo "Merged into develop successfully."
            exit 0
          fi

          echo "Direct push to develop failed. Falling back to PR..."
          git checkout "$BRANCH"

          PR_STATE=$(gh pr list --head "$BRANCH" --base develop --json state --jq '.[0].state' 2>/dev/null)
          PR_URL=$(gh pr list --head "$BRANCH" --base develop --json url --jq '.[0].url' 2>/dev/null)

          echo "PR state: $PR_STATE | PR URL: $PR_URL"

          if [ "$PR_STATE" = "MERGED" ]; then
            echo "PR already merged. Nothing to do."
            exit 0
          fi

          if [ "$PR_STATE" = "CLOSED" ] || [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "chore: merge $BRANCH into develop" \
              --body "Auto-merge triggered by push to \`$BRANCH\`.")
            echo "PR created: $PR_URL"
          else
            echo "Using existing open PR: $PR_URL"
          fi

          gh pr merge "$PR_URL" \
            --merge \
            --admin \
            --delete-branch=false

      # Não promover develop → main aqui: isso fazia qualquer alteração em claude/** ir logo a produção.
      # Fluxo: merge em develop → deploy dev + promote-to-qualidade (push develop) → depois manual
      # «Promover qualidade → main» quando quiseres produção.
