name: Dedup Produtos

on:
  workflow_dispatch:

jobs:
  dedup:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres.dakleqewbwbryuchlrzm:LKB2DWbWbc60fZXh@aws-1-eu-west-1.pooler.supabase.com:6543/postgres' }}
      PGSSLMODE: require
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Dedup produtos
        run: |
          psql "$DATABASE_URL" <<'SQL'
            DELETE FROM turno_stock WHERE produto_id IN (
              SELECT id FROM produtos WHERE id NOT IN (SELECT MIN(id) FROM produtos GROUP BY nome)
            );
            DELETE FROM produtos WHERE id NOT IN (SELECT MIN(id) FROM produtos GROUP BY nome);
            DO $$ BEGIN
              IF NOT EXISTS (
                SELECT 1 FROM pg_constraint WHERE conname = 'produtos_nome_key'
              ) THEN
                ALTER TABLE produtos ADD CONSTRAINT produtos_nome_key UNIQUE (nome);
              END IF;
            END $$;
            SELECT COUNT(*) AS total_produtos FROM produtos;
SQL
          echo "Dedup concluído."
