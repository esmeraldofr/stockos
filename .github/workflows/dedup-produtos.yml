name: Dedup Produtos

on:
  workflow_dispatch:

jobs:
  dedup:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres.dakleqewbwbryuchlrzm:LKB2DWbWbc60fZXh@aws-1-eu-west-1.pooler.supabase.com:6543/postgres
      PGSSLMODE: require
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Apagar turno_stock duplicados
        run: psql "$DATABASE_URL" -c "DELETE FROM turno_stock WHERE produto_id IN (SELECT id FROM produtos WHERE id NOT IN (SELECT MIN(id) FROM produtos GROUP BY nome));"

      - name: Apagar produtos duplicados
        run: psql "$DATABASE_URL" -c "DELETE FROM produtos WHERE id NOT IN (SELECT MIN(id) FROM produtos GROUP BY nome);"

      - name: Adicionar constraint única
        run: psql "$DATABASE_URL" -c "CREATE UNIQUE INDEX IF NOT EXISTS produtos_nome_key ON produtos(nome);"

      - name: Verificar total
        run: psql "$DATABASE_URL" -c "SELECT COUNT(*) AS total_produtos FROM produtos;"
