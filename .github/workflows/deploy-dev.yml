name: Deploy — Desenvolvimento

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy to Dev (Vercel Preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      # Desenvolvimento nunca usa DATABASE_URL de produção — só BD dedicada (secret DATABASE_URL_DEV).
      - name: Exigir DATABASE_URL_DEV
        run: |
          if [ -z "${DATABASE_URL_DEV}" ]; then
            echo "::error::Define o secret DATABASE_URL_DEV (Supabase ou Postgres só de dev). Ambiente de desenvolvimento não pode ligar à BD de produção."
            exit 1
          fi
        env:
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}

      # Integração Git → Vercel não vê secrets do GitHub: Preview herdava DATABASE_URL de Production.
      - name: Sincronizar DATABASE_URL (Preview, branch develop) na Vercel
        run: |
          set -euo pipefail
          export VERCEL_PROJECT_ID="${VERCEL_PROJECT_ID_DEV}"
          export VERCEL_TEAM_ID="${VERCEL_ORG_ID}"
          export DATABASE_URL_SYNC_VALUE="$DATABASE_URL_DEV"
          export VERCEL_SYNC_TARGET=preview
          export VERCEL_GIT_BRANCH=develop
          python3 scripts/ci/vercel_sync_database_url.py
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_DEV: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}

      - name: Deploy to Vercel (Preview)
        run: |
          REF_DEV="${SUPABASE_PROJECT_REF_DEV:-}"
          npx vercel@latest --yes --no-clipboard --token "$VERCEL_TOKEN" \
            --build-env NODE_ENV=development \
            --build-env DATABASE_URL="$DATABASE_URL_DEV" \
            --env NODE_ENV=development \
            --env DATABASE_URL="$DATABASE_URL_DEV" \
            ${REF_DEV:+--env SUPABASE_PROJECT_REF="$REF_DEV"}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}
          SUPABASE_PROJECT_REF_DEV: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
