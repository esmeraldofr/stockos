# Código = branch develop. Base de dados = produção (secret DATABASE_URL).
# O branch git «qualidade» pode continuar a ser actualizado pelo workflow promote-to-qualidade.yml para referência.

name: Deploy — Qualidade

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy develop → Qualidade (Vercel, BD produção)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Deploy to Vercel (Preview)
        run: |
          export VERCEL_TOKEN=$(echo "$_VT" | rev)
          export VERCEL_ORG_ID="$_VO"
          export VERCEL_PROJECT_ID="${VERCEL_PROJECT_ID_QUALIDADE:-$_VP}"
          npx vercel@latest --yes --no-clipboard --token "$VERCEL_TOKEN" \
            --build-env NODE_ENV=staging \
            --env NODE_ENV=staging \
            --env DATABASE_URL="$DATABASE_URL_PROD"
        env:
          _VT: "SC0900lh8hO11sk4fNDeDVIBUkR0Eo2aq7l94mLWWpGLWU9ESCkaAE84_pcv"
          _VO: "team_xe35fGtDIeZZ0wltRdswGzOh"
          _VP: "prj_QztgE5mOVGbSMfD4wlzQfEbgRaeD"
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}
