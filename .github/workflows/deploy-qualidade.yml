# Código = branch qualidade (actualizado por promote-to-qualidade.yml a partir de develop).
# BD = instância Postgres de produção com utilizador só de leitura (DATABASE_URL_QUALIDADE).
# Não dispara em push a develop — evita sobrescrever o Preview de desenvolvimento no mesmo projecto Vercel.
#
# Secrets GitHub: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_QUALIDADE, DATABASE_URL_QUALIDADE

name: Deploy — Qualidade

on:
  push:
    branches:
      - qualidade
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy branch qualidade (Vercel Preview, BD produção read-only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: qualidade
          fetch-depth: 0

      - name: Exigir DATABASE_URL_QUALIDADE (utilizador só leitura)
        run: |
          if [ -z "${DATABASE_URL_QUALIDADE}" ]; then
            echo "::error::Define o secret DATABASE_URL_QUALIDADE com a connection string do user stockos_qualidade_readonly (ver supabase/readonly_qualidade_role.sql). Não uses a URL admin de produção."
            exit 1
          fi
        env:
          DATABASE_URL_QUALIDADE: ${{ secrets.DATABASE_URL_QUALIDADE }}

      - name: Sincronizar DATABASE_URL (Preview, branch qualidade) na Vercel
        run: |
          set -euo pipefail
          export VERCEL_PROJECT_ID="${VERCEL_PROJECT_ID_QUALIDADE}"
          export VERCEL_TEAM_ID="${VERCEL_ORG_ID}"
          export DATABASE_URL_SYNC_VALUE="$DATABASE_URL_QUALIDADE"
          export VERCEL_SYNC_TARGET=preview
          export VERCEL_GIT_BRANCH=qualidade
          export VERCEL_SYNC_EXTRA_KEY=STOCKOS_READ_ONLY
          export VERCEL_SYNC_EXTRA_VALUE=1
          python3 scripts/ci/vercel_sync_database_url.py
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_QUALIDADE: ${{ secrets.VERCEL_PROJECT_ID_QUALIDADE }}
          DATABASE_URL_QUALIDADE: ${{ secrets.DATABASE_URL_QUALIDADE }}

      - name: Deploy to Vercel (Preview)
        run: |
          npx vercel@latest --yes --no-clipboard --token "$VERCEL_TOKEN" \
            --build-env NODE_ENV=staging \
            --build-env DATABASE_URL="$DATABASE_URL_QUALIDADE" \
            --build-env STOCKOS_READ_ONLY=1 \
            --env NODE_ENV=staging \
            --env DATABASE_URL="$DATABASE_URL_QUALIDADE" \
            --env STOCKOS_READ_ONLY=1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_QUALIDADE }}
          DATABASE_URL_QUALIDADE: ${{ secrets.DATABASE_URL_QUALIDADE }}
