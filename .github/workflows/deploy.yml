name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy — Produção
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: DATABASE_URL (GitHub secret)
        id: db
        run: |
          if [ -n "${DATABASE_URL_PROD}" ]; then
            echo "has_url=1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Secret DATABASE_URL em falta: o job não corre sync/deploy por CLI (a Vercel pode continuar a fazer deploy pela integração Git). Define DATABASE_URL no repositório para sincronizar/enviar a URI na build."
            echo "has_url=0" >> "$GITHUB_OUTPUT"
          fi
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}

      - name: Detectar secrets Vercel (não usar secrets em if:)
        id: vercel
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=1" >> "$GITHUB_OUTPUT"
          else
            echo "ready=0" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Sincronizar DATABASE_URL (Production) na Vercel
        if: steps.vercel.outputs.ready == '1' && steps.db.outputs.has_url == '1'
        run: |
          set -euo pipefail
          export VERCEL_PROJECT_ID="${VERCEL_PROJECT_ID}"
          export VERCEL_TEAM_ID="${VERCEL_ORG_ID}"
          export DATABASE_URL_SYNC_VALUE="$DATABASE_URL_PROD"
          export VERCEL_SYNC_TARGET=production
          python3 scripts/ci/vercel_sync_database_url.py
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel
        if: steps.vercel.outputs.ready == '1' && steps.db.outputs.has_url == '1'
        run: |
          npx vercel@latest --prod --yes --no-clipboard --token "$VERCEL_TOKEN" \
            --build-env NODE_ENV=production \
            --build-env DATABASE_URL="$DATABASE_URL_PROD" \
            --env NODE_ENV=production \
            --env DATABASE_URL="$DATABASE_URL_PROD"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}
          GITHUB_REF: refs/heads/main

      - name: Aviso — deploy por CI sem secrets Vercel
        if: steps.vercel.outputs.ready != '1'
        run: |
          echo "::notice::Sync/deploy por CLI ignorados (VERCEL_TOKEN ou VERCEL_PROJECT_ID em falta). Configura os secrets no repositório ou mantém só o deploy automático da Vercel (integração Git)."
