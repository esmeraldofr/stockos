name: Promover qualidade → main (Produção)

on:
  workflow_dispatch:

jobs:
  promote:
    name: Merge qualidade into main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge qualidade into main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin qualidade main

          git checkout main
          git merge --no-ff origin/qualidade -m "chore: promote qualidade to main (production)"
          git push origin main

          echo "Promoted qualidade to main. Vercel will auto-deploy production via GitHub integration."
