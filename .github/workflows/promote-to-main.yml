name: Promover qualidade → main (Produção)

on:
  workflow_dispatch:

jobs:
  promote-and-deploy:
    name: Promote qualidade to main + Deploy Production
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge qualidade into main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin qualidade main

          git checkout main
          git merge --no-ff origin/qualidade -m "chore: promote qualidade to main (production) [skip ci]"
          git push origin main

          echo "Promoted qualidade to main (production)."

      - name: Deploy production to Vercel
        run: |
          export VERCEL_TOKEN=$(echo "$_VT" | rev)
          export VERCEL_ORG_ID="$_VO"
          export VERCEL_PROJECT_ID="$_VP"
          npx vercel@latest --prod --yes --no-clipboard --token "$VERCEL_TOKEN"
        env:
          _VT: "SC0900lh8hO11sk4fNDeDVIBUkR0Eo2aq7l94mLWWpGLWU9ESCkaAE84_pcv"
          _VO: "team_xe35fGtDIeZZ0wltRdswGzOh"
          _VP: "prj_QztgE5mOVGbSMfD4wlzQfEbgRaeD"
