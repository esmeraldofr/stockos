name: Setup Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup:
    name: Initialize Supabase Database
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres.dakleqewbwbryuchlrzm:LKB2DWbWbc60fZXh@aws-1-eu-west-1.pooler.supabase.com:6543/postgres' }}
      PGSSLMODE: require

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run SQL setup
        run: |
          echo "Running SQL (idempotent)..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/stockos_database.sql
          echo "Done."

      - name: Set admin password
        run: |
          psql "$DATABASE_URL" -c "
            UPDATE utilizadores SET senha_hash = encode(
              digest('admin123' || 'stockos-pwd-salt-2025', 'sha256'), 'hex'
            ) WHERE email = 'admin@stockos.ao';
          "
          echo "Admin password set."
