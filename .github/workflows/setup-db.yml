name: Setup Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup:
    name: Initialize Supabase Database
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres.dakleqewbwbryuchlrzm:LKB2DWbWbc60fZXh@aws-1-eu-west-1.pooler.supabase.com:6543/postgres' }}
      PGSSLMODE: require

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run SQL setup
        # Idempotente mas tolera erros esperados quando a BD real tem colunas de tipo
        # diferente do SQL template (ex.: produtos.id UUID vs INTEGER). Os passos
        # seguintes (pgcrypto, reset de admin) têm de correr mesmo assim.
        continue-on-error: true
        run: |
          echo "Running SQL (idempotent)..."
          psql "$DATABASE_URL" -f supabase/stockos_database.sql || echo "SQL setup completed with warnings/errors (continuing)."
          echo "Done."

      - name: Extensão pgcrypto (digest no passo seguinte)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Set admin password
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            UPDATE utilizadores SET senha_hash = encode(
              digest('admin123' || 'stockos-pwd-salt-2025', 'sha256'), 'hex'
            ), ativo = TRUE WHERE email = 'admin@stockos.ao';
          "
          echo "Admin password set."
