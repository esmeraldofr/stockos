# Replica a base de dados de PRODUÇÃO no projecto Supabase de DESENVOLVIMENTO.
# Só o schema **public** (tabelas da app). Incluir auth/storage no dump falha no restore em Supabase
# (must be owner of …). Os schemas evoluem com migrações; usa-se pg_dump + pg_restore, não cópia linha-a-linha.
#
# Pré-requisitos (GitHub → Settings → Secrets → Actions):
#   DATABASE_URL              — URI postgres de produção (já usada no deploy).
#   DATABASE_URL_DEV_ADMIN    — URI com user **postgres.<ref-dev>** do projecto dev (não só
#                               "postgres") se o host for *.pooler.supabase.com — senão o pooler
#                               responde "Tenant or user not found". O subdomínio aws-0 vs aws-1 varia — copia a URI em
#                               Connect → Session pooler (porta 5432). Ex.: aws-0-eu-west-1 para stockos-dev.
#                               Não uses stockos_app aqui: o restore precisa de permissões de DDL.
#
# Depois do primeiro sync, o secret DATABASE_URL_DEV (stockos_app) continua válido se o
# workflow voltar a conceder privilégios a stockos_app.

name: Sync DB produção → desenvolvimento

on:
  workflow_dispatch:

jobs:
  sync:
    name: pg_dump prod → pg_restore dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL 17 (igual ao Supabase)
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      # GitHub Actions por vezes resolve db.*.supabase.co para IPv6 (rota inacessível).
      # PGHOSTADDR força IPv4; PGHOST mantém o hostname para verificação TLS.
      - name: Validar secrets
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_DEV_ADMIN: ${{ secrets.DATABASE_URL_DEV_ADMIN }}
        run: |
          if [ -z "${DATABASE_URL_PROD}" ]; then
            echo "::error::Secret DATABASE_URL em falta."
            exit 1
          fi
          if [ -z "${DATABASE_URL_DEV_ADMIN}" ]; then
            echo "::error::Define DATABASE_URL_DEV_ADMIN — ver cabeçalho deste workflow (pooler: user postgres.<ref-dev>)."
            exit 1
          fi
          python3 <<'PY'
          import os, urllib.parse
          for name, key in [
              ("DATABASE_URL (prod)", "DATABASE_URL_PROD"),
              ("DATABASE_URL_DEV_ADMIN", "DATABASE_URL_DEV_ADMIN"),
          ]:
              raw = os.environ[key]
              u = urllib.parse.urlparse(raw)
              host = (u.hostname or "").lower()
              user = urllib.parse.unquote(u.username or "")
              if "pooler.supabase.com" in host and not user.startswith("postgres."):
                  print(f"::error::{name}: com host pooler Supabase o utilizador na URI deve ser postgres.<project_ref>, não só postgres.")
                  raise SystemExit(1)
          PY

      - name: Dump produção
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          eval "$(python3 scripts/ci/pg_env_from_url.py "$DATABASE_URL_PROD")"
          pg_dump --format=custom --no-owner --no-acl --schema=public --file=prod.dump
          ls -la prod.dump

      - name: Restore em desenvolvimento
        env:
          DATABASE_URL_DEV_ADMIN: ${{ secrets.DATABASE_URL_DEV_ADMIN }}
        run: |
          set -euo pipefail
          eval "$(python3 scripts/ci/pg_env_from_url.py "$DATABASE_URL_DEV_ADMIN")"
          set +e
          pg_restore \
            --clean \
            --if-exists \
            --no-owner \
            --no-acl \
            --schema=public \
            --jobs=2 \
            --dbname="$PGDATABASE" \
            prod.dump 2>&1 | tee pg_restore.log
          rc=${PIPESTATUS[0]}
          set -e
          if grep -q 'FATAL:' pg_restore.log; then
            echo "::error::pg_restore ligou mas o servidor recusou (ex.: pooler — user postgres.<ref> na URI)."
            exit 1
          fi
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "::error::pg_restore falhou com código $rc"
            exit "$rc"
          fi
          echo "pg_restore terminou (código $rc; 1 = avisos aceitáveis se não houver FATAL acima)"
          echo "A conceder privilégios a stockos_app na mesma ligação (evita 2.º login no pooler Supabase)."
          psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'stockos_app') THEN
              GRANT USAGE ON SCHEMA public TO stockos_app;
              GRANT ALL ON ALL TABLES IN SCHEMA public TO stockos_app;
              GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO stockos_app;
              ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO stockos_app;
              ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO stockos_app;
            END IF;
          END
          $$;
          SQL
