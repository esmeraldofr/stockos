  const elE = document.getElementById('entradas-section');
  const elS = document.getElementById('saidas-section');
  if (!elE || !elS) return;
  elE.innerHTML = '<span style="color:#64748b">A carregar...</span>';
  elS.innerHTML = '<span style="color:#64748b">A carregar...</span>';
  try {
    const [entradas, saidas] = await Promise.all([
      api('GET', `/turnos/${turnoId}/entradas`),
      api('GET', `/turnos/${turnoId}/saidas`)
    ]);
    renderEntradasSection(turnoId, stocks, canEdit, entradas);

  } catch (e) {
    const msg = `<div class="alert alert-error">${e.message}</div>`;
    elE.innerHTML = msg;

  }
}

      opts += `<optgroup label="${labels[cat] || cat}">`;
      items.forEach(s => { opts += `<option value="${s.produto_id}" data-medicao="${s.tipo_medicao || 'unidade'}">${s.produto_nome} (${medicaoSigla(s.tipo_medicao)})</option>`; });

    const formHtml = canEdit ? `
      <div class="entradas-form">
        <div class="entradas-tipo-toggle">
          <button id="e-tipo-entrada" class="tipo-btn tipo-btn-active-green" onclick="setTipo('entrada')">+ Entrada</button>
          <button id="e-tipo-tirar" class="tipo-btn" onclick="setTipo('tirar')">− Saída</button>
        </div>

        <input id="e-qty" type="number" min="0.001" step="any" placeholder="Qtd (un)" class="entradas-qty"/>
        <input id="e-preco" type="number" min="0" step="any" placeholder="Preço" class="entradas-qty" style="display:none"/>
        <input id="e-notas" type="text" placeholder="Notas (opcional)" class="entradas-notas"/>
        <button type="button" class="btn btn-success btn-sm" onclick="runAction(event, () => submitEntrada(${turnoId}))">Registar</button>
      </div>

      ? '<div style="color:#475569;font-size:13px;padding:8px 0">Nenhum registo neste turno.</div>'

            <th style="text-align:right">Preço</th>
            <th style="text-align:left">Nota</th>
          </tr></thead>
          <tbody>${entradas.map(e => {
            const dt = new Date(e.criado_em).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
            const tipoLabel = e.tipo === 'tirar'
              ? '<span style="color:#f87171;font-weight:600">− Saída</span>'
              : '<span style="color:#4ade80;font-weight:600">+ Entrada</span>';
            const origemLabel = e.origem === 'compra'
              ? '<span style="color:#fb923c">Compra</span>'
              : '<span style="color:#94a3b8">Armazém</span>';
            const precoLabel = e.origem === 'compra' && parseFloat(e.preco) > 0
              ? `<span style="color:#fbbf24">${fmt(e.preco)}</span>`
              : '—';
            return `<tr>
              <td style="color:#64748b;font-size:12px;white-space:nowrap">${dt}</td>
              <td style="font-size:12px">${tipoLabel}</td>

              <td style="font-size:13px">${e.produto_nome}</td>

}

async function submitEntrada(turnoId) {
  const pidRaw = document.getElementById('e-produto')?.value;
  const pid = prodIdKey(pidRaw);
  const qty    = parseFloat(document.getElementById('e-qty')?.value);
  const notas  = document.getElementById('e-notas')?.value.trim() || '';
  const tipo   = window._entradaTipo   || 'entrada';
  const origem = window._entradaOrigem || 'armazem';
  const preco  = parseFloat(document.getElementById('e-preco')?.value) || 0;
  const msg    = document.getElementById('entrada-form-msg');
  if (!pidRaw || !pid)  { if (msg) { msg.className='alert alert-error'; msg.textContent='Selecciona um produto.'; } return; }
  if (!qty || qty <= 0) { if (msg) { msg.className='alert alert-error'; msg.textContent='Quantidade inválida.'; } return; }
  try {
    await api('POST', `/turnos/${turnoId}/entradas`, { produto_id: pidRaw, tipo, origem, preco, quantidade: qty, notas });
    document.getElementById('e-produto').value = '';
    document.getElementById('e-qty').value = '';
    document.getElementById('e-notas').value = '';
    document.getElementById('e-preco').value = '';
    const novaEntrada = await api('GET', `/turnos/${turnoId}/entradas`);
    const soma = novaEntrada.filter((e) => prodIdKey(e.produto_id) === pid)
                            .reduce((s, e) => s + parseFloat(e.quantidade) * (e.tipo === 'tirar' ? -1 : 1), 0);
    const cell = document.getElementById(`entrada-${pid}`);
    if (cell) cell.textContent = fmtQtyInput(soma);
    if (!stockBuf[pid]) stockBuf[pid] = { encontrado:0, entrada:0, deixado:0, fechados:0 };
    stockBuf[pid].entrada = soma;
    updateStock(pidRaw, 'entrada', soma);
    const stocks = S.turnoData?.stock || [];
    await loadRegistosMovimentosSection(turnoId, stocks, true);
  } catch(e) {
    if (msg) { msg.className='alert alert-error'; msg.textContent=e.message; }
  }
}

  try {
    const totalDespesas = saidas.reduce((s, r) => s + parseFloat(r.valor), 0);

    const formHtml = canEdit ? `
      <div class="entradas-form">
        <input id="s-desc" type="text" placeholder="Descrição (ex: gasóleo, embalagens)" class="entradas-notas" style="flex:2"/>

      return `<tr>
        <td style="color:#64748b;font-size:12px;white-space:nowrap">${dt}</td>
        <td style="font-size:13px">${s.descricao}</td>
        <td style="text-align:right;font-weight:600;color:#f87171">${fmt(s.valor)}</td>
        <td style="color:#94a3b8;font-size:12px">${s.notas}</td>
      </tr>`;
    });

    const todasLinhas = [...comprasRows, ...despesasRows];

    const listaHtml = todasLinhas.length === 0
      ? '<div style="color:#475569;font-size:13px;padding:8px 0">Nenhuma saída registada neste turno.</div>'
      : `<div class="table-wrap"><table>
          <thead><tr>
            <th style="text-align:left">Hora</th>
            <th style="text-align:left">Descrição</th>
            <th style="text-align:right">Valor</th>
            <th style="text-align:left">Nota</th>
          </tr></thead>
          <tbody>
            ${todasLinhas.join('')}
            <tr style="font-weight:700;border-top:2px solid #334155">
              <td colspan="2" style="color:#94a3b8;font-size:12px;padding:6px 10px">Total saídas</td>
              <td style="text-align:right;color:#f87171">${fmt(total)}</td>
              <td></td>
            </tr>
          </tbody>
        </table></div>`;

    el.innerHTML = formHtml + listaHtml;
    // Actualizar campo saída na caixa
    const cSaida = document.getElementById('c-saida');
    if (cSaida) cSaida.value = total.toFixed(2);
    const elTG = document.getElementById('c-total-gerado');
    const elTF = document.getElementById('c-total-final');
    if (elTG && elTF) {
      const tpa   = parseFloat(document.getElementById('c-tpa')?.value)||0;
      const transf= parseFloat(document.getElementById('c-transf')?.value)||0;
      const din   = parseFloat(document.getElementById('c-din')?.value)||0;
      const tg    = tpa + transf + din;
      const tf    = tg - total;
      elTG.textContent = fmtKzOrEmpty(tg);
      elTF.textContent = fmtKzOrEmpty(tf);
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function loadEscalaTurno() {
  const el = document.getElementById('turno-escala-list');
  if (!el) return;
  el.innerHTML = '<span style="color:#64748b">A carregar...</span>';
  try {
    const turnoNome = S.turnoData?.nome;
    if (!turnoNome || !S.date) {
      el.innerHTML = '<span style="color:#64748b">Turno não selecionado.</span>';
      return;
    }
    const [escalaPack, equipaReal, pessoas, faltasReg] = await Promise.all([
      api('GET', `/escala/semana?data_inicio=${encodeURIComponent(S.date)}&data_fim=${encodeURIComponent(S.date)}`).catch(() => ({ semana: [], template: [] })),
      api('GET', `/turnos/${S.turnoData.id}/equipa-real`),
      api('GET', '/equipa/pessoas'),
      api('GET', `/turnos/${S.turnoData.id}/faltas`)
    ]);
    const rowsDia = escalaPack.semana || [];
    const rowsTemplate = escalaPack.template || [];
    const listaDia = rowsDia.filter(r => r.turno === turnoNome);
    const d = new Date(S.date + 'T12:00:00Z');
    const day = d.getUTCDay();
    const diaSemana = day === 0 ? 6 : day - 1; // 0=Seg ... 6=Dom
    const listaTpl = rowsTemplate.filter(r => Number(r.dia_semana) === diaSemana && r.turno === turnoNome);
    const lista = listaDia.length ? listaDia : listaTpl;
    const origem = listaDia.length ? 'escala do dia' : 'escala template';
    const canEdit = !!S.turnoCanEdit;
    const escaladosIds = new Set(lista.map(r => String(r.utilizador_id || '')).filter(Boolean));
    const reaisIds = new Set(equipaReal.map(r => String(r.utilizador_id || '')).filter(Boolean));
    const faltas = lista.filter(r => r.utilizador_id && !reaisIds.has(String(r.utilizador_id)));
    const coberturas = equipaReal.filter(r => r.utilizador_id && !escaladosIds.has(String(r.utilizador_id)));
    const motivoPorFalta = {};
    equipaReal.forEach(r => {
      if (r.cobrindo_utilizador_id && r.motivo_falta) motivoPorFalta[String(r.cobrindo_utilizador_id)] = r.motivo_falta;
    });
    faltasReg.forEach(f => {
      if (f.utilizador_id && f.motivo_falta) motivoPorFalta[String(f.utilizador_id)] = f.motivo_falta;
    });

    const info = `<div style="font-size:11px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">${origem}</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:12px">Horário: <strong style="color:#cbd5e1">${turnoHorarioLabel(turnoNome)}</strong></div>`;
    const escaladosHtml = lista.length
      ? lista.map((r, i) => {
        const a = r.area_trabalho != null && r.area_trabalho !== '' ? parseInt(r.area_trabalho, 10) : NaN;
        const areaLine = Number.isFinite(a) && a >= 1 && a <= 3
          ? `<div style="font-size:11px;color:#a78bfa;margin-top:3px">${areaTrabalhoAbbr(a)} — ${areaTrabalhoLabel(a)}</div>`
          : '';
        return `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;${i < lista.length - 1 ? 'border-bottom:1px solid #334155;' : ''}">
        <div>
          <div style="font-weight:600;color:#e2e8f0">${r.utilizador_nome || 'Sem nome'}</div>
          <div style="font-size:12px;color:#64748b">${(r.utilizador_role || 'operador').toUpperCase()}</div>
          ${areaLine}
        </div>
        ${r.notas ? `<div style="font-size:12px;color:#94a3b8;text-align:right;max-width:55%">${r.notas}</div>` : '<div style="font-size:12px;color:#475569">—</div>'}
      </div>`;
      }).join('')
      : '<span style="color:#64748b">Sem funcionários escalados para este turno.</span>';

    const reaisHtml = equipaReal.length
      ? equipaReal.map((r, i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;${i < equipaReal.length - 1 ? 'border-bottom:1px solid #334155;' : ''}">
        <div>
          <div style="font-weight:600;color:#e2e8f0">${r.utilizador_nome || 'Sem nome'}</div>
          <div style="font-size:12px;color:#64748b">${(r.utilizador_role || 'operador').toUpperCase()}</div>
          ${r.cobrindo_utilizador_nome ? `<div style="font-size:12px;color:#60a5fa;margin-top:2px">Cobrindo: ${r.cobrindo_utilizador_nome}</div>` : ''}
          ${r.motivo_falta ? `<div style="font-size:12px;color:#fbbf24;margin-top:2px">Motivo da falta: ${r.motivo_falta}</div>` : ''}
          ${r.hora_extra ? `<div style="font-size:12px;color:#fbbf24;margin-top:2px">Hora extra aplicada</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${r.notas ? `<div style="font-size:12px;color:#94a3b8;max-width:240px;text-align:right">${r.notas}</div>` : '<div style="font-size:12px;color:#475569">—</div>'}
          ${canEdit ? `<button type="button" class="btn btn-danger btn-sm" onclick="runAction(event, () => removeTurnoPresenca('${S.turnoData.id}','${encodeURIComponent(r.utilizador_id)}'))">Remover</button>` : ''}
        </div>
      </div>
    `).join('')
      : '<span style="color:#64748b">Nenhum funcionário registado como presente.</span>';

    const alertaHtml = `
      <div style="margin-top:10px;font-size:12px">
        <div style="color:${faltas.length ? '#fbbf24' : '#4ade80'}">${faltas.length ? `⚠ Faltas: ${faltas.map(f => {
          const motivo = motivoPorFalta[String(f.utilizador_id)];
          const nome = f.utilizador_nome || 'Sem nome';
          return motivo
            ? `${nome} (${motivo})`
            : `${nome}${canEdit ? ` <button type="button" class="btn btn-danger btn-sm" style="margin-left:6px" onclick="registarMotivoFalta(event, '${S.turnoData.id}','${encodeURIComponent(f.utilizador_id)}','${(nome||'').replace(/'/g, "\\'")}')">Registar motivo</button>` : ''}`;
        }).join(', ')}` : '✓ Sem faltas nos escalados'}</div>
        <div style="color:${coberturas.length ? '#60a5fa' : '#64748b'};margin-top:4px">${coberturas.length ? `↺ Coberturas: ${coberturas.map(c => c.utilizador_nome || 'Sem nome').join(', ')}` : 'Sem coberturas registadas'}</div>
      </div>`;

    const addForm = canEdit ? `
      <div class="card mt-16">
        <div class="card-title">➕ Registar quem trabalhou</div>
        <div id="turno-presenca-msg"></div>
        <div class="entradas-form">
          <select id="tp-user" class="entradas-select">
            <option value="">— Funcionário —</option>
            ${pessoas.map(p => `<option value="${p.id}">${p.nome} (${p.role})</option>`).join('')}
          </select>
          <select id="tp-cobrindo" class="entradas-select" style="display:none">
            <option value="">— Está cobrindo quem? —</option>
            ${lista.filter(r => r.utilizador_id).map(r => `<option value="${r.utilizador_id}">${r.utilizador_nome || r.utilizador_id}</option>`).join('')}
          </select>
          <input id="tp-motivo-falta" class="entradas-notas" type="text" placeholder="Motivo da falta" style="display:none"/>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8">
            <input id="tp-he" type="checkbox" style="width:14px;height:14px"/>
            Aplicar hora extra
          </label>
          <input id="tp-notas" class="entradas-notas" type="text" placeholder="Nota opcional (falta, cobertura, etc.)"/>
          <button type="button" class="btn btn-success btn-sm" onclick="runAction(event, () => addTurnoPresenca('${S.turnoData.id}'))">Registar</button>
        </div>
      </div>` : '';

    el.innerHTML = `
      ${info}
      <div class="card-title" style="margin-bottom:6px">📅 Escalados</div>
      ${escaladosHtml}
      <div class="card-title" style="margin:16px 0 6px">✅ Quem realmente trabalhou</div>
      ${reaisHtml}
      ${alertaHtml}
      ${addForm}
    `;
    if (canEdit) {
      const userSel = document.getElementById('tp-user');
      const cobSel = document.getElementById('tp-cobrindo');
      const motEl = document.getElementById('tp-motivo-falta');
      const heEl = document.getElementById('tp-he');
      const toggleExtra = () => {
        if (!userSel || !cobSel || !heEl || !motEl) return;
        const uid = userSel.value;
        const naoEscalado = !!uid && !escaladosIds.has(String(uid));
        cobSel.style.display = naoEscalado ? '' : 'none';
        motEl.style.display = naoEscalado ? '' : 'none';
        if (!naoEscalado) motEl.value = '';
      };
      if (userSel) userSel.onchange = toggleExtra;
      toggleExtra();
    }
    renderIrregularidadesTurno();
  } catch (e) {
    el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function addTurnoPresenca(turnoId) {
  const utilizador_id = val('tp-user');
  const cobrindo_utilizador_id = val('tp-cobrindo');
  const hora_extra = !!document.getElementById('tp-he')?.checked;
  const motivo_falta = val('tp-motivo-falta');
  const notas = val('tp-notas');
  if (!utilizador_id) return err('turno-presenca-msg', 'Seleciona um funcionário');
  const turnoNome = S.turnoData?.nome;
  const d = new Date(S.date + 'T12:00:00Z');
  const day = d.getUTCDay();
  const diaSemana = day === 0 ? 6 : day - 1;
  const template = await api('GET', '/escala/template');
  const escaladosIds = new Set(template.filter(r => Number(r.dia_semana) === diaSemana && r.turno === turnoNome).map(r => String(r.utilizador_id || '')).filter(Boolean));
  const naoEscalado = !escaladosIds.has(String(utilizador_id));
  if (naoEscalado && !cobrindo_utilizador_id) return err('turno-presenca-msg', 'Seleciona quem este funcionário está cobrindo');
  if (naoEscalado && !motivo_falta.trim()) return err('turno-presenca-msg', 'Regista o motivo da falta');
  if (naoEscalado && !hora_extra) return err('turno-presenca-msg', 'Confirma se deve aplicar pagamento de hora extra');
  try {
    await api('POST', `/turnos/${turnoId}/equipa-real`, { utilizador_id, cobrindo_utilizador_id: naoEscalado ? cobrindo_utilizador_id : null, hora_extra, motivo_falta: naoEscalado ? motivo_falta.trim() : '', notas });
    show('turno-presenca-msg', '');
    if (document.getElementById('tp-notas')) document.getElementById('tp-notas').value = '';
    await loadEscalaTurno();
  } catch (e) { err('turno-presenca-msg', e.message); }
}

async function removeTurnoPresenca(turnoId, utilizadorIdEncoded) {
  try {
    await api('DELETE', `/turnos/${turnoId}/equipa-real/${utilizadorIdEncoded}`);
    await loadEscalaTurno();
  } catch (e) { alert(e.message); }
}

async function registarMotivoFalta(ev, turnoId, utilizadorIdEncoded, nome) {
  const motivo = prompt(`Motivo da falta de ${nome}:`);
  if (!motivo || !motivo.trim()) return;
  await runAction(ev, async () => {
    try {
      await api('POST', `/turnos/${turnoId}/faltas`, {
        utilizador_id: decodeURIComponent(utilizadorIdEncoded),
        motivo_falta: motivo.trim()
      });
      await loadEscalaTurno();
    } catch (e) { alert(e.message); }
  });
}

async function submitSaida(turnoId) {
  const desc  = document.getElementById('s-desc')?.value.trim() || '';
  const valor = parseFloat(document.getElementById('s-valor')?.value);
  const notas = document.getElementById('s-notas')?.value.trim() || '';
  const msg   = document.getElementById('saida-form-msg');
  if (!desc)  { if (msg) { msg.className='alert alert-error'; msg.textContent='Descrição obrigatória.'; } return; }
  if (!valor || valor <= 0) { if (msg) { msg.className='alert alert-error'; msg.textContent='Valor inválido.'; } return; }
  try {
    await api('POST', `/turnos/${turnoId}/saidas`, { descricao: desc, valor, notas });
    document.getElementById('s-desc').value  = '';
    document.getElementById('s-valor').value = '';
    document.getElementById('s-notas').value = '';
    await loadRegistosMovimentosSection(turnoId, S.turnoData?.stock || [], true);
  } catch(e) {
    if (msg) { msg.className='alert alert-error'; msg.textContent=e.message; }
  }
}

async function loadHistorico() {
  const ini = val('h-inicio'), fim = val('h-fim');
  show('hist-content','<div class="text-center" style="padding:20px;color:#64748b"><div class="spinner"></div></div>');
  try {
    const rows = await api('GET', `/historico?inicio=${ini}&fim=${fim}`);
    if (!rows.length) { show('hist-content','<div class="alert alert-error">Sem dados neste período</div>'); return; }

    let sumVendas = 0, sumGerado = 0, sumFinal = 0;
    for (const r of rows) {
      sumVendas += parseFloat(r.total_vendas) || 0;
      sumGerado += parseFloat(r.total_gerado) || 0;
      sumFinal += parseFloat(r.total_final) || 0;
    }

    const days = [];
    let cur = null;
    for (const r of rows) {
      const d = String(r.data).slice(0, 10);
      if (!cur || cur.data !== d) {
        cur = { data: d, turnos: [] };
        days.push(cur);
      }
      cur.turnos.push(r);
    }

    const ordemTurno = ['manha', 'tarde', 'noite'];
    const rowsHtml = days
      .map((day) => {
        const d = day.data;
        const byNome = {};
        day.turnos.forEach((t) => {
          byNome[t.nome] = t;
        });
        let dayTv = 0;
        let dayTg = 0;
        let dayTf = 0;
        day.turnos.forEach((t) => {
          dayTv += parseFloat(t.total_vendas) || 0;
          dayTg += parseFloat(t.total_gerado) || 0;
          dayTf += parseFloat(t.total_final) || 0;
        });
        const turnosCols = ordemTurno
          .map((nome) => {
            const t = byNome[nome];
            if (!t) {
              return `
        <div style="padding:10px 8px;background:#0f172a;border-radius:8px;border:1px dashed #334155;min-height:120px;display:flex;align-items:center;justify-content:center">
          <span style="font-size:12px;color:#475569">${turnoLabel(nome)} · sem registo</span>
        </div>`;
            }
            const tv = parseFloat(t.total_vendas) || 0;
            const tg = parseFloat(t.total_gerado) || 0;
            const tf = parseFloat(t.total_final) || 0;
            const est = t.estado === 'fechado' ? 'Fechado' : 'Aberto';
            return `
        <div class="js-busy-click" style="cursor:pointer;padding:10px 8px;background:#1e293b;border-radius:8px;border:1px solid #334155;min-width:0"
          onclick="runAction(event, async () => { S.date='${d}'; S.turnoId='${t.turno_id}'; syncDatePickersAcrossPages(); await navigate('dia'); })">
          <div style="font-weight:700;color:#e2e8f0;font-size:13px;margin-bottom:6px;text-align:center">${turnoLabel(nome)}</div>
          <div style="font-size:10px;color:#64748b;text-align:center;margin-bottom:8px">${est}</div>
          <div style="font-size:11px;line-height:1.55;text-align:center">
            <div><span style="color:#64748b">Vendas</span> <span style="font-weight:700;color:#a5b4fc">${fmt(tv)}</span></div>
            <div><span style="color:#64748b">Gerado</span> <span style="font-weight:700;color:#fbbf24">${fmt(tg)}</span></div>
            <div><span style="color:#64748b">Final</span> <span style="font-weight:700;color:#4ade80">${fmt(tf)}</span></div>
          </div>
        </div>`;
          })
          .join('');
        const totalDiaCol = `
        <div class="js-busy-click" style="cursor:pointer;padding:10px 8px;background:#172554;border-radius:8px;border:1px solid #3b82f6;min-width:0"
          onclick="runAction(event, async () => { S.date='${d}'; S.turnoId=null; syncDatePickersAcrossPages(); await navigate('dia'); })">
          <div style="font-weight:700;color:#93c5fd;font-size:13px;margin-bottom:6px;text-align:center">Total do dia</div>
          <div style="font-size:10px;color:#64748b;text-align:center;margin-bottom:8px">soma dos turnos</div>
          <div style="font-size:11px;line-height:1.55;text-align:center">
            <div><span style="color:#64748b">Vendas</span> <span style="font-weight:700;color:#a5b4fc">${fmt(dayTv)}</span></div>
            <div><span style="color:#64748b">Gerado</span> <span style="font-weight:700;color:#fbbf24">${fmt(dayTg)}</span></div>
            <div><span style="color:#64748b">Final</span> <span style="font-weight:700;color:#4ade80">${fmt(dayTf)}</span></div>
          </div>
        </div>`;
        return `
      <div class="card" style="margin-bottom:12px">
        <div style="font-weight:600;font-size:15px;margin-bottom:2px">${dateLabelWithWeekday(d)}</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:10px">${d} · ${day.turnos.length} turno(s)</div>
        <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch">
          ${turnosCols}${totalDiaCol}
        </div>
      </div>`;
      })
      .join('');

    show('hist-content', `
      <div class="card" style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:12px">Somatório do período (todos os turnos)</div>
        <div style="display:grid;grid-template-columns:1fr;gap:10px;font-size:15px">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1e293b;border-radius:8px">
            <span style="color:#94a3b8">Total vendas</span>
            <span style="font-weight:700;color:#a5b4fc;font-size:1.1rem">${fmt(sumVendas)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1e293b;border-radius:8px">
            <span style="color:#94a3b8">Total gerado</span>
            <span style="font-weight:700;color:#fbbf24;font-size:1.1rem">${fmt(sumGerado)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1e293b;border-radius:8px">
            <span style="color:#94a3b8">Total final</span>
            <span style="font-weight:700;color:#4ade80;font-size:1.1rem">${fmt(sumFinal)}</span>
          </div>
        </div>
        <p style="margin:12px 0 0;font-size:12px;color:#64748b;line-height:1.45">Por dia: Manhã · Tarde · Noite e <strong style="color:#94a3b8">Total do dia</strong> (soma dos três). Clica num turno para esse turno; clica em Total do dia para o dia.</p>
      </div>
      ${rowsHtml}
    `);
  } catch(e) { show('hist-content',`<div class="alert alert-error">${e.message}</div>`); }
}

async function loadIrregularidadesLista() {
  const ini = val('ir-inicio');
  const fim = val('ir-fim');
  show('irreg-content', '<div class="text-center" style="padding:20px;color:#64748b"><div class="spinner"></div></div>');
  try {
    const [produtos, receitas, histRows] = await Promise.all([
      api('GET', '/produtos?todos=0'),
      api('GET', '/receitas'),
      api('GET', `/historico?inicio=${encodeURIComponent(ini)}&fim=${encodeURIComponent(fim)}`)
    ]);
    if (!histRows.length) {
      show('irreg-content', '<div class="alert alert-error">Sem turnos neste período.</div>');
      return;
    }
    const CHUNK = 6;
    const out = [];
    for (let i = 0; i < histRows.length; i += CHUNK) {
      const chunk = histRows.slice(i, i + CHUNK);
      const part = await Promise.all(
        chunk.map(async (r) => {
          const dataStr = String(r.data).slice(0, 10);
          try {
            const turnos = await api(
              'GET',
              `/dia?data=${encodeURIComponent(dataStr)}&turno_id=${encodeURIComponent(r.turno_id)}`
            );
            const turno = turnos[0];
            if (!turno) return null;
            const vendas = await api('GET', `/turnos/${r.turno_id}/vendas`);
            const snap = computeIrregularidadesSnapshot(turno, vendas, produtos, receitas);
            if (!snap.hasAny) return null;
            return { r, dataStr, snap };
          } catch (_) {
            return null;
          }
        })
      );
      out.push(...part.filter(Boolean));
    }
    if (!out.length) {
      show(
        'irreg-content',
        '<div class="card"><p style="color:#94a3b8;margin:0">Nenhuma irregularidade neste período (caixa alinhado, stock, Batata, Coxa e Fino dentro dos critérios).</p></div>'
      );
      return;
    }
    const html = out
      .map(({ r, dataStr, snap }) => {
        const title = `${turnoLabel(r.nome)} — ${dateLabelWithWeekday(dataStr)}`;
        const tid = String(r.turno_id);
        return `
      <div class="card" style="margin-bottom:14px">

}

/** Próximo número sugerido para a data de emissão: STK-YYYYMMDD-NNN (NNN = ordem no dia). */
function suggestNumeroFaturaArmazem(dataIso, faturas) {
  const day = String(dataIso || '').slice(0, 10);
  const ymd = day.replace(/-/g, '');
  if (!/^\d{8}$/.test(ymd)) {
    const fb = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    return `STK-${fb}-001`;
  }
  const n = (Array.isArray(faturas) ? faturas.length : 0) + 1;
  return `STK-${ymd}-${String(n).padStart(3, '0')}`;
}

function applyFxNumeroSugerido(dataDia, faturas) {
  const el = document.getElementById('fx-numero');
  if (!el || S.page !== 'armazem') return;
  const diaRef = String(dataDia || S.date || new Date().toISOString().split('T')[0]).slice(0, 10);
  const sug = suggestNumeroFaturaArmazem(diaRef, faturas);
  const cur = String(el.value || '').trim();
  if (!cur || /^STK-\d{8}-\d{3}$/i.test(cur)) {
    el.value = sug;
  }
}

const armazemInvSaveTimers = Object.create(null);

function armazemInvInputDelegated(e) {
  const t = e.target;
  if (!t || (!t.classList.contains('amz-inp-enc') && !t.classList.contains('amz-inp-deix'))) return;
  scheduleArmazemInventarioSave(t.closest('tr'));
}

function armazemInvBlurDelegated(e) {
  const t = e.target;
  if (!t || (!t.classList.contains('amz-inp-enc') && !t.classList.contains('amz-inp-deix'))) return;
  flushArmazemInventarioSave(t.closest('tr'));
}

function scheduleArmazemInventarioSave(tr) {
  if (!tr) return;
  const raw = tr.getAttribute('data-armazem-prod-id');
  if (!raw) return;
  clearTimeout(armazemInvSaveTimers[raw]);
  const statusEl = tr.querySelector('.amz-save-status');
  if (statusEl) {
    statusEl.textContent = '…';
    statusEl.style.color = '#94a3b8';
  }
  armazemInvSaveTimers[raw] = setTimeout(() => {
    delete armazemInvSaveTimers[raw];
    saveArmazemInventarioDiaFromRow(tr);
  }, 550);
}

function flushArmazemInventarioSave(tr) {
  if (!tr) return;
  const raw = tr.getAttribute('data-armazem-prod-id');
  if (!raw) return;
  if (armazemInvSaveTimers[raw]) {
    clearTimeout(armazemInvSaveTimers[raw]);
    delete armazemInvSaveTimers[raw];
  }
  saveArmazemInventarioDiaFromRow(tr);
}

function wireArmazemInventarioAutoSaveOnce() {
  if (S._armazemInvAutoSaveWired) return;
  const invRoot = document.getElementById('armazem-inventario');
  if (!invRoot) return;
  S._armazemInvAutoSaveWired = true;
  invRoot.addEventListener('input', armazemInvInputDelegated);
  invRoot.addEventListener('blur', armazemInvBlurDelegated, true);
}

async function saveArmazemInventarioDiaFromRow(tr) {
  if (!tr) return;
  const raw = tr.getAttribute('data-armazem-prod-id');
  if (!raw) return;
  let produto_id;
  try {
    produto_id = decodeURIComponent(raw);
  } catch (_) {
    return;
  }
  const dataIso = normalizeIsoDateStr(S.date || new Date().toISOString().split('T')[0]);
  const encEl = tr.querySelector('.amz-inp-enc');
  const deixEl = tr.querySelector('.amz-inp-deix');
  const encRaw = String(encEl?.value ?? '').trim();
  const deixRaw = String(deixEl?.value ?? '').trim();
  const encontrado = encRaw === '' ? 0 : parsePtOrIsoNumberString(encRaw);
  const deixado = deixRaw === '' ? 0 : parsePtOrIsoNumberString(deixRaw);
  if (!Number.isFinite(encontrado) || encontrado < 0) {
    return err('armazem-msg', 'Indica um valor válido em «Encontrado».');
  }
  if (!Number.isFinite(deixado) || deixado < 0) {
    return err('armazem-msg', 'Indica um valor válido em «Deixado».');
  }
  const statusEl = tr.querySelector('.amz-save-status');
  try {
    show('armazem-msg', '');
    await api('PUT', '/armazem/inventario-diario', { data: dataIso, produto_id, encontrado, deixado });
    if (statusEl) {
      statusEl.textContent = '✓';
      statusEl.style.color = '#4ade80';
      setTimeout(() => {
        if (statusEl && statusEl.textContent === '✓') statusEl.textContent = '';
      }, 1600);
    }
  } catch (e) {
    if (statusEl) {
      statusEl.textContent = '!';
      statusEl.style.color = '#f87171';
    }
    err('armazem-msg', e.message);
  }
}

      <p style="font-size:12px;color:#94a3b8;margin:-8px 0 12px">Fatura: ${escapeHtml(c.fatura_numero || '—')} · ${c.fatura_id ? 'ligada a fatura' : 'sem fatura'}</p>
      <div class="field"><label>Produto</label><select id="clm-prod">${prodOpts}</select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="field"><label>Quantidade</label><input id="clm-qty" type="number" min="0.001" step="any" value="${String(c.quantidade ?? '')}"/></div>
        <div class="field"><label>Preço unitário (Kz)</label><input id="clm-preco" type="number" min="0.01" step="any" value="${String(c.preco_unitario ?? '')}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div class="field"><label>Nº caixas (opcional)</label><input id="clm-caixas" type="number" min="0" step="any" value="${String(c.caixas ?? '')}"/></div>
        <div class="field"><label>Qtd por caixa (opcional)</label><input id="clm-qtdcaixa" type="number" min="0" step="any" value="${String(c.qtd_por_caixa ?? '')}"/></div>
      </div>
      <div class="field"><label>Fornecedor (linha)</label><input id="clm-forn" type="text" value="${escapeHtml(String(c.fornecedor || ''))}"/></div>
      <div class="field"><label>Notas (opcional)</label><textarea id="clm-notas" rows="2">${escapeHtml(c.notas || '')}</textarea></div>
      <div class="flex gap-8 mt-8">
        <button type="button" class="btn btn-success" id="clm-save">Guardar</button>
        <button type="button" class="btn btn-ghost" id="clm-cancel">Cancelar</button>
      </div>
  </div>`;
  document.body.appendChild(div);
  const stop = (e) => e.stopPropagation();
  div.querySelector('.modal').addEventListener('click', stop);
  div.addEventListener('click', (e) => {
    if (e.target === div) closeCompraLinhaModal();
  });
  document.getElementById('clm-close').addEventListener('click', closeCompraLinhaModal);
  document.getElementById('clm-cancel').addEventListener('click', closeCompraLinhaModal);
  document.getElementById('clm-save').addEventListener('click', () => saveEditCompraLinhaFromModal(c.id));
}

async function saveEditCompraLinhaFromModal(id) {
  const prod = document.getElementById('clm-prod');
  const qtyIn = document.getElementById('clm-qty');
  const precoIn = document.getElementById('clm-preco');
  const cx = document.getElementById('clm-caixas');
  const qcx = document.getElementById('clm-qtdcaixa');
  const forn = document.getElementById('clm-forn');
  const notas = document.getElementById('clm-notas');
  try {
    const payload = {
      produto_id: prod.value,
      quantidade: parseFloat(qtyIn.value),
      caixas: parseFloat(cx.value) || 0,
      qtd_por_caixa: parseFloat(qcx.value) || 0,
      preco_unitario: parseFloat(precoIn.value),
      fornecedor: (forn && forn.value) || '',
      notas: (notas && notas.value) || ''
    };
    await api('PUT', '/armazem/compras/' + id, payload);
    closeCompraLinhaModal();
    await refreshArmazemFundos();
    await loadArmazemData();
  } catch (e) {
    alert(e.message || String(e));
  }
}

async function deleteCompraLinhaArmazem(ev, id) {

      if (r.fatura_deleted) alert('Última linha removida: o cabeçalho da fatura foi também removido.');
      await refreshArmazemFundos();
      await loadArmazemData();

      alert(e.message || String(e));
    }

async function refreshArmazemFundos() {
  const banner = document.getElementById('armazem-fundos-banner');
  const list = document.getElementById('armazem-libertacoes-list');
  const data = String(S.date || new Date().toISOString().split('T')[0]).slice(0, 10);
  try {
    const [saldoInfo, saidas] = await Promise.all([
      api('GET', '/armazem/saldo?data=' + encodeURIComponent(data)),
      api('GET', '/armazem/saidas-dia?data=' + encodeURIComponent(data))
    ]);
    S.armazemSaldoDia = parseFloat(saldoInfo.saldo) || 0;
    if (banner) {
      banner.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:13px;margin-bottom:8px">
        <span style="color:#94a3b8">Libertado: <strong style="color:#e2e8f0">${fmt(saldoInfo.total_libertacoes)}</strong></span>
        <span style="color:#94a3b8">Faturas (dia): <strong style="color:#e2e8f0">${fmt(saldoInfo.total_faturas)}</strong></span>
        <span style="color:#94a3b8">Saldo disponível: <strong style="color:${S.armazemSaldoDia >= 0 ? '#4ade80' : '#f87171'}">${fmt(saldoInfo.saldo)}</strong></span>
      </div>`;
    }
    if (list) {
      const rows = saldoInfo.libertacoes || [];
      if (!rows.length) {
        list.innerHTML = '<div style="font-size:12px;color:#64748b">Sem libertações neste dia.</div>';
      } else {
        list.innerHTML = `<div class="table-wrap"><table style="font-size:12px">
          <thead><tr><th>Valor</th><th>Notas</th><th></th></tr></thead>
          <tbody>${rows.map(l => `<tr>
            <td style="color:#fbbf24">${fmt(l.valor)}</td>
            <td>${l.notas || '—'}</td>
            <td><button type="button" class="btn btn-ghost btn-sm" onclick="deleteLibertacaoArmazem(event, ${l.id})">Remover</button></td>
          </tr>`).join('')}</tbody></table></div>`;
      }
    }
    const sel = document.getElementById('fx-turno-saida');
    if (sel) {
      const cur = sel.value;
      sel.innerHTML = '<option value="">— Nenhuma / outra origem —</option>' +
        (saidas || []).map(s => `<option value="${s.id}">${fmt(s.valor)} — ${turnoLabel(s.turno_nome)} — ${(s.descricao || '').slice(0, 40)}</option>`).join('');
      if (cur && sel.querySelector(`option[value="${cur}"]`)) sel.value = cur;
    }
    updateFaturaExcessoUI();
  } catch (e) {
    if (banner) banner.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    S.armazemSaldoDia = 0;
    updateFaturaExcessoUI();
  }
}

async function submitLibertacaoArmazem() {
  const data = String(S.date || new Date().toISOString().split('T')[0]).slice(0, 10);
  const valor = parseFloat(document.getElementById('lib-valor')?.value);
  const notas = val('lib-notas');
  if (!valor || valor <= 0) {
    show('armazem-msg', '<div class="alert alert-error">Indica um valor positivo para a libertação.</div>');

  try {
    await api('POST', '/armazem/libertacoes', { data, valor, notas });
    document.getElementById('lib-valor').value = '';
    document.getElementById('lib-notas').value = '';
    show('armazem-msg', '');
    await refreshArmazemFundos();
    await loadArmazemData();
  } catch (e) {
    show('armazem-msg', `<div class="alert alert-error">${e.message}</div>`);
  }
}

async function deleteLibertacaoArmazem(ev, id) {
  if (!confirm('Remover esta libertação?')) return;
  await runAction(ev, async () => {
    try {
      await api('DELETE', '/armazem/libertacoes/' + id);
      await refreshArmazemFundos();
      await loadArmazemData();

      show('armazem-msg', `<div class="alert alert-error">${e.message}</div>`);

function computeFaturaTotalEstimado() {
  let sum = 0;
  document.querySelectorAll('#fatura-linhas-body .fatura-linha').forEach(line => {
    const sel = line.querySelector('.af-prod');
    if (!sel || !sel.value) return;
    const caixasNum = parseFloat(line.querySelector('.af-caixas')?.value) || 0;
    const qtdPor = parseFloat(line.querySelector('.af-qtd-caixa')?.value) || 0;
    const qtyRaw = parseFloat(line.querySelector('.af-qty')?.value);
    const qty = (caixasNum > 0 && qtdPor > 0) ? (caixasNum * qtdPor) : qtyRaw;
    const pu = parseFloat(line.querySelector('.af-preco')?.value);
    if (qty > 0 && pu > 0) sum += qty * pu;
  });
  return sum;
}

function updateFaturaExcessoUI() {
  const wrap = document.getElementById('fx-excesso-wrap');
  if (!wrap) return;
  const t = computeFaturaTotalEstimado();
  const saldo = S.armazemSaldoDia != null ? S.armazemSaldoDia : 0;
  if (t > saldo + 0.01) {
    wrap.style.display = '';
  } else {
    wrap.style.display = 'none';
    const j = document.getElementById('fx-justificacao');
    const s = document.getElementById('fx-turno-saida');
    if (j) j.value = '';
    if (s) s.value = '';
  }
}

function renderArmazemProdutoOptions(sel, selectedValue, term, includeNovo) {
  const showNovo = includeNovo !== false;
  const q = (term || '').trim().toLowerCase();
  const filtrados = (S.produtos || []).filter(p => p.ativo && (!q || String(p.nome || '').toLowerCase().includes(q)));
  sel.innerHTML = '<option value="">— Seleciona —</option>' + (showNovo ? '<option value="__novo__">+ Novo produto</option>' : '') +
    filtrados.map(p => `<option value="${p.id}" data-medicao="${p.tipo_medicao || 'unidade'}">${p.nome} (${medicaoSigla(p.tipo_medicao)})</option>`).join('');
  if (selectedValue && sel.querySelector(`option[value="${selectedValue}"]`)) sel.value = selectedValue;
}

function bindArmazemProdutoFilterOnLine(sel, indicatorEl) {
  if (!sel || sel.dataset.filterBinded) return;
  sel.dataset.filterBinded = '1';
  const updateInd = () => {
    if (!indicatorEl) return;
    const q = sel._filterBuf || '';
    indicatorEl.textContent = q ? `Filtro: ${q}` : 'Filtro vazio (digita para procurar, Esc limpa)';
  };
  sel._filterBuf = '';
  updateInd();
  sel.addEventListener('keydown', function(e) {
    const key = e.key || '';
    if (key === 'Escape') {
      sel._filterBuf = '';
      renderArmazemProdutoOptions(sel, sel.value || '', '', true);
      toggleFaturaLinhaNovo(sel);
      updateInd();
      return;
    }
    if (key === 'Backspace') {
      e.preventDefault();
      sel._filterBuf = (sel._filterBuf || '').slice(0, -1);
      renderArmazemProdutoOptions(sel, '', sel._filterBuf, true);
      toggleFaturaLinhaNovo(sel);
      updateInd();
      return;
    }
    if (key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      sel._filterBuf = (sel._filterBuf || '') + key;
      renderArmazemProdutoOptions(sel, '', sel._filterBuf, true);
      if (sel.options.length > 0) sel.selectedIndex = 0;
      toggleFaturaLinhaNovo(sel);
      updateInd();
    }
  });
  sel.addEventListener('blur', function() {
    sel._filterBuf = '';
    renderArmazemProdutoOptions(sel, sel.value || '', '', true);
    toggleFaturaLinhaNovo(sel);
    updateInd();
  });
}

function toggleFaturaLinhaNovo(sel) {
  const line = sel.closest('.fatura-linha');
  if (!line) return;
  const wrap = line.querySelector('.af-novo-wrap');
  const qty = line.querySelector('.af-qty');
  if (!wrap || !qty) return;
  const isNovo = sel.value === '__novo__';
  wrap.style.display = isNovo ? '' : 'none';
  const med = isNovo
    ? (line.querySelector('.af-medicao')?.value || 'unidade')
    : (sel.options[sel.selectedIndex]?.getAttribute('data-medicao') || 'unidade');
  qty.placeholder = `Qtd (${medicaoSigla(med)})`;
  const medSel = line.querySelector('.af-medicao');
  if (medSel && !medSel.dataset.binded) {
    medSel.dataset.binded = '1';
    medSel.addEventListener('change', () => toggleFaturaLinhaNovo(sel));
  }
}

function toggleFaturaLinhaCaixa(chk) {
  const line = chk.closest('.fatura-linha');
  if (!line) return;
  const fields = line.querySelector('.af-caixa-fields');
  const precoCaixaWrap = line.querySelector('.af-caixa-preco-wrap');
  const qty = line.querySelector('.af-qty');
  const precoUnit = line.querySelector('.af-preco');
  const on = !!chk.checked;
  if (fields) fields.style.display = on ? 'grid' : 'none';
  if (precoCaixaWrap) precoCaixaWrap.style.display = on ? '' : 'none';
  if (qty) qty.disabled = on;
  if (precoUnit) precoUnit.readOnly = on;
  if (on && qty) qty.value = '';
  if (!on && precoUnit) precoUnit.value = '';
  syncFaturaLinhaPrecoUnit(line);
}

function syncFaturaLinhaPrecoUnit(line) {
  const check = line.querySelector('.af-modo-caixa');
  const precoUnit = line.querySelector('.af-preco');
  if (!check || !precoUnit || !check.checked) return;
  const precoCaixa = parseFloat(line.querySelector('.af-preco-caixa')?.value) || 0;
  const qtdPorCaixa = parseFloat(line.querySelector('.af-qtd-caixa')?.value) || 0;
  if (precoCaixa > 0 && qtdPorCaixa > 0) {
    precoUnit.value = (precoCaixa / qtdPorCaixa).toFixed(2);
  } else {
    precoUnit.value = '';
  }
}

function bindFaturaLinhaCaixaInputs(line) {
  ['af-preco-caixa', 'af-qtd-caixa', 'af-caixas'].forEach(cls => {
    const el = line.querySelector('.' + cls);
    if (!el || el.dataset.binded) return;
    el.dataset.binded = '1';
    el.addEventListener('input', () => { syncFaturaLinhaPrecoUnit(line); updateFaturaExcessoUI(); });
  });
}

function initFaturaLinha(line) {
  const sel = line.querySelector('.af-prod');
  const ind = line.querySelector('.af-prod-filter-indicator');
  if (sel) {
    renderArmazemProdutoOptions(sel, '', '', true);
    bindArmazemProdutoFilterOnLine(sel, ind);
    sel.addEventListener('change', () => { toggleFaturaLinhaNovo(sel); updateFaturaExcessoUI(); });
    toggleFaturaLinhaNovo(sel);
  }
  bindFaturaLinhaCaixaInputs(line);
  updateFaturaExcessoUI();
}

function removeFaturaLinha(btn) {
  const line = btn.closest('.fatura-linha');

}

  wrap.appendChild(line);

async function submitFaturaArmazem() {
  const msg = document.getElementById('fatura-form-msg');
  const linhas = [];
  try {
    document.querySelectorAll('#fatura-linhas-body .fatura-linha').forEach(line => {
      const sel = line.querySelector('.af-prod');
      if (!sel || !sel.value) return;
      const payload = {
        quantidade: parseFloat(line.querySelector('.af-qty')?.value),
        caixas: parseFloat(line.querySelector('.af-caixas')?.value) || 0,
        qtd_por_caixa: parseFloat(line.querySelector('.af-qtd-caixa')?.value) || 0,
        preco_unitario: parseFloat(line.querySelector('.af-preco')?.value),
        notas: ''
      };
      if (sel.value === '__novo__') {
        payload.novo_produto = {
          nome: (line.querySelector('.af-nome')?.value || '').trim(),
          categoria: line.querySelector('.af-categoria')?.value || 'outro',
          tipo_medicao: line.querySelector('.af-medicao')?.value || 'unidade',
          preco: parseFloat(line.querySelector('.af-preco-venda')?.value) || 0
        };
        if (!payload.novo_produto.nome) throw new Error('Numa linha com «Novo produto», o nome é obrigatório.');
      } else {
        payload.produto_id = sel.value;
      }
      const caixasNum = payload.caixas;
      const qtdPor = payload.qtd_por_caixa;
      const qtyEff = (caixasNum > 0 && qtdPor > 0) ? (caixasNum * qtdPor) : payload.quantidade;
      const pu = payload.preco_unitario;
      if (!qtyEff || qtyEff <= 0 || !pu || pu <= 0) {
        throw new Error('Em cada linha com produto seleccionado, indique quantidade (ou caixas) e preço unitário válidos.');
      }
      linhas.push(payload);
    });
    if (!linhas.length) {
      if (msg) msg.innerHTML = '<div class="alert alert-error">Adicione pelo menos uma linha com produto, quantidade e preço.</div>';
      return;
    }
  } catch (err) {
    if (msg) msg.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    return;
  }
  try {
    const fotoInp = document.getElementById('fx-foto-fatura');
    if (!fotoInp || !fotoInp.files || !fotoInp.files[0]) {
      if (msg) msg.innerHTML = '<div class="alert alert-error">Anexa a foto da fatura (JPEG, PNG ou WebP).</div>';
      return;
    }
    const fotoB64 = await fileToDataUrl(fotoInp.files[0]);
    const totalEst = computeFaturaTotalEstimado();
    const saldo = S.armazemSaldoDia != null ? S.armazemSaldoDia : 0;
    const selF = document.getElementById('fx-fornecedor-id');
    const vForn = selF ? selF.value : '';
    let fornecedor_id = '';
    let fornecedorTxt = '';
    if (vForn === 'livre') {
      fornecedorTxt = val('fx-fornecedor-livre');
    } else if (vForn && /^\d+$/.test(vForn)) {
      fornecedor_id = vForn;
    }
    const payload = {
      numero_fatura: val('fx-numero'),
      fornecedor: fornecedorTxt,
      data_emissao: String(S.date || new Date().toISOString().split('T')[0]).slice(0, 10),
      notas: val('fx-notas'),
      linhas,
      foto_fatura_base64: fotoB64
    };
    if (fornecedor_id) payload.fornecedor_id = fornecedor_id;
    if (totalEst > saldo + 0.01) {
      payload.justificacao_excesso = val('fx-justificacao');
      const ts = val('fx-turno-saida');
      if (ts) payload.turno_saida_id = parseInt(ts, 10);
    }
    await api('POST', '/armazem/faturas', payload);
    if (msg) msg.innerHTML = '<div class="alert alert-success">Fatura registada com sucesso.</div>';
    document.getElementById('fx-numero').value = '';
    const selR = document.getElementById('fx-fornecedor-id');
    if (selR) selR.value = '';
    const livR = document.getElementById('fx-fornecedor-livre');
    if (livR) {
      livR.value = '';
      livR.style.display = 'none';
    }
    document.getElementById('fx-notas').value = '';
    const jf = document.getElementById('fx-justificacao');
    if (jf) jf.value = '';
    const ts = document.getElementById('fx-turno-saida');
    if (ts) ts.value = '';
    document.getElementById('fatura-linhas-body').innerHTML = '';
    addFaturaLinha();
    if (fotoInp) fotoInp.value = '';
    await refreshArmazemFundos();
    await loadArmazemData();
  } catch(e) {
    if (msg) msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function refreshFornecedoresList() {
  const el = document.getElementById('fornec-list');
  if (!el) return;
  try {
    const rows = await api('GET', '/fornecedores?todos=1');
    S.fornecedoresLista = rows;

async function toggleFornecedorAtivo(id, ativo) {

async function loadProdutos() {
  try {
    const isAdmin = ['admin', 'gestor', 'compras'].includes(S.user?.role);
    S.produtos = await api('GET', '/produtos' + (isAdmin ? '?todos=1' : ''));
    const menu   = S.produtos.filter(p => p.categoria==='menu');
    const comida = S.produtos.filter(p => p.categoria==='ingredientes');
    const bebida = S.produtos.filter(p => p.categoria==='bebida');
    const outro  = S.produtos.filter(p => !['menu','ingredientes','bebida'].includes(p.categoria));

    function prodList(items, label) {
      if (!items.length) return '';
      return `
        <div class="card">
          <div class="card-title">${label}</div>
          ${items.map(p => `
            <div class="produto-row">
              <div class="produto-info">
                <div class="produto-nome" style="${!p.ativo?'color:#64748b;text-decoration:line-through':''}">${p.nome}${p.venda_avulso ? ' <span style="font-size:10px;background:#1e3a5f;color:#60a5fa;padding:1px 5px;border-radius:4px">avulso</span>' : ''}${p.venda_por_copo && parseFloat(p.kg_por_copo) > 0 ? ' <span style="font-size:10px;background:#14532d;color:#86efac;padding:1px 5px;border-radius:4px">por copo</span>' : ''}${p.em_stock_turno === false ? ' <span style="font-size:10px;background:#422006;color:#fdba74;padding:1px 5px;border-radius:4px">só armazém</span>' : ''}</div>
                <div class="produto-meta">${p.preco > 0 ? fmt(p.preco) : 'Sem preço'} · ${p.tipo_medicao === 'peso' ? 'Peso' : 'Unidade'}${parseFloat(p.peso_tara_kg) > 0 ? ` · recipiente ${fmtNum(parseFloat(p.peso_tara_kg))} kg` : ''} · #${p.ordem}</div>
              </div>
              ${isAdmin ? `
              <div class="produto-actions">
                <button class="btn btn-ghost btn-sm" data-edit-id="${p.id}">Editar</button>
              </div>` : ''}
            </div>`).join('')}
        </div>`;
    }

    show('prod-list',
      prodList(menu,'🍽️ Menu') +
      prodList(comida,'🧂 Ingredientes') +
      prodList(bebida,'🥤 Bebidas') +
      prodList(outro,'📦 Outros')
    );
    document.getElementById('prod-list').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-edit-id]');
      if (btn) showProdutoForm(btn.getAttribute('data-edit-id'));
    });
  } catch(e) { show('prod-list',`<div class="alert alert-error">${e.message}</div>`); }
}

}

      '</div>' +
      '<div class="field"><label>Categoria</label><select id="p-cat"><option value="menu">Menu</option><option value="ingredientes">Ingredientes</option><option value="bebida">Bebida</option><option value="outro">Outro</option></select></div>' +
      '<div class="field" id="field-avulso"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="p-avulso" style="width:16px;height:16px"> Venda avulso</label></div>' +
      '<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="p-stock-turno" style="width:16px;height:16px" checked> Folha de stock do turno</label><div id="p-stock-turno-hint-extra" style="font-size:11px;margin-top:4px;margin-left:24px"></div><div style="font-size:11px;color:#64748b;margin-top:4px;margin-left:24px">A folha do turno inclui só <strong style="color:#cbd5e1">Menu</strong>, <strong style="color:#cbd5e1">Ingredientes</strong> e <strong style="color:#cbd5e1">Bebida</strong>. Categoria <strong>Outro</strong> não é controlada em stock no turno.</div></div>' +
      '<div id="field-copo-bebida" style="display:none;margin-top:6px;border-left:2px solid #334155;padding-left:10px">' +
        '<div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="p-copo" style="width:16px;height:16px"> Venda por copo</label><div style="font-size:11px;color:#64748b;margin-top:4px;margin-left:24px">Stock em kg no turno; registo de vendas em copos. O preço acima é por copo avulso.</div></div>' +
        '<div id="field-copo-detalhes" style="display:none">' +
          '<div class="field"><label>kg por copo</label><input id="p-kg-copo" type="number" step="0.001" min="0" value="0.27"/></div>' +
          '<div class="field"><label>Preço do pacote (Kz)</label><input id="p-preco-pacote" type="number" min="0" step="1" value="0"/></div>' +
          '<div class="field"><label>Nº copos no pacote</label><input id="p-qtd-pacote" type="number" min="1" step="1" value="3"/></div>' +
        '</div></div>' +
      '<div class="field"><label>Ordem</label><input id="p-ordem" type="number" value="0"/></div>' +
      (isEdit ? '<div class="field"><label>Activo</label><select id="p-ativo"><option value="true">Sim</option><option value="false">Não</option></select></div>' : '') +
      '<div class="flex gap-8 mt-8">' +
        '<button id="btn-modal-guardar" class="btn btn-success">Guardar</button>' +
        '<button id="btn-modal-cancelar" class="btn btn-ghost">Cancelar</button>' +
      '</div>' +
      (isEdit && canEditReceita ? '<div id="receita-section" style="display:none;margin-top:16px;border-top:1px solid #334155;padding-top:12px"><div class="card-title">🧾 Receita</div><div id="receita-list"></div><div style="display:flex;gap-6px;margin-top:8px"><select id="r-comp" style="flex:1"></select><input id="r-qty" type="number" min="0.001" step="0.001" value="1" style="width:70px"/><button type="button" class="btn btn-primary btn-sm" onclick="runAction(event, () => addReceita(\'' + p.id + '\'))">+</button></div><div id="receita-msg" style="margin-top:4px"></div></div>' : '') +

  document.getElementById('p-nome').value = p ? (p.nome || '') : '';

  const pt = document.getElementById('p-tara');
  if (pt) pt.value = p && p.peso_tara_kg != null ? String(parseFloat(p.peso_tara_kg) || 0) : '0';
  document.getElementById('p-cat').value = p ? (p.categoria || 'outro') : 'outro';
  document.getElementById('p-ordem').value = p ? (p.ordem || 0) : 0;
  if (isEdit) document.getElementById('p-ativo').value = p.ativo ? 'true' : 'false';
  if (p) document.getElementById('p-avulso').checked = !!p.venda_avulso;
  const st = document.getElementById('p-stock-turno');
  if (st) {
    const cat0 = p ? (p.categoria || 'outro') : 'outro';
    if (cat0 === 'outro') st.checked = false;
    else st.checked = p ? p.em_stock_turno !== false : true;
  }
  const pcopo = document.getElementById('p-copo');
  const pkg = document.getElementById('p-kg-copo');
  const ppac = document.getElementById('p-preco-pacote');
  const qpac = document.getElementById('p-qtd-pacote');
  if (p && pcopo && pkg) {
    const k = parseFloat(p.kg_por_copo) || 0;
    pcopo.checked = !!(p.venda_por_copo && k > 0);
    pkg.value = k > 0 ? k : 0.27;
    if (ppac) ppac.value = p.preco_copos_pacote != null ? p.preco_copos_pacote : 0;
    if (qpac) qpac.value = p.qtd_copos_pacote != null && parseInt(p.qtd_copos_pacote, 10) > 0 ? p.qtd_copos_pacote : 3;
  } else if (pcopo) {
    pcopo.checked = false;
    if (pkg) pkg.value = 0.27;
    if (ppac) ppac.value = 0;
    if (qpac) qpac.value = 3;
  }

    const lbl = document.getElementById('p-preco-label');
    if (!lbl) return;
    const cat = document.getElementById('p-cat')?.value;
    const c = document.getElementById('p-copo')?.checked;
    lbl.textContent = (cat === 'bebida' && c) ? 'Preço por copo (Kz)' : 'Preço (Kz)';
  }
  function toggleTaraField() {
    const ft = document.getElementById('field-tara');
    if (ft) ft.style.display = document.getElementById('p-medicao')?.value === 'peso' ? '' : 'none';
  }
  function toggleCopoBebida() {
    const fb = document.getElementById('field-copo-bebida');
    if (fb) fb.style.display = document.getElementById('p-cat')?.value === 'bebida' ? '' : 'none';
    syncPrecoLabelCopo();
  }
  function toggleCopoDetalhes() {
    const d = document.getElementById('field-copo-detalhes');
    if (d) d.style.display = document.getElementById('p-copo')?.checked ? '' : 'none';
    syncPrecoLabelCopo();
  }

  function toggleAvulso() {
    const cat = document.getElementById('p-cat').value;
    const fa = document.getElementById('field-avulso');
    if (fa) fa.style.display = (cat === 'ingredientes' || cat === 'outro') ? '' : 'none';
  }
  function toggleStockTurnoPorCategoria() {
    const cat = document.getElementById('p-cat')?.value;
    const st = document.getElementById('p-stock-turno');
    const hx = document.getElementById('p-stock-turno-hint-extra');
    if (cat === 'outro') {
      if (st) {
        st.checked = false;
        st.disabled = true;
      }
      if (hx) hx.innerHTML = '<span style="color:#fdba74">Categoria «Outro» não integra a folha de stock do turno.</span>';
    } else {
      if (st) st.disabled = false;
      if (hx) hx.innerHTML = '';
    }
  }
  function toggleReceita() {
    const sec = document.getElementById('receita-section');
    if (!sec) return;
    if (document.getElementById('p-cat').value === 'menu') {
      sec.style.display = '';
      loadReceita(p.id);
    } else {
      sec.style.display = 'none';
    }
  }
  document.getElementById('p-medicao')?.addEventListener('change', toggleTaraField);
  document.getElementById('p-cat').addEventListener('change', () => {
    toggleAvulso();
    toggleCopoBebida();
    toggleCopoDetalhes();
    toggleStockTurnoPorCategoria();
    if (isEdit && canEditReceita) toggleReceita();
  });
  document.getElementById('p-copo')?.addEventListener('change', toggleCopoDetalhes);
  toggleAvulso();
  toggleTaraField();
  toggleCopoBebida();
  toggleCopoDetalhes();
  toggleStockTurnoPorCategoria();
  if (isEdit && canEditReceita) toggleReceita();

  document.getElementById('btn-modal-close').addEventListener('click', closeProdutoModal);
  document.getElementById('btn-modal-cancelar').addEventListener('click', closeProdutoModal);
  document.getElementById('btn-modal-guardar').addEventListener('click', function(ev) {
    runAction(ev, async () => {
      if (isEdit) await saveProduto(p.id); else await createProduto();
    });
  });

  document.getElementById('p-nome').focus();
}

async function createProduto() {
  try {
    const copo = readProdutoCopoFields();
    const med = copo.venda_por_copo && copo.kg_por_copo > 0 ? 'peso' : val('p-medicao');
    const cat = val('p-cat');
    await api('POST','/produtos',{
      nome: val('p-nome'),
      preco: parseFloat(val('p-preco')) || 0,
      tipo_medicao: med,
      categoria: cat,
      venda_avulso: document.getElementById('p-avulso')?.checked || false,
      em_stock_turno: cat === 'outro' ? false : !!document.getElementById('p-stock-turno')?.checked,
      peso_tara_kg: parseFloat(val('p-tara')) || 0,
      ...copo
    });
    closeProdutoModal();
    suc('prod-msg','Produto criado!');
    setTimeout(()=>show('prod-msg',''),2000);
    await loadProdutos();
  } catch(e) { err('prod-form-msg',e.message); }
}

async function saveProduto(id) {
  try {
    const copo = readProdutoCopoFields();
    const med = copo.venda_por_copo && copo.kg_por_copo > 0 ? 'peso' : val('p-medicao');
    const cat = val('p-cat');
    await api('PUT',`/produtos/${id}`,{
      nome: val('p-nome'), preco: parseFloat(val('p-preco'))||0,
      tipo_medicao: med,
      categoria: cat, ordem: parseInt(val('p-ordem'))||0,
      ativo: val('p-ativo')==='true',
      venda_avulso: document.getElementById('p-avulso')?.checked||false,
      em_stock_turno: cat === 'outro' ? false : !!document.getElementById('p-stock-turno')?.checked,
      peso_tara_kg: parseFloat(val('p-tara')) || 0,
      ...copo
    });
    closeProdutoModal();
    suc('prod-msg','Produto actualizado!');
    setTimeout(()=>show('prod-msg',''),2000);
    await loadProdutos();
  } catch(e) { err('prod-form-msg',e.message); }
}

async function loadReceita(produtoId) {
  try {
    const [receita, todos] = await Promise.all([
      api('GET', `/receitas/${produtoId}`),
      api('GET', '/produtos?todos=1')
    ]);
    const outros = todos.filter(p => p.id !== produtoId);
    // Preencher select de componentes
    const sel = document.getElementById('r-comp');
    if (sel) {
      sel.innerHTML = outros.map(p =>
        `<option value="${p.id}">${p.nome} (${p.categoria})</option>`
      ).join('');
    }
    // Listar componentes actuais
    const listEl = document.getElementById('receita-list');
    if (!listEl) return;
    if (!receita.length) {
      listEl.innerHTML = '<span style="color:#64748b;font-size:13px">Sem componentes. Adicione abaixo.</span>';
      return;
    }
    listEl.innerHTML = receita.map(r =>
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1e293b">
        <span style="font-size:13px">${r.componente_nome}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span style="font-size:13px;color:#94a3b8">×${fmtNum(r.quantidade)}</span>
          <button type="button" class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="runAction(event, () => deleteReceita('${r.id}','${produtoId}'))">✕</button>
        </span>
      </div>`
    ).join('');
  } catch(e) {
    const el = document.getElementById('receita-msg');
    if (el) el.innerHTML = `<span style="color:#ef4444">${e.message}</span>`;
  }
}

async function addReceita(produtoId) {
  const compId = document.getElementById('r-comp')?.value;
  const qty = parseFloat(document.getElementById('r-qty')?.value) || 1;
  if (!compId) { alert('Seleccione um componente primeiro.'); return; }
  try {
    await api('POST', '/receitas', { produto_id: produtoId, componente_id: compId, quantidade: qty });
    await loadReceita(produtoId);
  } catch(e) {
    alert('Erro ao adicionar: ' + e.message);
  }
}

async function deleteReceita(receitaId, produtoId) {
  try {
    await api('DELETE', `/receitas/${receitaId}`);
    await loadReceita(produtoId);
  } catch(e) { alert(e.message); }
}

        <select id="u-ativo"><option value="true" ${u?.ativo?'selected':''}>Sim</option><option value="false" ${!u?.ativo?'selected':''}>Não</option></select>
      </div>
      <div class="field"><label>Nova Password (opcional)</label><input type="password" id="u-pass"/></div>`:''}
      <div class="flex gap-8 mt-8">
        <button type="button" class="btn btn-success" onclick="runAction(event, ${isEdit?`() => saveUser('${u.id}')`:'createUser'})">Guardar</button>
        <button type="button" class="btn btn-ghost" onclick="show('admin-form','')">Cancelar</button>
      </div>
    </div>
  `);
}

async function createUser() {
  try {
    await api('POST','/utilizadores',{nome:val('u-nome'),email:val('u-email'),username:val('u-username'),role:val('u-role')});
    show('admin-form','');
    suc('admin-msg','Utilizador criado! Password padrão: StockOS2025!');
    await loadUtilizadores();
  } catch(e) { err('user-form-msg',e.message); }
}

async function saveUser(id) {
  try {
    const body = {nome:val('u-nome'),username:val('u-username'),role:val('u-role'),ativo:val('u-ativo')==='true'};
    const p = val('u-pass');
    if (p) body.password = p;
    await api('PUT',`/utilizadores/${id}`,body);
    show('admin-form','');
    suc('admin-msg','Utilizador actualizado!');
    setTimeout(()=>show('admin-msg',''),2000);
    await loadUtilizadores();
  } catch(e) { err('user-form-msg',e.message); }
}

async function alterarPassword() {
  try {
    await api('POST','/auth/alterar-password',{passwordAtual:val('pass-atual'),passwordNova:val('pass-nova')});
    suc('pass-msg','Password alterada com sucesso!');
    document.getElementById('pass-atual').value='';
    document.getElementById('pass-nova').value='';
  } catch(e) { err('pass-msg',e.message); }
}

// ── ESCALA ────────────────────────────────────────────────────
function getMondayOf(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  const day = d.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setUTCDate(d.getUTCDate() + diff);
  return d.toISOString().split('T')[0];
}

async function drawEscala() {
  render(`
    <div id="header">
      <div>
        <div style="font-size:18px;font-weight:700;color:#f1f5f9">Escala</div>
        <div class="header-sub" style="margin-top:4px;line-height:1.45">Manhã ${turnoHorarioLabel('manha')} · Tarde ${turnoHorarioLabel('tarde')} · Noite ${turnoHorarioLabel('noite')}</div>
      </div>
    </div>
    <div id="content">
      <div id="escala-body"><div style="padding:40px;text-align:center;color:#64748b"><div class="spinner"></div></div></div>
    </div>
    ${navBar()}
  `);
  await loadEscalaTemplate();
}

async function patchEscalaTemplateArea(id, val) {
  try {
    const body = val === '' || val === undefined ? { area_trabalho: null } : { area_trabalho: parseInt(val, 10) };
    await api('PATCH', `/escala/template/${id}`, body);
    await loadEscalaTemplate();
  } catch (e) {
    alert(e.message);
  }
}

async function loadEscalaTemplate() {
  try {
    const canEdit = S.user?.role === 'admin' || S.user?.role === 'gestor';
    const [templateData, utilizadores] = await Promise.all([
      api('GET', '/escala/template'),
      canEdit ? api('GET', '/utilizadores') : Promise.resolve(S.utilizadores || [])
    ]);
    if (canEdit) S.utilizadores = utilizadores;

    const lookup = {};
    templateData.forEach(e => {
      const key = `${e.dia_semana}_${e.turno}`;
      if (!lookup[key]) lookup[key] = [];
      lookup[key].push(e);
    });

    const dayShort = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    const turnos = ['manha','tarde','noite'];
    const turnoLabel = {manha:'Manhã', tarde:'Tarde', noite:'Noite'};
    const turnoColor = {manha:'#fb923c', tarde:'#60a5fa', noite:'#a78bfa'};

    const legenda = `<p style="font-size:11px;color:#64748b;margin:0 0 12px;line-height:1.5">
      <strong style="color:#94a3b8">Áreas:</strong>
      ${AREAS_TRABALHO_META.map((a) => `${a.abbr} — ${a.label}`).join(' · ')}
    </p>`;

    const chipBlock = (e) => {
      const na = (e.utilizador_nome || 'Sem').split(' ')[0];
      const ai = parseInt(e.area_trabalho, 10);
      const hasArea = Number.isFinite(ai) && ai >= 1 && ai <= 3;
      const areaSelect = canEdit
        ? `<select class="escala-area-sel" title="Área de trabalho" onchange="runAction(event, () => patchEscalaTemplateArea(${e.id}, this.value))">
            <option value="">Área</option>
            <option value="1" ${ai === 1 ? 'selected' : ''}>A1</option>
            <option value="2" ${ai === 2 ? 'selected' : ''}>A2</option>
            <option value="3" ${ai === 3 ? 'selected' : ''}>A3</option>
          </select>`
        : (hasArea ? `<span class="dia-escala-area-badge" style="margin-top:2px;display:inline-block">${areaTrabalhoAbbr(ai)}</span>` : '');
      if (canEdit) {
        return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;margin:2px;max-width:104px">
          <div style="display:flex;align-items:center;gap:2px;justify-content:center">
            <span style="background:#172554;color:#93c5fd;padding:3px 6px;border-radius:6px;font-size:11px;font-weight:600">${na}</span>
            <button type="button" onclick="runAction(event, () => removeEscalaTemplate(${e.id}))" aria-label="Remover" style="background:none;border:none;color:#ef4444;cursor:pointer;padding:0 1px;font-size:13px;line-height:1">×</button>
          </div>
          ${areaSelect}
        </div>`;
      }
      return `<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;margin:2px">
        <span style="background:#172554;color:#93c5fd;padding:3px 6px;border-radius:6px;font-size:11px;font-weight:600">${na}</span>
        ${areaSelect}
      </div>`;
    };

    let html = `${legenda}<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:420px">
      <thead><tr>
        <th style="padding:8px 6px;background:#0f172a;color:#64748b;font-weight:600;text-align:left;width:88px">Turno</th>
        ${dayShort.map(d => `<th style="padding:8px 4px;background:#0f172a;color:#94a3b8;font-weight:600;text-align:center">${d}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${turnos.map(turno => `
          <tr>
            <td style="padding:8px 6px;border-bottom:1px solid #1e293b;font-weight:700;font-size:11px;color:${turnoColor[turno]};vertical-align:top;padding-top:10px;line-height:1.35">
              <div>${turnoLabel[turno]}</div>
              <div style="font-size:10px;font-weight:600;color:#64748b;margin-top:4px">${turnoHorarioLabel(turno)}</div>
            </td>
            ${[0,1,2,3,4,5,6].map(dia => {
              const entries = lookup[`${dia}_${turno}`] || [];
              const chips = entries.map((e) => chipBlock(e)).join('');
              const addBtn = canEdit
                ? `<button type="button" onclick="showAddEscalaTemplate(${dia},'${turno}')" style="background:none;border:1px dashed #334155;border-radius:6px;color:#475569;cursor:pointer;font-size:16px;padding:1px 6px;margin:2px;line-height:1.4">+</button>`
                : '';
              return `<td style="padding:6px 4px;border-bottom:1px solid #1e293b;text-align:center;vertical-align:top">
                <div style="display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:2px">${chips}${addBtn}</div>
              </td>`;
            }).join('')}
          </tr>`).join('')}
      </tbody>
    </table></div>
    <div id="escala-add-form" style="margin-top:12px"></div>`;

    show('escala-body', html);
  } catch(e) { show('escala-body', `<div class="alert alert-error">${e.message}</div>`); }
}

function showAddEscalaTemplate(dia_semana, turno) {
  const turnoNome = {manha:'Manhã', tarde:'Tarde', noite:'Noite'};
  const dayShort = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const utilizadores = (S.utilizadores || []).filter(u => u.ativo);
  show('escala-add-form', `
    <div class="card">
      <div class="card-title">Adicionar — ${dayShort[dia_semana]}, ${turnoNome[turno]} · ${turnoHorarioLabel(turno)}</div>
      <div id="escala-add-msg"></div>
      <div class="field">
        <label>Funcionário</label>
        <select id="ea-user">
          <option value="">— Selecionar —</option>
          ${utilizadores.map(u => `<option value="${u.id}">${u.nome} (${u.role})</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Área de trabalho</label>
        <select id="ea-area">
          <option value="">— Opcional —</option>
          ${AREAS_TRABALHO_META.map((a) => `<option value="${a.id}">${a.abbr} — ${a.label}</option>`).join('')}
        </select>
      </div>
      <div class="flex gap-8 mt-8">
        <button type="button" class="btn btn-success" onclick="runAction(event, () => addEscalaTemplate(${dia_semana},'${turno}'))">Adicionar</button>
        <button type="button" class="btn btn-ghost" onclick="show('escala-add-form','')">Cancelar</button>
      </div>
    </div>
  `);
  document.getElementById('escala-add-form').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function addEscalaTemplate(dia_semana, turno) {
  try {
    const utilizador_id = val('ea-user');
    if (!utilizador_id) return err('escala-add-msg', 'Seleciona um funcionário');
    const ar = document.getElementById('ea-area') ? val('ea-area') : '';
    const area_trabalho = ar === '' ? undefined : parseInt(ar, 10);
    await api('POST', '/escala/template', { dia_semana, turno, utilizador_id, area_trabalho });
    show('escala-add-form', '');
    await loadEscalaTemplate();
  } catch(e) { err('escala-add-msg', e.message); }
}

async function removeEscalaTemplate(id) {
  try {
    await api('DELETE', `/escala/template/${id}`);
    await loadEscalaTemplate();
  } catch(e) { alert(e.message); }
}

// ── START ─────────────────────────────────────────────────────
draw().catch(e => console.error(e));
</script>
