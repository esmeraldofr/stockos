<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>StockOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
#env-banner{position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 0;display:none}
body.env-develop #env-banner{display:block;background:#d97706;color:#fff}
body.env-qualidade #env-banner{display:block;background:#7c3aed;color:#fff}
body.env-develop #app,body.env-qualidade #app{padding-top:22px}
input,select,button,textarea{font-family:inherit}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
#content{flex:1;padding:16px;padding-bottom:80px;max-width:900px;margin:0 auto;width:100%}
#navbar{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 4px;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s}
.nav-btn.active{color:#3b82f6}
.nav-btn svg{width:22px;height:22px}

/* Header */
#header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#header h1{font-size:18px;font-weight:700;color:#f1f5f9}
.header-sub{font-size:12px;color:#64748b}

/* Cards */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* Botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover:not(:disabled){background:#2563eb}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover:not(:disabled){background:#16a34a}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-ghost{background:#334155;color:#e2e8f0}
.btn-ghost:hover:not(:disabled){background:#475569}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}

/* Inputs */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#94a3b8;margin-bottom:5px}
.field input,.field select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px}
.field input:focus,.field select:focus{outline:none;border-color:#3b82f6}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#14532d;color:#4ade80}
.badge-red{background:#450a0a;color:#f87171}
.badge-amber{background:#451a03;color:#fb923c}
.badge-blue{background:#172554;color:#60a5fa}
.badge-grey{background:#1e293b;color:#64748b}

/* Turno cards */
.turno-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.turno-cards{grid-template-columns:1fr}}
.turno-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;cursor:pointer;transition:.2s}
.turno-card:hover{border-color:#3b82f6;background:#172554}
.turno-card.aberto{border-color:#22c55e}
.turno-card.fechado{border-color:#475569;opacity:.8}
.turno-card-nome{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px}
.turno-card-status{margin-bottom:8px}
.turno-card-value{font-size:20px;font-weight:700;color:#f1f5f9}
.turno-card-label{font-size:11px;color:#64748b}
.turno-card-abrir{margin-top:10px}

/* Tabela de stock */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:580px}
th{background:#0f172a;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;position:sticky;top:0}
th:first-child{left:0;z-index:2}
td{padding:6px 10px;border-bottom:1px solid #1e293b}
tr:hover td{background:#1e293b}
.td-name{font-weight:500;white-space:nowrap;position:sticky;left:0;background:#0f172a;z-index:1}
tr:hover .td-name{background:#1e293b}
.section-header{position:sticky;left:0}
.td-cat{font-size:10px;color:#64748b}
.td-input{width:90px;text-align:right}
.td-input input{width:65px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:5px 6px;color:#f1f5f9;font-size:13px;text-align:right}
.td-input input:focus{outline:none;border-color:#3b82f6}
.td-calc{color:#94a3b8;text-align:right;font-variant-numeric:tabular-nums}
.entradas-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.entradas-tipo-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid #334155}
.tipo-btn{background:#0f172a;border:none;color:#94a3b8;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
.tipo-btn-active,.tipo-btn-active-green{background:#14532d;color:#4ade80}
.tipo-btn-active-red{background:#450a0a;color:#f87171}
.tipo-btn-active-orange{background:#431407;color:#fb923c}
.entradas-select{flex:1.5;min-width:140px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px}
.entradas-qty{width:80px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px;text-align:right}
.entradas-notas{flex:2;min-width:120px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px}
.td-valor{color:#4ade80;text-align:right;font-weight:600}
.comp-igual{color:#4ade80;font-size:12px}
.comp-falta{color:#f87171;font-size:12px}
.comp-sobra{color:#fb923c;font-size:12px}
.comp-null{color:#334155;font-size:12px}
.section-header{background:#0f172a;color:#3b82f6;font-size:11px;font-weight:700;text-transform:uppercase;padding:6px 10px;letter-spacing:.5px}

/* Caixa grid */
.caixa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:400px){.caixa-grid{grid-template-columns:1fr}}
.caixa-item label{display:block;font-size:12px;color:#64748b;margin-bottom:4px}
.caixa-item input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:16px;text-align:right}
.caixa-item input:focus{outline:none;border-color:#3b82f6}
.caixa-total{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #334155}
.caixa-total-label{font-size:13px;color:#94a3b8}
.caixa-total-value{font-size:18px;font-weight:700;color:#4ade80}

/* Dashboard totals */
.total-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.total-grid{grid-template-columns:1fr}}
.total-item{background:#0f172a;border-radius:8px;padding:12px}
.total-item-label{font-size:11px;color:#64748b;margin-bottom:4px}
.total-item-value{font-size:20px;font-weight:700;color:#f1f5f9}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 12px;margin-bottom:16px}
.date-nav button{background:none;border:none;color:#94a3b8;cursor:pointer;padding:2px 6px;font-size:18px;border-radius:4px}
.date-nav button:hover{background:#334155;color:#f1f5f9}
.date-nav span{flex:1;text-align:center;font-weight:600;font-size:15px}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;width:100%;max-width:380px}
.login-logo{font-size:28px;font-weight:800;color:#3b82f6;margin-bottom:4px}
.login-sub{color:#64748b;font-size:14px;margin-bottom:28px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border-radius:16px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1}

/* Setup */
.setup-banner{background:#172554;border:1px solid #1d4ed8;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#93c5fd}

/* Produto list */
.produto-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #334155}
.produto-row:last-child{border-bottom:none}
.produto-info{flex:1}
.produto-nome{font-size:14px;font-weight:500}
.produto-meta{font-size:12px;color:#64748b}
.produto-actions{display:flex;gap:6px}

/* Alert */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-error{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.alert-success{background:#14532d;color:#86efac;border:1px solid #166534}

/* Utils */
.text-center{text-align:center}
.text-right{text-align:right}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.flex{display:flex}
.gap-8{gap:8px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.hidden{display:none}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.turno-tabs{display:flex;gap:4px;padding:0 0 0 0;border-bottom:2px solid #1e293b;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.turno-tabs::-webkit-scrollbar{display:none}
.turno-tab{flex-shrink:0;padding:8px 16px;border-radius:8px 8px 0 0;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:color .15s,background .15s}
.turno-tab:hover{color:#cbd5e1;background:#1e293b}
.turno-tab.active{color:#f1f5f9;background:#1e293b;border-bottom:2px solid #3b82f6;margin-bottom:-2px}
.turno-tab-panel{display:none}.turno-tab-panel.active{display:block}
.turno-view-toggle{margin-left:auto;flex-shrink:0;padding:5px 10px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;align-self:center;transition:color .15s,border-color .15s}
.turno-view-toggle:hover{color:#f1f5f9;border-color:#64748b}
.turno-tabs-wrap{display:flex;align-items:flex-end;border-bottom:2px solid #1e293b;margin-bottom:16px}
.turno-tabs-wrap .turno-tabs{border-bottom:none;margin-bottom:0;flex:1}
.scroll-mode .turno-tab-panel{display:block!important}
.scroll-mode .turno-tabs .turno-tab{opacity:.5;pointer-events:none}
.scroll-mode .turno-view-toggle{color:#3b82f6;border-color:#3b82f6}
</style>
</head>
<body>
<div id="env-banner"></div>
<div id="app"></div>
<script>
(function(){
  var h = location.hostname;
  var env = null;
  if(h.includes('localhost') || h.includes('develop')) env = 'develop';
  else if(h.includes('qualidade')) env = 'qualidade';
  if(!env) return;
  document.body.classList.add('env-' + env);
  document.getElementById('env-banner').textContent =
    env === 'develop' ? '⚠ Ambiente de Desenvolvimento' : '🔵 Ambiente de Qualidade';
})();
</script>

<script>
// ── STATE ─────────────────────────────────────────────────────
const S = {
  token: localStorage.getItem('token') || null,
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  page: 'dia',
  date: new Date().toISOString().split('T')[0],
  turnoId: null,
  turnoData: null,
  turnoCanEdit: false,
  produtos: [],
  utilizadores: []
};

// ── API ───────────────────────────────────────────────────────
const API = '/api';
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${S.token}` },
    cache: 'no-store'
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.erro || 'Erro');
  return data;
}

// ── HELPERS ───────────────────────────────────────────────────
function fmt(v) {
  const n = parseFloat(v) || 0;
  return n.toLocaleString('pt-AO') + ' Kz';
}
function fmtNum(v) {
  const n = parseFloat(v) || 0;
  return n.toLocaleString('pt-AO', { maximumFractionDigits: 2 });
}
function medicaoSigla(tipo) {
  return tipo === 'peso' ? 'kg' : 'un';
}
function parseRaw(v) {
  return parseFloat(String(v).replace(/\./g, '').replace(',', '.')) || 0;
}
function turnoLabel(nome) {
  return { manha: '🌅 Manhã', tarde: '🌤 Tarde', noite: '🌙 Noite' }[nome] || nome;
}
function dateLabel(d) {
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function addDays(d, n) {
  const dt = new Date(d + 'T12:00:00Z');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().split('T')[0];
}
function render(html) { document.getElementById('app').innerHTML = html; }
function show(id, html) { const el = document.getElementById(id); if (el) el.innerHTML = html; }
function val(id) { return document.getElementById(id)?.value || ''; }
function err(id, msg) { const el = document.getElementById(id); if (el) el.innerHTML = `<div class="alert alert-error">${msg}</div>`; }
function suc(id, msg) { const el = document.getElementById(id); if (el) el.innerHTML = `<div class="alert alert-success">${msg}</div>`; }

// ── ROUTER ────────────────────────────────────────────────────
function navigate(page, params) {
  S.page = page;
  if (params) Object.assign(S, params);
  draw();
}

function draw() {
  if (!S.token) { drawLogin(); return; }
  switch (S.page) {
    case 'dia':      drawDia(); break;
    case 'turno':    drawTurno(); break;
    case 'historico':drawHistorico(); break;
    case 'armazem':  drawArmazem(); break;
    case 'produtos': drawProdutos(); break;
    case 'escala':   drawEscala(); break;
    case 'admin':    drawAdmin(); break;
    default:         drawDia();
  }
}

// ── LOGIN ─────────────────────────────────────────────────────
function drawLogin() {
  render(`
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">StockOS</div>
        <div class="login-sub">Sistema de gestão de turnos</div>
        <div id="login-msg"></div>
        <div class="field">
          <label>Email</label>
          <input id="l-email" type="email" placeholder="admin@stockos.ao" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
        <div style="margin-top:20px;border-top:1px solid #334155;padding-top:16px">
          <div style="font-size:12px;color:#64748b;margin-bottom:12px">Primeira vez? Configura a password:</div>
          <button class="btn btn-ghost btn-sm btn-full" onclick="showSetup()">Configurar conta</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const email = val('l-email'), password = val('l-pass');
  try {
    const data = await api('POST', '/auth/login', { email, password });
    S.token = data.token; S.user = data.user;
    localStorage.setItem('token', S.token);
    localStorage.setItem('user', JSON.stringify(S.user));
    navigate('dia');
  } catch(e) { err('login-msg', e.message); }
}

function showSetup() {
  document.getElementById('login-screen').innerHTML = `
    <div class="login-box">
      <div class="login-logo">StockOS</div>
      <div class="login-sub">Configurar conta</div>
      <div class="setup-banner">Usa o código <strong>STOCKOS2025</strong> para configurar a tua password.</div>
      <div id="setup-msg"></div>
      <div class="field"><label>Email</label><input id="s-email" type="email" placeholder="admin@stockos.ao"/></div>
      <div class="field"><label>Código</label><input id="s-code" type="text" placeholder="STOCKOS2025"/></div>
      <div class="field"><label>Nova Password</label><input id="s-pass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <button class="btn btn-success btn-full" onclick="doSetup()">Guardar Password</button>
      <button class="btn btn-ghost btn-full mt-8" onclick="drawLogin()">Voltar</button>
    </div>
  `;
}

async function doSetup() {
  try {
    await api('POST', '/auth/setup', { email: val('s-email'), codigo: val('s-code'), password: val('s-pass') });
    suc('setup-msg', 'Password configurada! Já podes fazer login.');
    setTimeout(drawLogin, 1500);
  } catch(e) { err('setup-msg', e.message); }
}

function doLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('token'); localStorage.removeItem('user');
  drawLogin();
}

// ── NAV ───────────────────────────────────────────────────────
function navBar() {
  const isAdmin = S.user?.role === 'admin';
  return `
    <div id="navbar">
      <button class="nav-btn ${S.page==='dia'?'active':''}" onclick="navigate('dia')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Dia
      </button>
      <button class="nav-btn ${S.page==='historico'?'active':''}" onclick="navigate('historico')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Histórico
      </button>
      <button class="nav-btn ${S.page==='produtos'?'active':''}" onclick="navigate('produtos')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Produtos
      </button>
      ${(S.user?.role === 'admin' || S.user?.role === 'gestor') ? `
      <button class="nav-btn ${S.page==='armazem'?'active':''}" onclick="navigate('armazem')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>
        Armazém
      </button>` : ''}
      ${(S.user?.role === 'admin' || S.user?.role === 'gestor') ? `
      <button class="nav-btn ${S.page==='escala'?'active':''}" onclick="navigate('escala')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="18"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/></svg>
        Escala
      </button>` : ''}
      ${isAdmin ? `
      <button class="nav-btn ${S.page==='admin'?'active':''}" onclick="navigate('admin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Admin
      </button>` : ''}
      <button class="nav-btn" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  `;
}

// ── PÁGINA DIA ────────────────────────────────────────────────
async function drawDia() {
  render(`
    <div id="header">
      <div>

// Stock buffer for edits
let stockBuf = {};
let caixaBuf = {};
let receitasBuf = {}; // { produto_id: [{componente_id, quantidade}] }
let menuProdIds   = []; // ids dos produtos de menu (inserção manual)
let bebidaProdIds = []; // ids das bebidas registadas em Vendas
let bebidaProdPrecos = {}; // { produto_id: preco } para calcular total
let avulsoProdIds = []; // ids dos ingredientes com venda_avulso=true
let vendasProdPrecos = {}; // { produto_id: preco } para todos os produtos de vendas

function calcMenuQty(prodId) {
  const recipe = receitasBuf[prodId] || [];
  if (!recipe.length) return null;
  let min = Infinity;
  for (const comp of recipe) {
    const b = stockBuf[comp.componente_id] || { encontrado:0, entrada:0, deixado:0 };
    const vendido = Math.max(0, b.encontrado + b.entrada - b.deixado);
    min = Math.min(min, vendido / parseFloat(comp.quantidade));
  }
  return min === Infinity ? 0 : Math.floor(min);
}

function calcStandaloneQty(prodId) {
  const b = stockBuf[prodId] || { encontrado:0, entrada:0, deixado:0 };
  const total = Math.max(0, b.encontrado + b.entrada - b.deixado);
  let comboUsage = 0;
  for (const [menuProdId, recipe] of Object.entries(receitasBuf)) {
    const comp = recipe.find(r => r.componente_id === prodId);
    if (comp) comboUsage += (calcMenuQty(menuProdId) || 0) * comp.quantidade;
  }
  return Math.max(0, total - comboUsage);
}

function refreshMenuQtys() {
  for (const prodId of menuProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    if (el) el.textContent = vendasBuf[prodId] || 0;
  }
  for (const prodId of bebidaProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    const b = stockBuf[prodId] || { encontrado:0, entrada:0, deixado:0 };
    const qty = Math.max(0, b.encontrado + b.entrada - b.deixado);
    if (el) el.textContent = fmtNum(qty);
  }
  for (const prodId of avulsoProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    if (el) el.textContent = fmtNum(calcStandaloneQty(prodId));
  }
  refreshVendasTotal();
}

function refreshVendasTotal() {
  const elTot = document.getElementById('vendas-total-geral');
  if (!elTot) return;
  let total = 0;
  // Menu (inserção manual)
  for (const prodId of menuProdIds) {
    total += (vendasBuf[prodId] || 0) * (vendasProdPrecos[prodId] || 0);
  }
  // Avulso
  for (const prodId of avulsoProdIds) {
    total += calcStandaloneQty(prodId) * (vendasProdPrecos[prodId] || 0);
  }
  // Bebidas (baseado no vendido do stock)
  for (const prodId of bebidaProdIds) {
    const b = stockBuf[prodId] || { encontrado:0, entrada:0, deixado:0 };
    total += Math.max(0, b.encontrado + b.entrada - b.deixado) * (vendasProdPrecos[prodId] || 0);
  }
  elTot.textContent = fmt(total);
}

const TURNO_ORDER = ['manha','tarde','noite'];
async function navTurno(dir) {
  const idx = TURNO_ORDER.indexOf(S.turnoData?.nome);
  let nextIdx = idx + dir;
  let nextDate = S.date;

  if (nextIdx < 0) {
    // vai ao dia anterior
    const d = new Date(S.date + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    nextDate = d.toISOString().split('T')[0];
    nextIdx = TURNO_ORDER.length - 1;
  } else if (nextIdx >= TURNO_ORDER.length) {
    // vai ao próximo dia
    const d = new Date(S.date + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    nextDate = d.toISOString().split('T')[0];
    nextIdx = 0;
  }

  const all = await api('GET', `/dia?data=${nextDate}`);
  const t = all.find(x => x.nome === TURNO_ORDER[nextIdx]);
  if (!t) return;
  S.date = nextDate;
  S.turnoId = t.id;
  loadTurno();
}

    S.turnoData = turno;
    stockBuf = {};
    turno.stock.forEach(s => {
      stockBuf[s.produto_id] = {
        encontrado: parseFloat(s.encontrado)||0,
        entrada: parseFloat(s.entrada)||0,
        deixado: parseFloat(s.deixado)||0,
        fechados: parseFloat(s.fechados)||0
      };

    caixaBuf = {
      tpa: parseFloat(turno.caixa?.tpa)||0,
      transferencia: parseFloat(turno.caixa?.transferencia)||0,

      const qty = vendasBuf[p.id] || 0;

        <div class="produto-info"><div class="produto-nome">${p.nome}</div>
          ${p.preco > 0 ? `<div class="produto-meta">${fmt(p.preco)}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${canEdit ? `<button onclick="deltaVenda('${turnoId}','${p.id}',-1)" style="${btnStyle}background:#1e3a5f;color:#60a5fa">−</button>` : ''}
          <span id="venda-qty-${p.id}" style="min-width:28px;text-align:center;font-weight:700">${qty}</span>
          ${canEdit ? `<button onclick="deltaVenda('${turnoId}','${p.id}',1)" style="${btnStyle}background:#14532d;color:#4ade80">+</button>` : ''}
        </div>
      </div>`;
    }).join('');

    bebidaProdIds = bebidaProds.map(p => p.id);
    bebidaProdPrecos = {};
    const bebidaRows = bebidaProds.map(p => {
      bebidaProdPrecos[p.id] = parseFloat(p.preco) || 0;
      const b = stockBuf[p.id] || { encontrado:0, entrada:0, deixado:0 };
      const qty = Math.max(0, b.encontrado + b.entrada - b.deixado);
      return `<div class="produto-row" style="align-items:center">
        <div class="produto-info"><div class="produto-nome">${p.nome}</div>
          ${p.preco > 0 ? `<div class="produto-meta">${fmt(p.preco)}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="venda-qty-${p.id}" style="min-width:32px;text-align:center;font-weight:700">${fmtNum(qty)}</span>
        </div>
      </div>`;
    }).join('');

    const avulsoRows = avulsoProds.map(p => {
      const qty = calcStandaloneQty(p.id);
      return `<div class="produto-row" style="align-items:center">
        <div class="produto-info"><div class="produto-nome">${p.nome}</div>
          ${p.preco > 0 ? `<div class="produto-meta">${fmt(p.preco)}</div>` : ''}
        </div>
        <span id="venda-qty-${p.id}" style="min-width:32px;text-align:center;font-weight:700">${fmtNum(qty)}</span>
      </div>`;
    }).join('');

    const toGrid = rows => `<div style="columns:2;column-gap:16px">${rows}</div>`;

    const totalRow = `<div style="margin-top:14px;padding:10px 12px;background:#1e293b;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600;color:#94a3b8;font-size:0.85rem;text-transform:uppercase;letter-spacing:.05em">Total Vendas</span>
        <span id="vendas-total-geral" style="font-weight:700;font-size:1.1rem;color:#4ade80">—</span>
      </div>`;
    const html = (menuProds.length ? groupHeader('🍽️ Menu') + toGrid(menuRows) : '')
               + (avulsoProds.length ? groupHeader('🛒 Avulso') + toGrid(avulsoRows) : '')
               + (bebidaProds.length ? groupHeader('🥤 Bebidas') + toGrid(bebidaRows) : '')
               + totalRow;
    show('vendas-menu-list', html);
    refreshVendasTotal();
  } catch(e) {
    show('vendas-menu-list', `<span style="color:#ef4444">${e.message}</span>`);
  }
}

async function deltaVenda(turnoId, prodId, delta) {
  vendasBuf[prodId] = Math.max(0, (vendasBuf[prodId] || 0) + delta);
  const el = document.getElementById(`venda-qty-${prodId}`);
  if (el) el.textContent = vendasBuf[prodId];
  refreshVendasTotal();
  try {
    await api('POST', `/turnos/${turnoId}/vendas`, { produto_id: prodId, quantidade: vendasBuf[prodId] });
  } catch(e) {
    // reverter no erro
    vendasBuf[prodId] = Math.max(0, vendasBuf[prodId] - delta);
    if (el) el.textContent = vendasBuf[prodId];
    refreshVendasTotal();
    alert('Erro ao registar venda: ' + e.message);
  }
}

function updateStock(pid, field, value) {
  if (!stockBuf[pid]) stockBuf[pid] = { encontrado:0, entrada:0, deixado:0, fechados:0 };
  stockBuf[pid][field] = parseRaw(value);
  const { encontrado:enc, entrada:ent, deixado:dei } = stockBuf[pid];
  const vend = Math.max(0, enc + ent - dei);
  const prod = S.turnoData?.stock?.find(s => s.produto_id === pid);
  const preco = parseFloat(prod?.preco) || 0;
  const val = vend * preco;
  const ve = document.getElementById(`vend-${pid}`);
  const va = document.getElementById(`val-${pid}`);
  if (ve) ve.textContent = fmtNum(vend);
  if (va) va.textContent = preco > 0 ? fmt(val) : '—';
  // Recalcular total
  let totalVend = 0, totalVal = 0;
  (S.turnoData?.stock || []).forEach(s => {
    const b = stockBuf[s.produto_id] || { encontrado:0, entrada:0, deixado:0 };
    const v = Math.max(0, b.encontrado + b.entrada - b.deixado);
    totalVend += v;
    totalVal += v * (parseFloat(s.preco) || 0);
  });
  const tv = document.getElementById('total-vend');
  const tva = document.getElementById('total-val');
  if (tv) tv.textContent = fmtNum(totalVend);
  if (tva) tva.textContent = fmt(totalVal);
  refreshMenuQtys();
  // Auto-save
  autoSaveSchedule();
}

let autoSaveTimer = null;
function autoSaveSchedule() {
  const turnoId = S.turnoData?.id;
  if (!turnoId) return;
  const el = document.getElementById('turno-msg');
  if (el) { el.className='alert'; el.textContent='A guardar...'; el.style.opacity='.5'; }
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => guardarStock(turnoId), 2000);
}

async function guardarStock(turnoId) {
  try {
    show('turno-msg','');
    const proms = Object.entries(stockBuf).map(([pid, v]) =>
      api('PUT', `/turnos/${turnoId}/stock`, {
        produto_id: pid,
        encontrado: v.encontrado,
        deixado: v.deixado,
        fechados: v.fechados
      })
    );
    await Promise.all(proms);
    suc('turno-msg', '✓ Guardado');
    setTimeout(() => show('turno-msg',''), 2000);
  } catch(e) { err('turno-msg', e.message); }
}

let autoSaveCaixaTimer = null;
function calcCaixa() {
  const tpa   = parseFloat(document.getElementById('c-tpa')?.value)||0;
  const transf= parseFloat(document.getElementById('c-transf')?.value)||0;
  const din   = parseFloat(document.getElementById('c-din')?.value)||0;
  const saida = parseFloat(document.getElementById('c-saida')?.value)||0;
  const tg = tpa + transf + din;
  const tf = tg - saida;
  const elTG = document.getElementById('c-total-gerado');
  const elTF = document.getElementById('c-total-final');
  if (elTG) elTG.textContent = fmt(tg);
  if (elTF) elTF.textContent = fmt(tf);
  // Auto-save
  const turnoId = S.turnoData?.id;
  if (!turnoId) return;
  const el = document.getElementById('turno-msg');
  if (el) { el.className='alert'; el.textContent='A guardar...'; el.style.opacity='.5'; }
  clearTimeout(autoSaveCaixaTimer);
  autoSaveCaixaTimer = setTimeout(() => guardarCaixa(turnoId), 2000);
}

function switchTurnoTab(name, btn) {
  const wrap = document.getElementById('turno-content');
  if (wrap?.classList.contains('scroll-mode')) return;
  document.querySelectorAll('.turno-tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.turno-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
  btn.classList.add('active');
  if (name === 'resumo') {
    const tid = S.turnoData?.id;
    if (tid) loadResumoTab(tid);
  }
  if (name === 'escala') {
    loadEscalaTurno();
  }
  if (name === 'registos') {
    const tid = S.turnoData?.id;
    const stock = S.turnoData?.stock || [];
    if (tid) {
      loadEntradasSection(tid, stock, !!S.turnoCanEdit);
      loadSaidasSection(tid, !!S.turnoCanEdit);
    }
  }
  if (name === 'vendas') {
    const tid = S.turnoData?.id;
    if (tid) loadVendasMenu(tid, !!S.turnoCanEdit);
  }
}

function toggleTurnoView() {
  const wrap = document.getElementById('turno-content');

async function loadEntradasSection(turnoId, stocks, canEdit) {

  try {

      <div class="entradas-form">

          <button id="e-tipo-entrada" class="tipo-btn tipo-btn-active-green" onclick="setTipo('entrada')">+ Entrada</button>
          <button id="e-tipo-tirar" class="tipo-btn" onclick="setTipo('tirar')">− Saída</button>
        </div>
        <div class="entradas-tipo-toggle" id="e-origem-wrap">
          <button id="e-orig-armazem" class="tipo-btn tipo-btn-active" onclick="setOrigem('armazem')">Armazém</button>

        <input id="e-preco" type="number" min="0" step="any" placeholder="Preço" class="entradas-qty" style="display:none"/>

      </div>

    const listaHtml = entradas.length === 0
      ? '<div style="color:#475569;font-size:13px;padding:8px 0">Nenhum registo neste turno.</div>'
      : `<div class="table-wrap"><table>
          <thead><tr>
            <th style="text-align:left">Hora</th>
            <th style="text-align:left">Tipo</th>

            <th style="text-align:left">Nota</th>
          </tr></thead>
          <tbody>${entradas.map(e => {
            const dt = new Date(e.criado_em).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
            const tipoLabel = e.tipo === 'tirar'
              ? '<span style="color:#f87171;font-weight:600">− Saída</span>'
              : '<span style="color:#4ade80;font-weight:600">+ Entrada</span>';
            const origemLabel = e.origem === 'compra'
              ? '<span style="color:#fb923c">Compra</span>'
              : '<span style="color:#94a3b8">Armazém</span>';
            const precoLabel = e.origem === 'compra' && parseFloat(e.preco) > 0
              ? `<span style="color:#fbbf24">${fmt(e.preco)}</span>`

              <td style="font-size:12px">${tipoLabel}</td>

function setTipo(tipo) {
  window._entradaTipo = tipo;
  const btnE = document.getElementById('e-tipo-entrada');
  const btnT = document.getElementById('e-tipo-tirar');
  const origemWrap = document.getElementById('e-origem-wrap');
  if (btnE) btnE.className = tipo === 'entrada' ? 'tipo-btn tipo-btn-active-green' : 'tipo-btn';
  if (btnT) btnT.className = tipo === 'tirar'   ? 'tipo-btn tipo-btn-active-red'   : 'tipo-btn';
  // Origem só faz sentido em entradas
  if (origemWrap) origemWrap.style.display = tipo === 'tirar' ? 'none' : '';
  if (tipo === 'tirar') {
    const p = document.getElementById('e-preco');
    if (p) p.style.display = 'none';
  }
}

function setOrigem(origem) {
  window._entradaOrigem = origem;
  const btnA = document.getElementById('e-orig-armazem');
  const btnC = document.getElementById('e-orig-compra');
  const precoEl = document.getElementById('e-preco');
  if (btnA) btnA.className = origem === 'armazem' ? 'tipo-btn tipo-btn-active' : 'tipo-btn';
  if (btnC) btnC.className = origem === 'compra'  ? 'tipo-btn tipo-btn-active-orange' : 'tipo-btn';
  if (precoEl) precoEl.style.display = origem === 'compra' ? '' : 'none';
}

async function submitEntrada(turnoId) {
  const pid    = document.getElementById('e-produto')?.value;
  const qty    = parseFloat(document.getElementById('e-qty')?.value);
  const notas  = document.getElementById('e-notas')?.value.trim() || '';
  const tipo   = window._entradaTipo   || 'entrada';
  const origem = window._entradaOrigem || 'armazem';
  const preco  = parseFloat(document.getElementById('e-preco')?.value) || 0;
  const msg    = document.getElementById('entrada-form-msg');
  if (!pid)  { if (msg) { msg.className='alert alert-error'; msg.textContent='Selecciona um produto.'; } return; }
  if (!qty || qty <= 0) { if (msg) { msg.className='alert alert-error'; msg.textContent='Quantidade inválida.'; } return; }
  if (!notas) { if (msg) { msg.className='alert alert-error'; msg.textContent='A nota é obrigatória.'; } return; }
  try {
    await api('POST', `/turnos/${turnoId}/entradas`, { produto_id: pid, tipo, origem, preco, quantidade: qty, notas });
    document.getElementById('e-produto').value = '';
    document.getElementById('e-qty').value = '';
    document.getElementById('e-notas').value = '';
    document.getElementById('e-preco').value = '';
    const novaEntrada = await api('GET', `/turnos/${turnoId}/entradas`);
    const soma = novaEntrada.filter(e => String(e.produto_id) === String(pid))
                            .reduce((s, e) => s + parseFloat(e.quantidade) * (e.tipo === 'tirar' ? -1 : 1), 0);
    const cell = document.getElementById(`entrada-${pid}`);
    if (cell) cell.textContent = fmtNum(soma);
    if (!stockBuf[pid]) stockBuf[pid] = { encontrado:0, entrada:0, deixado:0, fechados:0 };
    stockBuf[pid].entrada = soma;
    updateStock(pid, 'entrada', soma);
    const stocks = S.turnoData?.stock || [];
    await loadEntradasSection(turnoId, stocks, true);
    await loadSaidasSection(turnoId, true);
  } catch(e) {
    if (msg) { msg.className='alert alert-error'; msg.textContent=e.message; }
  }
}

// ── SAÍDAS DE CAIXA ───────────────────────────────────────────
async function loadSaidasSection(turnoId, canEdit) {
  const el = document.getElementById('saidas-section');
  if (!el) return;
  try {
    const [saidas, entradas] = await Promise.all([
      api('GET', `/turnos/${turnoId}/saidas`),
      api('GET', `/turnos/${turnoId}/entradas`)
    ]);
    const totalDespesas = saidas.reduce((s, r) => s + parseFloat(r.valor), 0);
    const totalCompras  = entradas.filter(e => e.origem === 'compra' && e.tipo === 'entrada')
                                  .reduce((s, e) => s + parseFloat(e.preco), 0);
    const total = totalDespesas + totalCompras;

    const formHtml = canEdit ? `
      <div class="entradas-form">
        <input id="s-desc" type="text" placeholder="Descrição (ex: gasóleo, embalagens)" class="entradas-notas" style="flex:2"/>
        <input id="s-valor" type="number" min="0.01" step="any" placeholder="Valor" class="entradas-qty"/>
        <input id="s-notas" type="text" placeholder="Nota obrigatória" class="entradas-notas" style="flex:1.5"/>
        <button class="btn btn-danger btn-sm" onclick="submitSaida(${turnoId})">Registar</button>
      </div>
      <div id="saida-form-msg" style="margin-bottom:8px"></div>` : '';

    const comprasRows = entradas.filter(e => e.origem === 'compra' && e.tipo === 'entrada').map(e => {
      const dt = new Date(e.criado_em).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
      return `<tr>
        <td style="color:#64748b;font-size:12px;white-space:nowrap">${dt}</td>
        <td style="font-size:13px">${e.produto_nome} <span style="color:#fb923c;font-size:11px">(compra)</span></td>
        <td style="text-align:right;font-weight:600;color:#f87171">${fmt(e.preco)}</td>
        <td style="color:#94a3b8;font-size:12px">${e.notas}</td>
      </tr>`;
    });

    const despesasRows = saidas.map(s => {
      const dt = new Date(s.criado_em).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
      return `<tr>
        <td style="color:#64748b;font-size:12px;white-space:nowrap">${dt}</td>
        <td style="font-size:13px">${s.descricao}</td>
        <td style="text-align:right;font-weight:600;color:#f87171">${fmt(s.valor)}</td>
        <td style="color:#94a3b8;font-size:12px">${s.notas}</td>
      </tr>`;
    });

    const todasLinhas = [...comprasRows, ...despesasRows];

    const listaHtml = todasLinhas.length === 0
      ? '<div style="color:#475569;font-size:13px;padding:8px 0">Nenhuma saída registada neste turno.</div>'
      : `<div class="table-wrap"><table>
          <thead><tr>
            <th style="text-align:left">Hora</th>
            <th style="text-align:left">Descrição</th>
            <th style="text-align:right">Valor</th>
            <th style="text-align:left">Nota</th>
          </tr></thead>
          <tbody>
            ${todasLinhas.join('')}
            <tr style="font-weight:700;border-top:2px solid #334155">
              <td colspan="2" style="color:#94a3b8;font-size:12px;padding:6px 10px">Total saídas</td>
              <td style="text-align:right;color:#f87171">${fmt(total)}</td>
              <td></td>
            </tr>
          </tbody>
        </table></div>`;

    el.innerHTML = formHtml + listaHtml;
    // Actualizar campo saída na caixa
    const cSaida = document.getElementById('c-saida');
    if (cSaida) cSaida.value = total.toFixed(2);
    const elTG = document.getElementById('c-total-gerado');
    const elTF = document.getElementById('c-total-final');
    if (elTG && elTF) {
      const tpa   = parseFloat(document.getElementById('c-tpa')?.value)||0;
      const transf= parseFloat(document.getElementById('c-transf')?.value)||0;
      const din   = parseFloat(document.getElementById('c-din')?.value)||0;
      const tg    = tpa + transf + din;
      elTG.textContent = fmt(tg);
      elTF.textContent = fmt(tg - total);
    }
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

// ── RESUMO DO TURNO ───────────────────────────────────────────
async function loadResumoTab(turnoId) {
  const el = document.getElementById('tab-resumo');
  if (!el) return;
  el.innerHTML = '<div style="color:#64748b;text-align:center;padding:32px"><div class="spinner"></div></div>';

    const [entradas, saidas] = await Promise.all([
      api('GET', `/turnos/${turnoId}/entradas`),
      api('GET', `/turnos/${turnoId}/saidas`)
    ]);
    const turno  = S.turnoData;
    const stocks = turno?.stock || [];

    // — Caixa (ler do DOM se disponível) —
    const tpa    = parseFloat(document.getElementById('c-tpa')?.value)    || caixaBuf.tpa           || 0;
    const transf = parseFloat(document.getElementById('c-transf')?.value) || caixaBuf.transferencia  || 0;
    const din    = parseFloat(document.getElementById('c-din')?.value)    || caixaBuf.dinheiro       || 0;
    const totalGerado   = tpa + transf + din;
    const totalDespesas = saidas.reduce((s,r) => s + parseFloat(r.valor), 0);
    const totalCompras  = entradas.filter(e => e.origem === 'compra' && e.tipo === 'entrada')
                                  .reduce((s,e) => s + parseFloat(e.preco||0), 0);
    const totalSaidas   = totalDespesas + totalCompras;
    const totalFinal    = totalGerado - totalSaidas;

    // — Stock —
    let totalVend = 0, totalValStock = 0;
    stocks.forEach(s => {
      const b = stockBuf[s.produto_id] || { encontrado:0, entrada:0, deixado:0 };
      const v = Math.max(0, b.encontrado + b.entrada - b.deixado);
      totalVend    += v;
      totalValStock += v * (parseFloat(s.preco) || 0);
    });

    // — Vendas de Menu —
    let totalVendasVal = 0;
    const vendasLines = [];
    const allProdIds = [...new Set([...menuProdIds, ...avulsoProdIds])];
    allProdIds.forEach(pid => {
      const qty   = vendasBuf[pid] || 0;
      const preco = vendasProdPrecos[pid] || 0;
      if (qty > 0) {
        const val = qty * preco;
        totalVendasVal += val;
        const si  = stocks.find(s => String(s.produto_id) === String(pid));
        vendasLines.push({ nome: si?.produto_nome || `Produto ${pid}`, qty, preco, total: val });
      }
    });

    // — Irregularidades —
    const irr = [];

    // 1. Falta de stock na abertura (comparação detectada pelo servidor)
    stocks.filter(s => s.comparacao && s.comparacao.startsWith('falta')).forEach(s => {
      irr.push({ level:'warn', msg:`Stock em falta ao abrir turno: <strong>${s.produto_nome}</strong> — ${s.comparacao}` });
    });

    // 2. Excedente de stock na abertura
    stocks.filter(s => s.comparacao && s.comparacao.startsWith('sobra')).forEach(s => {
      irr.push({ level:'info', msg:`Excedente ao abrir turno: <strong>${s.produto_nome}</strong> — ${s.comparacao}` });
    });

    // 3. Produto que constava no turno anterior mas apareceu a zero sem justificação
    stocks.forEach(s => {
      const b = stockBuf[s.produto_id] || { encontrado:0, entrada:0, deixado:0 };
      const prevDei = parseFloat(s.prev_deixado) || 0;
      if (prevDei > 0 && b.encontrado === 0 && b.entrada === 0) {
        irr.push({ level:'warn', msg:`<strong>${s.produto_nome}</strong> — ${fmtNum(prevDei)} unidades no turno anterior, encontrado 0 sem entrada registada` });
      }
    });

    // 4. Quantidade matematicamente impossível (deixado > encontrado + entrada)
    stocks.forEach(s => {
      const b = stockBuf[s.produto_id] || { encontrado:0, entrada:0, deixado:0 };
      if (b.deixado > b.encontrado + b.entrada + 0.001) {
        irr.push({ level:'error', msg:`Quantidade impossível: <strong>${s.produto_nome}</strong> — deixado (${fmtNum(b.deixado)}) superior a encontrado+entrada (${fmtNum(b.encontrado + b.entrada)})` });
      }
    });

    // 5. Saídas excedem receita
    if (totalSaidas > totalGerado && totalGerado > 0) {
      irr.push({ level:'error', msg:`Total de saídas (${fmt(totalSaidas)}) superior à receita gerada (${fmt(totalGerado)})` });
    }

    // 6. Compras registadas mas caixa não preenchida
    if (totalCompras > 0 && totalGerado === 0) {
      irr.push({ level:'warn', msg:`Compras de stock registadas (${fmt(totalCompras)}) mas caixa com valor zero` });
    }

    // 7. Possível desconto: valor do stock consumido > vendas registadas
    if (totalValStock > 0 && totalVendasVal > 0 && totalValStock > totalVendasVal) {
      const desconto = totalValStock - totalVendasVal;
      const pct = desconto / totalValStock * 100;
      irr.push({ level:'warn', msg:`Possível desconto aplicado: stock consumido (${fmt(totalValStock)}) superior às vendas registadas (${fmt(totalVendasVal)}) — diferença de ${fmt(desconto)} (${pct.toFixed(1)}%)` });
    }

    // — Helpers de render —
    const icon  = { error:'🔴', warn:'🟡', info:'🔵' };
    const color = { error:'#f87171', warn:'#fbbf24', info:'#60a5fa' };

    const chip = (label, value, valueColor, bold) => `
      <div style="background:#1e293b;border-radius:8px;padding:10px 12px">
        <div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${label}</div>
        <div style="font-weight:${bold?'700':'600'};font-size:${bold?'1.05rem':'0.95rem'};color:${valueColor||'#e2e8f0'}">${value}</div>
      </div>`;

    const financCard = `
      <div class="card">
        <div class="card-title">💰 Resumo Financeiro</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          ${chip('TPA / Máquina', fmt(tpa))}
          ${chip('Transferência', fmt(transf))}
          ${chip('Dinheiro', fmt(din))}
          ${chip('Total Gerado', fmt(totalGerado), '#4ade80', true)}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
          ${chip('Compras', fmt(totalCompras), '#fb923c')}
          ${chip('Despesas', fmt(totalDespesas), '#f87171')}
          ${chip('Total Saídas', fmt(totalSaidas), '#f87171', true)}
        </div>
        <div style="padding:12px 14px;background:#0f172a;border-radius:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #334155">
          <span style="color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:.05em">Total Final</span>
          <span style="font-size:1.25rem;font-weight:700;color:${totalFinal >= 0 ? '#4ade80' : '#f87171'}">${fmt(totalFinal)}</span>
        </div>
      </div>`;

    const stockCard = `
      <div class="card mt-16">
        <div class="card-title">📦 Resumo de Stock</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${chip('Total Vendido (und.)', fmtNum(totalVend))}
          ${chip('Valor de Stock', fmt(totalValStock), '#4ade80', true)}
        </div>
      </div>`;

    const vendasCard = vendasLines.length > 0 ? `
      <div class="card mt-16">
        <div class="card-title">🍽️ Resumo de Vendas (Menu)</div>
        ${vendasLines.map(v => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e293b">
            <span style="font-size:13px;color:#cbd5e1">${v.nome}</span>
            <span style="display:flex;gap:14px;align-items:center">
              <span style="color:#64748b;font-size:12px">${v.qty} × ${fmt(v.preco)}</span>
              <span style="font-weight:600;color:#e2e8f0;min-width:72px;text-align:right">${fmt(v.total)}</span>
            </span>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:2px solid #334155">
          <span style="font-weight:600;color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:.05em">Total Vendas Menu</span>
          <span style="font-weight:700;color:#4ade80">${fmt(totalVendasVal)}</span>
        </div>
      </div>` : '';

    const irrCard = `
      <div class="card mt-16">
        <div class="card-title">⚠️ Irregularidades</div>
        ${irr.length === 0
          ? '<div style="color:#4ade80;font-size:14px;padding:6px 0">✓ Nenhuma irregularidade detectada</div>'
          : irr.map(i => `
              <div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #1e293b">
                <span style="flex-shrink:0;font-size:14px">${icon[i.level]}</span>
                <span style="color:${color[i.level]};font-size:13px;line-height:1.45">${i.msg}</span>
              </div>`).join('')}
      </div>`;

    el.innerHTML = financCard + stockCard + vendasCard + irrCard;
  } catch(e) {
    el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function loadEscalaTurno() {
  const el = document.getElementById('turno-escala-list');
  if (!el) return;
  el.innerHTML = '<span style="color:#64748b">A carregar...</span>';
  try {
    const turnoNome = S.turnoData?.nome;
    if (!turnoNome || !S.date) {
      el.innerHTML = '<span style="color:#64748b">Turno não selecionado.</span>';
      return;
    }
    const [rowsDia, rowsTemplate, equipaReal, pessoas, faltasReg] = await Promise.all([
      api('GET', `/escala?data_inicio=${S.date}&data_fim=${S.date}`),
      api('GET', '/escala/template'),
      api('GET', `/turnos/${S.turnoData.id}/equipa-real`),
      api('GET', '/equipa/pessoas'),
      api('GET', `/turnos/${S.turnoData.id}/faltas`)
    ]);
    const listaDia = rowsDia.filter(r => r.turno === turnoNome);
    const d = new Date(S.date + 'T12:00:00Z');
    const day = d.getUTCDay();
    const diaSemana = day === 0 ? 6 : day - 1; // 0=Seg ... 6=Dom
    const listaTpl = rowsTemplate.filter(r => Number(r.dia_semana) === diaSemana && r.turno === turnoNome);
    const lista = listaDia.length ? listaDia : listaTpl;
    const origem = listaDia.length ? 'escala do dia' : 'escala template';
    const canEdit = !!S.turnoCanEdit;
    const escaladosIds = new Set(lista.map(r => String(r.utilizador_id || '')).filter(Boolean));
    const reaisIds = new Set(equipaReal.map(r => String(r.utilizador_id || '')).filter(Boolean));
    const faltas = lista.filter(r => r.utilizador_id && !reaisIds.has(String(r.utilizador_id)));
    const coberturas = equipaReal.filter(r => r.utilizador_id && !escaladosIds.has(String(r.utilizador_id)));
    const motivoPorFalta = {};
    equipaReal.forEach(r => {
      if (r.cobrindo_utilizador_id && r.motivo_falta) motivoPorFalta[String(r.cobrindo_utilizador_id)] = r.motivo_falta;
    });
    faltasReg.forEach(f => {
      if (f.utilizador_id && f.motivo_falta) motivoPorFalta[String(f.utilizador_id)] = f.motivo_falta;
    });

    const info = `<div style="font-size:11px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">${origem}</div>`;
    const escaladosHtml = lista.length
      ? lista.map((r, i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;${i < lista.length - 1 ? 'border-bottom:1px solid #334155;' : ''}">
        <div>
          <div style="font-weight:600;color:#e2e8f0">${r.utilizador_nome || 'Sem nome'}</div>
          <div style="font-size:12px;color:#64748b">${(r.utilizador_role || 'operador').toUpperCase()}</div>
        </div>
        ${r.notas ? `<div style="font-size:12px;color:#94a3b8;text-align:right;max-width:55%">${r.notas}</div>` : '<div style="font-size:12px;color:#475569">—</div>'}
      </div>
    `).join('')
      : '<span style="color:#64748b">Sem funcionários escalados para este turno.</span>';

    const reaisHtml = equipaReal.length
      ? equipaReal.map((r, i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;${i < equipaReal.length - 1 ? 'border-bottom:1px solid #334155;' : ''}">
        <div>
          <div style="font-weight:600;color:#e2e8f0">${r.utilizador_nome || 'Sem nome'}</div>
          <div style="font-size:12px;color:#64748b">${(r.utilizador_role || 'operador').toUpperCase()}</div>
          ${r.cobrindo_utilizador_nome ? `<div style="font-size:12px;color:#60a5fa;margin-top:2px">Cobrindo: ${r.cobrindo_utilizador_nome}</div>` : ''}
          ${r.motivo_falta ? `<div style="font-size:12px;color:#fbbf24;margin-top:2px">Motivo da falta: ${r.motivo_falta}</div>` : ''}
          ${r.hora_extra ? `<div style="font-size:12px;color:#fbbf24;margin-top:2px">Hora extra aplicada</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${r.notas ? `<div style="font-size:12px;color:#94a3b8;max-width:240px;text-align:right">${r.notas}</div>` : '<div style="font-size:12px;color:#475569">—</div>'}
          ${canEdit ? `<button class="btn btn-danger btn-sm" onclick="removeTurnoPresenca('${S.turnoData.id}','${encodeURIComponent(r.utilizador_id)}')">Remover</button>` : ''}
        </div>
      </div>
    `).join('')
      : '<span style="color:#64748b">Nenhum funcionário registado como presente.</span>';

    const alertaHtml = `
      <div style="margin-top:10px;font-size:12px">
        <div style="color:${faltas.length ? '#fbbf24' : '#4ade80'}">${faltas.length ? `⚠ Faltas: ${faltas.map(f => {
          const motivo = motivoPorFalta[String(f.utilizador_id)];
          const nome = f.utilizador_nome || 'Sem nome';
          return motivo
            ? `${nome} (${motivo})`
            : `${nome}${canEdit ? ` <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="registarMotivoFalta('${S.turnoData.id}','${encodeURIComponent(f.utilizador_id)}','${(nome||'').replace(/'/g, "\\'")}')">Registar motivo</button>` : ''}`;
        }).join(', ')}` : '✓ Sem faltas nos escalados'}</div>
        <div style="color:${coberturas.length ? '#60a5fa' : '#64748b'};margin-top:4px">${coberturas.length ? `↺ Coberturas: ${coberturas.map(c => c.utilizador_nome || 'Sem nome').join(', ')}` : 'Sem coberturas registadas'}</div>
      </div>`;

    const addForm = canEdit ? `
      <div class="card mt-16">
        <div class="card-title">➕ Registar quem trabalhou</div>
        <div id="turno-presenca-msg"></div>
        <div class="entradas-form">
          <select id="tp-user" class="entradas-select">
            <option value="">— Funcionário —</option>
            ${pessoas.map(p => `<option value="${p.id}">${p.nome} (${p.role})</option>`).join('')}
          </select>
          <select id="tp-cobrindo" class="entradas-select" style="display:none">
            <option value="">— Está cobrindo quem? —</option>
            ${lista.filter(r => r.utilizador_id).map(r => `<option value="${r.utilizador_id}">${r.utilizador_nome || r.utilizador_id}</option>`).join('')}
          </select>
          <input id="tp-motivo-falta" class="entradas-notas" type="text" placeholder="Motivo da falta" style="display:none"/>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8">
            <input id="tp-he" type="checkbox" style="width:14px;height:14px"/>
            Aplicar hora extra
          </label>
          <input id="tp-notas" class="entradas-notas" type="text" placeholder="Nota opcional (falta, cobertura, etc.)"/>
          <button class="btn btn-success btn-sm" onclick="addTurnoPresenca('${S.turnoData.id}')">Registar</button>
        </div>
      </div>` : '';

    el.innerHTML = `
      ${info}
      <div class="card-title" style="margin-bottom:6px">📅 Escalados</div>
      ${escaladosHtml}
      <div class="card-title" style="margin:16px 0 6px">✅ Quem realmente trabalhou</div>
      ${reaisHtml}
      ${alertaHtml}
      ${addForm}
    `;
    if (canEdit) {
      const userSel = document.getElementById('tp-user');
      const cobSel = document.getElementById('tp-cobrindo');
      const motEl = document.getElementById('tp-motivo-falta');
      const heEl = document.getElementById('tp-he');
      const toggleExtra = () => {
        if (!userSel || !cobSel || !heEl || !motEl) return;
        const uid = userSel.value;
        const naoEscalado = !!uid && !escaladosIds.has(String(uid));
        cobSel.style.display = naoEscalado ? '' : 'none';
        motEl.style.display = naoEscalado ? '' : 'none';
        if (!naoEscalado) motEl.value = '';
      };
      if (userSel) userSel.onchange = toggleExtra;
      toggleExtra();
    }
  } catch (e) {
    el.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  }
}

async function addTurnoPresenca(turnoId) {
  const utilizador_id = val('tp-user');
  const cobrindo_utilizador_id = val('tp-cobrindo');
  const hora_extra = !!document.getElementById('tp-he')?.checked;
  const motivo_falta = val('tp-motivo-falta');
  const notas = val('tp-notas');
  if (!utilizador_id) return err('turno-presenca-msg', 'Seleciona um funcionário');
  const turnoNome = S.turnoData?.nome;
  const d = new Date(S.date + 'T12:00:00Z');
  const day = d.getUTCDay();
  const diaSemana = day === 0 ? 6 : day - 1;
  const template = await api('GET', '/escala/template');
  const escaladosIds = new Set(template.filter(r => Number(r.dia_semana) === diaSemana && r.turno === turnoNome).map(r => String(r.utilizador_id || '')).filter(Boolean));
  const naoEscalado = !escaladosIds.has(String(utilizador_id));
  if (naoEscalado && !cobrindo_utilizador_id) return err('turno-presenca-msg', 'Seleciona quem este funcionário está cobrindo');
  if (naoEscalado && !motivo_falta.trim()) return err('turno-presenca-msg', 'Regista o motivo da falta');
  if (naoEscalado && !hora_extra) return err('turno-presenca-msg', 'Confirma se deve aplicar pagamento de hora extra');
  try {
    await api('POST', `/turnos/${turnoId}/equipa-real`, { utilizador_id, cobrindo_utilizador_id: naoEscalado ? cobrindo_utilizador_id : null, hora_extra, motivo_falta: naoEscalado ? motivo_falta.trim() : '', notas });
    show('turno-presenca-msg', '');
    if (document.getElementById('tp-notas')) document.getElementById('tp-notas').value = '';
    await loadEscalaTurno();
  } catch (e) { err('turno-presenca-msg', e.message); }
}

async function removeTurnoPresenca(turnoId, utilizadorIdEncoded) {
  try {
    await api('DELETE', `/turnos/${turnoId}/equipa-real/${utilizadorIdEncoded}`);
    await loadEscalaTurno();
  } catch (e) { alert(e.message); }
}

async function registarMotivoFalta(turnoId, utilizadorIdEncoded, nome) {
  const motivo = prompt(`Motivo da falta de ${nome}:`);
  if (!motivo || !motivo.trim()) return;
  try {
    await api('POST', `/turnos/${turnoId}/faltas`, {
      utilizador_id: decodeURIComponent(utilizadorIdEncoded),
      motivo_falta: motivo.trim()
    });
    await loadEscalaTurno();
  } catch (e) { alert(e.message); }
}

async function submitSaida(turnoId) {
  const desc  = document.getElementById('s-desc')?.value.trim() || '';
  const valor = parseFloat(document.getElementById('s-valor')?.value);
  const notas = document.getElementById('s-notas')?.value.trim() || '';
  const msg   = document.getElementById('saida-form-msg');
  if (!desc)  { if (msg) { msg.className='alert alert-error'; msg.textContent='Descrição obrigatória.'; } return; }
  if (!valor || valor <= 0) { if (msg) { msg.className='alert alert-error'; msg.textContent='Valor inválido.'; } return; }
  if (!notas) { if (msg) { msg.className='alert alert-error'; msg.textContent='A nota é obrigatória.'; } return; }
  try {
    await api('POST', `/turnos/${turnoId}/saidas`, { descricao: desc, valor, notas });
    document.getElementById('s-desc').value  = '';
    document.getElementById('s-valor').value = '';
    document.getElementById('s-notas').value = '';
    await loadSaidasSection(turnoId, true);
  } catch(e) {
    if (msg) { msg.className='alert alert-error'; msg.textContent=e.message; }
  }
}

async function loadHistorico() {
  const ini = val('h-inicio'), fim = val('h-fim');
  show('hist-content','<div class="text-center" style="padding:20px;color:#64748b"><div class="spinner"></div></div>');
  try {
    const rows = await api('GET', `/historico?inicio=${ini}&fim=${fim}`);
    if (!rows.length) { show('hist-content','<div class="alert alert-error">Sem dados neste período</div>'); return; }

    let totalGeral = 0;
    const rowsHtml = rows.map(r => {
      totalGeral += parseFloat(r.total_final)||0;
      return `
        <div class="card" style="cursor:pointer" onclick="S.date='${r.data}';navigate('dia')">
          <div class="flex justify-between items-center">
            <div>
              <div style="font-weight:600">${dateLabel(r.data)}</div>
              <div style="font-size:12px;color:#64748b">${r.data} · ${r.num_turnos} turno(s)</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px;font-weight:700;color:#4ade80">${fmt(r.total_final)}</div>
              <div style="font-size:11px;color:#64748b">TPA: ${fmt(r.tpa)} · Din: ${fmt(r.dinheiro)}</div>
            </div>
          </div>
        </div>`;
    }).join('');

    show('hist-content', `
      <div class="card" style="margin-bottom:16px">
        <div class="text-center">
          <div style="font-size:12px;color:#64748b;margin-bottom:4px">Total do período</div>
          <div style="font-size:28px;font-weight:700;color:#4ade80">${fmt(totalGeral)}</div>
        </div>

}

function renderArmazemProdutoOptions(sel, selectedValue, term, includeNovo) {
  const showNovo = includeNovo !== false;
  const q = (term || '').trim().toLowerCase();
  const filtrados = (S.produtos || []).filter(p => p.ativo && (!q || String(p.nome || '').toLowerCase().includes(q)));
  sel.innerHTML = '<option value="">— Seleciona —</option>' + (showNovo ? '<option value="__novo__">+ Novo produto</option>' : '') +
    filtrados.map(p => `<option value="${p.id}" data-medicao="${p.tipo_medicao || 'unidade'}">${p.nome} (${medicaoSigla(p.tipo_medicao)})</option>`).join('');
  if (selectedValue && sel.querySelector(`option[value="${selectedValue}"]`)) sel.value = selectedValue;
}

function renderArmazemProdutoOptionsPlain(sel, selectedValue) {
  const filtrados = (S.produtos || []).filter(p => p.ativo);
  sel.innerHTML = '<option value="">—</option>' +
    filtrados.map(p => `<option value="${p.id}" data-medicao="${p.tipo_medicao || 'unidade'}">${p.nome} (${medicaoSigla(p.tipo_medicao)})</option>`).join('');
  if (selectedValue && sel.querySelector(`option[value="${selectedValue}"]`)) sel.value = selectedValue;
}

function bindArmazemProdutoFilter(sel) {
  if (!sel || sel.dataset.filterBinded) return;
  sel.dataset.filterBinded = '1';
  const updateIndicator = () => {
    const el = document.getElementById('a-produto-filter-indicator');
    if (!el) return;
    const q = window._armazemProdutoFilter || '';
    el.textContent = q ? `Filtro: ${q}` : 'Filtro vazio (digita para procurar, Esc limpa)';
  };
  updateIndicator();
  sel.addEventListener('keydown', function(e) {
    const key = e.key || '';
    if (key === 'Escape') {
      window._armazemProdutoFilter = '';
      renderArmazemProdutoOptions(sel, sel.value || '', '', true);
      toggleNovoProdutoArmazem();
      updateIndicator();
      return;
    }
    if (key === 'Backspace') {
      e.preventDefault();
      window._armazemProdutoFilter = (window._armazemProdutoFilter || '').slice(0, -1);
      renderArmazemProdutoOptions(sel, '', window._armazemProdutoFilter, true);
      toggleNovoProdutoArmazem();
      updateIndicator();
      return;
    }
    if (key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      window._armazemProdutoFilter = (window._armazemProdutoFilter || '') + key;
      renderArmazemProdutoOptions(sel, '', window._armazemProdutoFilter, true);
      if (sel.options.length > 0) sel.selectedIndex = 0;
      toggleNovoProdutoArmazem();
      updateIndicator();
    }
  });
  sel.addEventListener('blur', function() {
    window._armazemProdutoFilter = '';
    renderArmazemProdutoOptions(sel, sel.value || '', '', true);
    toggleNovoProdutoArmazem();
    updateIndicator();
  });
  toggleNovoProdutoArmazem();
}

function toggleNovoProdutoArmazem() {
  const sel = document.getElementById('a-produto');
  const wrap = document.getElementById('a-novo-wrap');
  const qty = document.getElementById('a-qty');
  if (!sel || !wrap || !qty) return;
  const isNovo = sel.value === '__novo__';
  wrap.style.display = isNovo ? '' : 'none';
  const med = isNovo
    ? (document.getElementById('a-medicao')?.value || 'unidade')
    : (sel.options[sel.selectedIndex]?.getAttribute('data-medicao') || 'unidade');
  qty.placeholder = `Qtd (${medicaoSigla(med)})`;
  const medSel = document.getElementById('a-medicao');
  if (medSel && !medSel.dataset.binded) {
    medSel.dataset.binded = '1';
    medSel.addEventListener('change', toggleNovoProdutoArmazem);
  }
}

function toggleCompraCaixa() {
  const check = document.getElementById('a-modo-caixa');
  const fields = document.getElementById('a-caixa-fields');
  const precoCaixaWrap = document.getElementById('a-caixa-preco-wrap');
  const qty = document.getElementById('a-qty');
  const precoUnit = document.getElementById('a-preco');
  if (!check || !fields || !qty) return;
  const on = !!check.checked;
  fields.style.display = on ? 'grid' : 'none';
  if (precoCaixaWrap) precoCaixaWrap.style.display = on ? '' : 'none';
  qty.disabled = on;
  if (precoUnit) precoUnit.readOnly = on;
  if (on) qty.value = '';
  if (!on && precoUnit) precoUnit.value = '';
  syncPrecoUnitFromCaixa();
}

function syncPrecoUnitFromCaixa() {
  const check = document.getElementById('a-modo-caixa');
  const precoUnit = document.getElementById('a-preco');
  if (!check || !precoUnit || !check.checked) return;
  const precoCaixa = parseFloat(val('a-preco-caixa')) || 0;
  const qtdPorCaixa = parseFloat(val('a-qtd-caixa')) || 0;
  if (precoCaixa > 0 && qtdPorCaixa > 0) {
    precoUnit.value = (precoCaixa / qtdPorCaixa).toFixed(2);
  } else {
    precoUnit.value = '';
  }
}

function bindCompraCaixaInputs() {
  const ids = ['a-preco-caixa', 'a-qtd-caixa', 'a-caixas'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el || el.dataset.binded) return;
    el.dataset.binded = '1';
    el.addEventListener('input', syncPrecoUnitFromCaixa);
  });
}

function addFaturaLinha() {
  const tbody = document.getElementById('fatura-linhas-body');
  if (!tbody) return;
  const tr = document.createElement('tr');
  tr.innerHTML =
    '<td><select class="af-prod" style="width:100%;min-width:140px"></select></td>' +
    '<td style="text-align:right"><input class="af-qty" type="number" min="0.001" step="any" placeholder="Qtd" style="width:88px;text-align:right"/></td>' +
    '<td style="text-align:right"><input class="af-preco" type="number" min="0.01" step="any" placeholder="0" style="width:96px;text-align:right"/></td>' +
    '<td><button type="button" class="btn btn-ghost btn-sm" onclick="this.closest(\'tr\').remove()">✕</button></td>';
  tbody.appendChild(tr);
  const sel = tr.querySelector('.af-prod');
  if (sel) renderArmazemProdutoOptionsPlain(sel, '');
}

let faturaArmazemSubmitting = false;
async function submitFaturaArmazem() {
  if (faturaArmazemSubmitting) return;
  const btn = document.getElementById('fx-btn-submit');
  const msg = document.getElementById('fatura-form-msg');
  faturaArmazemSubmitting = true;
  if (btn) { btn.disabled = true; btn.textContent = 'A registar...'; }
  const linhas = [];
  document.querySelectorAll('#fatura-linhas-body tr').forEach(tr => {
    const pid = tr.querySelector('.af-prod')?.value;
    const qty = parseFloat(tr.querySelector('.af-qty')?.value);
    const preco = parseFloat(tr.querySelector('.af-preco')?.value);
    if (!pid || !qty || qty <= 0 || !preco || preco <= 0) return;
    linhas.push({ produto_id: pid, quantidade: qty, preco_unitario: preco, notas: '' });
  });
  if (!linhas.length) {
    if (msg) msg.innerHTML = '<div class="alert alert-error">Preencha pelo menos uma linha com produto, quantidade e preço.</div>';
    faturaArmazemSubmitting = false;
    if (btn) { btn.disabled = false; btn.textContent = 'Registar fatura'; }
    return;
  }
  try {
    await api('POST', '/armazem/faturas', {
      numero_fatura: val('fx-numero'),
      fornecedor: val('fx-fornecedor'),
      data_emissao: val('fx-data'),
      notas: val('fx-notas'),
      linhas
    });
    if (msg) msg.innerHTML = '<div class="alert alert-success">Fatura registada com sucesso.</div>';
    document.getElementById('fx-numero').value = '';
    document.getElementById('fx-fornecedor').value = '';
    document.getElementById('fx-notas').value = '';
    document.getElementById('fatura-linhas-body').innerHTML = '';
    addFaturaLinha();
    await loadArmazemData();
  } catch(e) {
    if (msg) msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  } finally {
    faturaArmazemSubmitting = false;
    if (btn) { btn.disabled = false; btn.textContent = 'Registar fatura'; }
  }
}

let armazemCompraSubmitting = false;
async function submitCompraArmazem() {
  const produtoSel = document.getElementById('a-produto');
  const msg = document.getElementById('armazem-form-msg');
  const submitBtn = document.getElementById('a-btn-submit');
  if (!produtoSel) return;
  if (armazemCompraSubmitting) return;
  armazemCompraSubmitting = true;
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = 'A registar...';
  }
  const payload = {
    quantidade: parseFloat(val('a-qty')),
    caixas: parseFloat(val('a-caixas')) || 0,
    qtd_por_caixa: parseFloat(val('a-qtd-caixa')) || 0,
    preco_unitario: parseFloat(val('a-preco')),
    fornecedor: val('a-fornecedor'),
    notas: val('a-notas')
  };
  if (produtoSel.value === '__novo__') {
    payload.novo_produto = {
      nome: val('a-nome'),
      categoria: val('a-categoria'),
      tipo_medicao: val('a-medicao'),
      preco: parseFloat(val('a-preco-venda')) || 0
    };
  } else {
    payload.produto_id = produtoSel.value;
  }
  try {
    await api('POST', '/armazem/compras', payload);
    if (msg) msg.innerHTML = '<div class="alert alert-success">Compra registada com sucesso.</div>';
    document.getElementById('a-qty').value = '';
    document.getElementById('a-caixas').value = '';
    document.getElementById('a-qtd-caixa').value = '';
    document.getElementById('a-preco-caixa').value = '';
    document.getElementById('a-preco').value = '';
    document.getElementById('a-fornecedor').value = '';
    document.getElementById('a-notas').value = '';
    if (produtoSel.value === '__novo__') {
      document.getElementById('a-nome').value = '';
      document.getElementById('a-preco-venda').value = '';
      produtoSel.value = '';
      toggleNovoProdutoArmazem();
    }
    const check = document.getElementById('a-modo-caixa');
    if (check) check.checked = false;
    toggleCompraCaixa();
    await loadArmazemData();
  } catch(e) {
    if (msg) msg.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
  } finally {
    armazemCompraSubmitting = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Registar compra';
    }
  }
}
