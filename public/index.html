<!DOCTYPE html>
<html lang="pt" data-stockos-ui="2026-03-31-precos-snapshot-vendas">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<title>StockOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
#env-banner{position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 0;display:none}
body.env-develop #env-banner{display:block;background:#d97706;color:#fff}
body.env-qualidade #env-banner{display:block;background:#7c3aed;color:#fff}
body.env-develop #app,body.env-qualidade #app{padding-top:22px}
input,select,button,textarea{font-family:inherit}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
#content{flex:1;padding:16px;padding-bottom:80px;max-width:900px;margin:0 auto;width:100%}
#navbar{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 4px;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s}
.nav-btn.active{color:#3b82f6}
.nav-btn svg{width:22px;height:22px}

/* Header */
#header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#header h1{font-size:18px;font-weight:700;color:#f1f5f9}
.header-sub{font-size:12px;color:#64748b}

/* Cards */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* Botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.btn:disabled{opacity:.5;cursor:default}
button.is-action-busy{cursor:wait!important}
.date-nav button:disabled{opacity:.55;cursor:wait}
.turno-card.is-action-busy,.js-busy-click.is-action-busy{cursor:wait;position:relative}
.turno-card.is-action-busy::after,.js-busy-click.is-action-busy::after{
  content:'A processar…';
  position:absolute;inset:auto 8px 8px 8px;font-size:11px;font-weight:600;color:#94a3b8;
  text-align:center;padding:4px 8px;background:rgba(15,23,42,.92);border-radius:6px;border:1px solid #334155
}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover:not(:disabled){background:#2563eb}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover:not(:disabled){background:#16a34a}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-ghost{background:#334155;color:#e2e8f0}
.btn-ghost:hover:not(:disabled){background:#475569}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}

/* Inputs */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:#94a3b8;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px}
.field textarea{min-height:72px;resize:vertical;line-height:1.4}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#3b82f6}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#14532d;color:#4ade80}
.badge-red{background:#450a0a;color:#f87171}
.badge-amber{background:#451a03;color:#fb923c}
.badge-blue{background:#172554;color:#60a5fa}
.badge-grey{background:#1e293b;color:#64748b}

/* Turno cards */
.turno-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:500px){.turno-cards{grid-template-columns:1fr}}
.turno-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;cursor:pointer;transition:.2s}
.turno-card:hover{border-color:#3b82f6;background:#172554}
.turno-card.aberto{border-color:#22c55e}
.turno-card.turno-card--antecipado.aberto{border-color:#d97706}
.turno-card.fechado{border-color:#475569;opacity:.8}
.turno-card.turno-card--locked{cursor:not-allowed;opacity:.85}
.turno-card.turno-card--locked:hover{border-color:#334155;background:#1e293b}
.turno-card-nome{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px}
.turno-card-status{margin-bottom:8px}
.turno-card-value{font-size:20px;font-weight:700;color:#f1f5f9}
.turno-card-label{font-size:11px;color:#64748b}
.turno-card-abrir{margin-top:10px}

/* Áreas de trabalho (referência por turno) */
.turno-areas-card{margin-bottom:16px}
.turno-areas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.turno-areas-grid{grid-template-columns:1fr}}
.turno-area{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:#0f172a;border:1px solid #334155;border-radius:8px;font-size:12px;line-height:1.45;color:#cbd5e1}
.turno-area-num{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:6px;background:rgba(59,130,246,0.22);color:#93c5fd;font-size:11px;font-weight:700}

/* Tabela de stock */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:580px}
th{background:#0f172a;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;position:sticky;top:0}
th:first-child{left:0;z-index:2}
td{padding:6px 10px;border-bottom:1px solid #1e293b}
tr:hover td{background:#1e293b}
.td-name{position:sticky;left:0;background:#0f172a;z-index:1;vertical-align:middle;padding-top:8px;padding-bottom:8px}
.td-name .stock-prod-nome{font-weight:500;line-height:1.25;white-space:nowrap;color:#f1f5f9}
.td-name .stock-prod-meta{font-size:11px;color:#64748b;font-weight:400;line-height:1.2;margin-top:3px;white-space:nowrap}
tr:hover .td-name{background:#1e293b}
tr:hover .td-name .stock-prod-nome{color:#f1f5f9}
#tab-stock tbody tr.stock-row--active td{background:rgba(59,130,246,.1)}
#tab-stock tbody tr.stock-row--active .td-name{background:rgba(30,64,175,.28)}
#tab-stock tbody tr.stock-row--active .td-name .stock-prod-nome{color:#e0f2fe}
#tab-stock tbody tr.stock-row--active td:first-child{box-shadow:inset 3px 0 0 #3b82f6}
#tab-stock tbody tr.stock-row--active:hover td{background:rgba(59,130,246,.14)}
#tab-stock tbody tr.stock-row--active:hover .td-name{background:rgba(30,64,175,.34)}
.section-header{position:sticky;left:0}
.td-cat{font-size:10px;color:#64748b}
.td-input{width:90px;text-align:right}
.td-input input{width:65px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:5px 6px;color:#f1f5f9;font-size:13px;text-align:right}
.td-input input:focus{outline:none;border-color:#3b82f6}
.td-calc{color:#94a3b8;text-align:right;font-variant-numeric:tabular-nums}
.entradas-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.entradas-tipo-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid #334155}
.tipo-btn{background:#0f172a;border:none;color:#94a3b8;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:600}
.tipo-btn-active,.tipo-btn-active-green{background:#14532d;color:#4ade80}
.tipo-btn-active-red{background:#450a0a;color:#f87171}
.tipo-btn-active-orange{background:#431407;color:#fb923c}
.entradas-select{flex:1.5;min-width:140px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px}
.entradas-qty{width:80px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px;text-align:right}
.entradas-notas{flex:2;min-width:120px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:13px}
.comp-falta{color:#f87171;font-size:12px}
.comp-sobra{color:#fb923c;font-size:12px}
.comp-null{color:#334155;font-size:12px}
.section-header{background:#0f172a;color:#3b82f6;font-size:11px;font-weight:700;text-transform:uppercase;padding:6px 10px;letter-spacing:.5px}

/* Caixa grid */
.caixa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:400px){.caixa-grid{grid-template-columns:1fr}}
.caixa-item label{display:block;font-size:12px;color:#64748b;margin-bottom:4px}
.caixa-item input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f1f5f9;font-size:16px;text-align:right}
.caixa-item input:focus{outline:none;border-color:#3b82f6}
.caixa-total{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #334155}
.caixa-total-label{font-size:13px;color:#94a3b8}
.caixa-total-value{font-size:18px;font-weight:700;color:#4ade80}

/* Dashboard totals */
.total-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.total-grid{grid-template-columns:1fr}}
.total-item{background:#0f172a;border-radius:8px;padding:12px}
.total-item-label{font-size:11px;color:#64748b;margin-bottom:4px}
.total-item-value{font-size:20px;font-weight:700;color:#f1f5f9}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 12px;margin-bottom:16px}
.date-nav button{background:none;border:none;color:#94a3b8;cursor:pointer;padding:2px 6px;font-size:18px;border-radius:4px}
.date-nav button:hover{background:#334155;color:#f1f5f9}
.date-nav > span{flex:1;min-width:0;text-align:center;font-weight:600;font-size:15px}
#date-label{display:block;line-height:1.35;white-space:normal;word-break:break-word}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;width:100%;max-width:380px}
.login-logo{font-size:28px;font-weight:800;color:#3b82f6;margin-bottom:4px}
.login-sub{color:#64748b;font-size:14px;margin-bottom:28px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border-radius:16px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1}

/* Setup */

/* Produto list */
.produto-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #334155}
.produto-row:last-child{border-bottom:none}
.produto-info{flex:1}
.produto-nome{font-size:14px;font-weight:500}
.produto-meta{font-size:12px;color:#64748b}
.produto-actions{display:flex;gap:6px}

/* Vendas (turno): grid em vez de CSS columns — evita sobreposição com linhas altas (bebidas por copo) */
.vendas-menu-2col{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  column-gap:16px;
  align-items:start;
}
.vendas-menu-2col .produto-row{
  align-items:flex-start;
  min-width:0;
}
@media(max-width:540px){
  .vendas-menu-2col{grid-template-columns:1fr}
}
.venda-qty-input{
  width:56px;
  text-align:center;
  padding:6px 4px;
  border-radius:6px;
  border:1px solid #334155;
  background:#0f172a;
  color:#e2e8f0;
  font-size:14px;
  font-weight:600;
  -moz-appearance:textfield;
}
.venda-qty-input::-webkit-outer-spin-button,.venda-qty-input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

/* Calendário mensal (estado dos turnos) */
.cal-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.cal-legend-intro{font-size:12px;color:#94a3b8;line-height:1.45;margin:0 0 14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:#64748b;padding:6px 2px;text-transform:uppercase;letter-spacing:.04em}
.cal-cell{
  min-height:76px;border:1px solid #334155;border-radius:10px;padding:6px 6px 8px;background:#0f172a;
  cursor:pointer;transition:border-color .15s,background .15s
}
.cal-cell:hover{background:#1e293b;border-color:#475569}
.cal-cell--today{border-color:#3b82f6;box-shadow:0 0 0 1px rgba(59,130,246,.35)}
.cal-cell--empty{background:transparent;border:none;cursor:default;min-height:8px;pointer-events:none}
.cal-daynum{font-size:14px;font-weight:700;color:#f1f5f9}
.cal-shifts{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;align-items:center}
.cal-pill{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;line-height:1.2}
.cal-pill--livre{background:#1e293b;color:#64748b;border:1px dashed #475569}
.cal-pill--aberto{background:#14532d;color:#86efac}
.cal-pill--fechado{background:#292524;color:#a8a29e}
@media(max-width:400px){
  .cal-cell{min-height:68px;padding:4px}
  .cal-pill{font-size:8px;padding:2px 3px}
}

/* Alert */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-error{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.alert-success{background:#14532d;color:#86efac;border:1px solid #166534}
.alert-warn{background:#451a03;color:#fdba74;border:1px solid #c2410c}

/* Estado de gravação no turno: altura estável, sem saltar o layout */
.turno-msg{
  min-height:1.35em;
  margin-bottom:10px;
  font-size:11px;
  line-height:1.35;
  color:#64748b;
}
.turno-msg-pending{color:#64748b;opacity:.72}
.turno-msg-ok{color:#5eead4;opacity:.88}
.turno-msg-errbox{
  color:#fecaca;
  font-size:11px;
  line-height:1.4;
  padding:6px 10px;
  background:rgba(69,10,10,.4);
  border-radius:6px;
  border:1px solid rgba(127,29,29,.45);
}
.turno-msg-spacer{display:inline-block;min-height:1.35em;vertical-align:top}

/* Utils */
.text-center{text-align:center}
.text-right{text-align:right}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.flex{display:flex}
.gap-8{gap:8px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.hidden{display:none}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.turno-tabs{display:flex;gap:4px;padding:0 0 0 0;border-bottom:2px solid #1e293b;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.turno-tabs::-webkit-scrollbar{display:none}
.turno-tab{flex-shrink:0;padding:8px 16px;border-radius:8px 8px 0 0;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:color .15s,background .15s}
.turno-tab:hover{color:#cbd5e1;background:#1e293b}
.turno-tab.active{color:#f1f5f9;background:#1e293b;border-bottom:2px solid #3b82f6;margin-bottom:-2px}
.turno-tab-panel{display:none}.turno-tab-panel.active{display:block}
#content > .armazem-tab-panel{display:none}#content > .armazem-tab-panel.active{display:block}
input.stock-caixa-required-missing,textarea.stock-caixa-required-missing{border-color:#f87171!important;box-shadow:0 0 0 1px rgba(248,113,113,.5)}

/* Escala da semana (página Dia) — grelha turnos × dias */
.dia-escala-intro{font-size:12px;color:#94a3b8;margin:0 0 14px;line-height:1.45}
.dia-escala-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
.dia-escala-grid{
  display:grid;
  grid-template-columns:minmax(76px,92px) repeat(7,minmax(88px,1fr));
  grid-template-rows:auto repeat(3,minmax(72px,auto));
  min-width:700px;
  border:1px solid #334155;
  border-radius:10px;
  overflow:hidden;
  background:#0a0f1a;
}
.dia-escala-corner{
  background:#0f172a;
  border-bottom:1px solid #334155;
  border-right:1px solid #334155;
}
.dia-escala-colhead{
  text-align:center;
  padding:10px 4px 8px;
  background:#0f172a;
  border-bottom:1px solid #334155;
  border-right:1px solid #334155;
  color:#94a3b8;
  font-weight:800;
  font-size:11px;
  letter-spacing:.06em;
}
.dia-escala-colhead:last-of-type{border-right:none}
.dia-escala-colhead-date{display:block;font-weight:500;font-size:10px;color:#64748b;margin-top:4px;letter-spacing:0}
.dia-escala-colhead--anchor{background:rgba(59,130,246,0.14);color:#bfdbfe}
.dia-escala-colhead--anchor .dia-escala-colhead-date{color:#93c5fd}
.dia-escala-rowhead{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:center;
  gap:3px;
  padding:8px 10px 8px 6px;
  font-weight:700;
  font-size:13px;
  border-bottom:1px solid #334155;
  border-right:1px solid #334155;
  background:#0c1222;
}
.dia-escala-rowhead-time{font-size:10px;font-weight:600;color:#64748b;white-space:nowrap;line-height:1.2}
.dia-escala-shift--manha{color:#fb923c}
.dia-escala-shift--tarde{color:#60a5fa}
.dia-escala-shift--noite{color:#a78bfa}
.dia-escala-cell{
  border-bottom:1px solid #334155;
  border-right:1px solid #334155;
  padding:8px 6px;
  background:rgba(15,23,42,0.9);
  min-height:72px;
}
.dia-escala-cell:nth-child(8n){border-right:none}
.dia-escala-cell--anchor{background:rgba(59,130,246,0.08)}
.dia-escala-chips{display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;align-items:flex-start}
.dia-escala-chip{
  display:inline-block;
  background:#1e3a5f;
  color:#f8fafc;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:500;
  line-height:1.25;
  border:1px solid #2d4a6f;
  max-width:100%;
  word-break:break-word;
}
.dia-escala-empty{color:#475569;font-size:12px;padding:6px 4px}
.dia-escala-area-badge{display:inline-block;margin-left:4px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(167,139,250,0.22);color:#c4b5fd;vertical-align:middle}
.escala-area-sel{font-size:10px;max-width:100%;padding:3px 6px;border-radius:4px;background:#0f172a;border:1px solid #334155;color:#94a3b8}
</style>
</head>
<body>
<div id="env-banner"></div>
<div id="app"></div>
<script>
(function(){
  var h = location.hostname;
  var banner = document.getElementById('env-banner');
  function setEnvBanner(env, detail) {
    document.body.classList.remove('env-develop','env-qualidade');
    if (!env) {
      banner.textContent = '';
      banner.removeAttribute('title');
      return;
    }
    document.body.classList.add('env-' + env);
    if (env === 'develop') {
      banner.textContent = '⚠ Ambiente de Desenvolvimento' + (detail ? ' · ' + detail : '');
    } else {
      banner.textContent = '🔵 Ambiente de Qualidade' + (detail ? ' · ' + detail : '');
    }
  }
  if (h.includes('localhost')) setEnvBanner('develop', 'local');
  else if (h.includes('develop')) setEnvBanner('develop');

    if (ctrl.tagName === 'BUTTON') ctrl.disabled = wasDisabled;
    restore();
  }
}

// ── ROUTER ────────────────────────────────────────────────────
async function navigate(page, params) {
  S.page = page;
  if (params) Object.assign(S, params);
  if (page !== 'turno') S.turnoId = null;
  await draw();
}

async function draw() {
  if (!S.token) { drawLogin(); return; }
  if (S.user?.role === 'compras' && !['dia', 'turno', 'armazem', 'produtos', 'fornecedores', 'depositos', 'calendario'].includes(S.page)) {
    S.page = 'dia';
  }
  if (S.page === 'admin' && S.user?.role !== 'admin') {
    S.page = 'dia';
  }
  if (S.page === 'escala' && !(S.user?.role === 'admin' || S.user?.role === 'gestor')) {
    S.page = 'dia';
  }
  try {
    switch (S.page) {
      case 'dia':      await drawDia(); break;
      case 'calendario': await drawCalendario(); break;
      case 'depositos':
        if (!['admin', 'gestor', 'compras'].includes(S.user?.role)) { await navigate('dia'); return; }
        await drawDepositos();
        break;
      case 'turno':
        if (!S.turnoId) { S.page = 'dia'; await drawDia(); break; }
        await drawTurno();
        break;
      case 'historico':await drawHistorico(); break;
      case 'irregularidades':
        if (S.user?.role === 'compras') {
          await navigate('dia');
          break;
        }
        await drawIrregularidades();
        break;
      case 'armazem':  await drawArmazem(); break;
      case 'fornecedores':
        if (!['admin', 'gestor', 'compras'].includes(S.user?.role)) { await navigate('dia'); return; }
        await drawFornecedores();
        break;
      case 'produtos': await drawProdutos(); break;
      case 'escala':   await drawEscala(); break;
      case 'admin':    await drawAdmin(); break;
      default:         await drawDia();
    }
  } finally {
    if (S.token) persistUiState();
  }
}

// ── LOGIN ─────────────────────────────────────────────────────
function drawLogin() {
  render(`
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">StockOS</div>
        <div class="login-sub">Sistema de gestão de turnos</div>
        <div id="login-msg"></div>
        <div class="field">
          <label>Nome de utilizador</label>
          <input id="l-login" type="text" placeholder="ex.: admin" autocomplete="username" autocapitalize="off"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input id="l-pass" type="password" placeholder="••••••" autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="runAction(event, doLogin)">Entrar</button>
      </div>
    </div>
  `);
  const enterLogin = e => {
    if (e.key === 'Enter')
      runAction({ currentTarget: document.querySelector('#login-screen .btn-primary') }, doLogin);
  };
  document.getElementById('l-login').addEventListener('keydown', enterLogin);
  document.getElementById('l-pass').addEventListener('keydown', enterLogin);
}

function sanitizeLoginErr(msg) {
  return sanitizeAuthLoginResponseErro(msg);
}

async function doLogin() {
  const login = val('l-login'), password = val('l-pass');
  try {
    const data = await api('POST', '/auth/login', { login, password });
    S.token = data.token; S.user = data.user;
    localStorage.setItem('token', S.token);
    localStorage.setItem('user', JSON.stringify(S.user));
    // Não await: navigate → drawDia → loadDia espera dbReady no servidor (cold start longo);
    // se await, o botão «Entrar» fica em «A processar…» até a BD terminar o init.
    navigate('dia').catch((e) =>
      err('login-msg', sanitizeLoginErr(e && e.message != null ? e.message : String(e)))
    );
  } catch (e) { err('login-msg', sanitizeLoginErr(e && e.message != null ? e.message : String(e))); }
}

function doLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('token'); localStorage.removeItem('user');
  clearSessionUiState();
  drawLogin();
}

function syncDatePickersAcrossPages() {
  const dl = document.getElementById('date-label');
  if (dl) dl.textContent = dateLabelWithWeekday(S.date);
  const dp = document.getElementById('date-picker');
  if (dp) dp.value = S.date;
  const armSub = document.getElementById('armazem-registo-dia');
  if (armSub) armSub.textContent = 'Registo diário · ' + dateLabelWithWeekday(S.date);
}

async function changeDate(n) {
  S.date = addDays(S.date, n);
  syncDatePickersAcrossPages();
  if (S.page === 'depositos') await loadDepositos();
  else if (S.page === 'armazem') {
    await refreshArmazemFundos();
    await loadArmazemData();
  } else await loadDia();
  persistUiState();
}
async function pickDate(val) {
  if (!val) return;
  S.date = val;
  syncDatePickersAcrossPages();
  if (S.page === 'depositos') await loadDepositos();
  else if (S.page === 'armazem') {
    await refreshArmazemFundos();
    await loadArmazemData();
  } else await loadDia();
  persistUiState();
}

  const totalSaidasNoDeposito = (depositos || []).reduce((s, d) => s + (parseFloat(d.valor_saidas) || 0), 0);
  const totalDepositos = Math.max(0, sumValorBruto - totalSaidasNoDeposito);
  const totalTpaRegistado = (depositos || []).reduce((s, d) => s + (parseFloat(d.valor_tpa) || 0), 0);
  let destinoSaidasComum = '';
  for (const d of depositos || []) {
    if ((parseFloat(d.valor_saidas) || 0) > 0 && String(d.saidas_destino || '').trim()) {
      destinoSaidasComum = String(d.saidas_destino || '').trim();
      break;
    }
  }
  let borderoDiaUrl = '';
  for (const t of [...turnos].sort((a, b) => (({ manha: 1, tarde: 2, noite: 3 }[a.nome]) || 9) - (({ manha: 1, tarde: 2, noite: 3 }[b.nome]) || 9))) {

const ESCALA_DIA_ABREV = ['SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB', 'DOM'];

/** Áreas de trabalho por funcionário na escala (1–3); textos alinhados ao cartão do turno. */
const AREAS_TRABALHO_META = [
  { id: 1, abbr: 'A1', label: 'Caixa, fino, limpeza do passeio' },
  { id: 2, abbr: 'A2', label: 'Hambúrguer, limpeza chão da sala, deixar o lixo' },
  { id: 3, abbr: 'A3', label: 'Petisco, limpeza do chão da cozinha, lavar a loiça' }
];
function areaTrabalhoLabel(n) {
  const x = parseInt(n, 10);
  const m = AREAS_TRABALHO_META.find((a) => a.id === x);
  return m ? m.label : '';
}
function areaTrabalhoAbbr(n) {
  const x = parseInt(n, 10);
  const m = AREAS_TRABALHO_META.find((a) => a.id === x);
  return m ? m.abbr : '';
}

function escalaRowDataStr(r) {
  if (!r || r.data == null) return '';
  return String(r.data).slice(0, 10);
}

/** Escala da semana na página Dia: grelha dias × turnos (só leitura; chips como referência visual). */
function htmlEscalaSemanaReadonly(rowsWeek, rowsTemplate, anchorDateStr) {
  const week = Array.isArray(rowsWeek) ? rowsWeek : [];
  const tpl = Array.isArray(rowsTemplate) ? rowsTemplate : [];
  const mon = mondayOfWeekIso(anchorDateStr);
  const dom = addDays(mon, 6);
  const turnos = [
    { nome: 'manha', label: 'Manhã', horario: turnoHorarioLabel('manha'), cls: 'dia-escala-shift--manha' },
    { nome: 'tarde', label: 'Tarde', horario: turnoHorarioLabel('tarde'), cls: 'dia-escala-shift--tarde' },
    { nome: 'noite', label: 'Noite', horario: turnoHorarioLabel('noite'), cls: 'dia-escala-shift--noite' }
  ];
  function listaCell(dayIdx, turnoNome) {
    const dateStr = addDays(mon, dayIdx);
    const listaDia = week.filter(r => escalaRowDataStr(r) === dateStr && r.turno === turnoNome);
    const listaTpl = tpl.filter(r => Number(r.dia_semana) === dayIdx && r.turno === turnoNome);
    return listaDia.length ? listaDia : listaTpl;
  }
  function chipsHtml(lista) {
    if (!lista.length) return '<span class="dia-escala-empty">—</span>';
    return lista.map(r => {
      const tipParts = [];
      if (r.utilizador_role) tipParts.push(String(r.utilizador_role).toUpperCase());
      const a = r.area_trabalho != null && r.area_trabalho !== '' ? parseInt(r.area_trabalho, 10) : NaN;
      if (Number.isFinite(a) && a >= 1 && a <= 3) tipParts.push(`Área ${areaTrabalhoAbbr(a)}: ${areaTrabalhoLabel(a)}`);
      if (r.notas) tipParts.push(String(r.notas));
      const tip = tipParts.join(' · ');
      const abbr = Number.isFinite(a) && a >= 1 && a <= 3 ? ` <span class="dia-escala-area-badge">${areaTrabalhoAbbr(a)}</span>` : '';
      return `<span class="dia-escala-chip" ${tip ? `title="${escapeHtml(tip)}"` : ''}>${escapeHtml(r.utilizador_nome || 'Sem nome')}${abbr}</span>`;
    }).join('');
  }
  const parts = ['<div class="dia-escala-corner"></div>'];
  for (let i = 0; i < 7; i++) {
    const dateStr = addDays(mon, i);
    const anchor = dateStr === anchorDateStr;
    parts.push(`<div class="dia-escala-colhead${anchor ? ' dia-escala-colhead--anchor' : ''}">${ESCALA_DIA_ABREV[i]}<span class="dia-escala-colhead-date">${dateLabel(dateStr)}</span></div>`);
  }
  for (const t of turnos) {
    parts.push(`<div class="dia-escala-rowhead ${t.cls}"><span>${t.label}</span><span class="dia-escala-rowhead-time">${t.horario}</span></div>`);
    for (let i = 0; i < 7; i++) {
      const dateStr = addDays(mon, i);
      const anchor = dateStr === anchorDateStr;
      const lista = listaCell(i, t.nome);
      parts.push(`<div class="dia-escala-cell${anchor ? ' dia-escala-cell--anchor' : ''}"><div class="dia-escala-chips">${chipsHtml(lista)}</div></div>`);
    }
  }
  return `
    <div class="card" id="dia-escala-readonly">
      <div class="card-title">👥 Escala da semana</div>
      <p class="dia-escala-intro">Semana de <strong style="color:#cbd5e1">${dateLabel(mon)}</strong> a <strong style="color:#cbd5e1">${dateLabel(dom)}</strong>. Apenas consulta. Onde não há escala para a data, usa-se o modelo semanal. Coluna realçada: dia seleccionado. <strong style="color:#94a3b8">Horários:</strong> Manhã ${turnoHorarioLabel('manha')} · Tarde ${turnoHorarioLabel('tarde')} · Noite ${turnoHorarioLabel('noite')}.</p>
      <div class="dia-escala-scroll">
        <div class="dia-escala-grid">
          ${parts.join('')}
        </div>
      </div>
    </div>`;
}

async function loadDia() {
  try {
    const monEsc = mondayOfWeekIso(S.date);
    const qMon = encodeURIComponent(monEsc);
    const qDom = encodeURIComponent(addDays(monEsc, 6));

    const turnos = await api('GET', `/dia?data=${S.date}&resumo=1`);
    S.turnosDia = turnos;
    const turnoMap = {};
    turnos.forEach(t => { turnoMap[t.nome] = t; });

    const cards = ['manha','tarde','noite'].map(nome => {
      const t = turnoMap[nome];
      if (!t) {
        const pr = podeAbrirTurnoAgora(S.date, nome);
        if (!pr.ok) {
          return `
          <div class="turno-card turno-card--locked">
            <div class="turno-card-nome">${turnoLabel(nome)}</div>
            <div class="badge badge-grey" style="margin-bottom:8px">Não iniciado</div>
            <div style="font-size:11px;color:#94a3b8;line-height:1.35;margin-bottom:8px">${escapeHtml(pr.msg)}</div>
            <div class="turno-card-abrir">
              <button type="button" class="btn btn-primary btn-sm btn-full" disabled>Abrir Turno</button>
            </div>
          </div>`;
        }
        return `
          <div class="turno-card" onclick="runAction(event, () => abrirTurno('${nome}'))">
            <div class="turno-card-nome">${turnoLabel(nome)}</div>
            <div class="badge badge-grey" style="margin-bottom:8px">Não iniciado</div>
            <div class="turno-card-abrir">
              <button class="btn btn-primary btn-sm btn-full">Abrir Turno</button>
            </div>
          </div>`;
      }
      const totalVendas = t.total_vendas || 0;
      const totalCaixa  = t.caixa?.total_final || 0;
      const cls = t.estado === 'aberto' ? 'aberto' : 'fechado';
      const antecipado = t.estado === 'aberto' && turnoAbertoAntesDoHorarioOficial(S.date, nome);
      const startM = TURNO_INICIO_MINUTES[nome];
      const hi = startM != null ? `${String(Math.floor(startM / 60)).padStart(2, '0')}:${String(startM % 60).padStart(2, '0')}` : '';
      const badge = t.estado === 'aberto'
        ? (antecipado
          ? '<span class="badge badge-amber">Aberto antes do horário</span>'
          : '<span class="badge badge-green">Aberto</span>')
        : '<span class="badge badge-grey">Fechado</span>';
      const avisoAnt = antecipado
        ? `<div style="font-size:11px;color:#fb923c;margin-top:6px;line-height:1.35">Início oficial ${hi}. Fecha o turno e volta a abrir após essa hora se for erro.</div>`
        : '';
      return `
        <div class="turno-card ${cls}${antecipado ? ' turno-card--antecipado' : ''}" onclick="runAction(event, () => navigate('turno',{turnoId:'${t.id}'}))">
          <div class="turno-card-nome">${turnoLabel(nome)}</div>
          <div class="turno-card-status">${badge}</div>
          <div class="turno-card-value">${fmt(totalCaixa)}</div>
          <div class="turno-card-label">Total Caixa</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px">Vendas: ${fmt(totalVendas)}</div>
          ${avisoAnt}
        </div>`;
    }).join('');

    const escalaLoading = `<div id="dia-escala-slot" class="card"><div class="text-center" style="padding:28px;color:#64748b"><div class="spinner"></div><div style="margin-top:10px;font-size:12px">A carregar escala…</div></div></div>`;

    show('dia-content', `
      <div class="turno-cards">${cards}</div>
      ${escalaLoading}
    `);

    api('GET', `/escala/semana?data_inicio=${qMon}&data_fim=${qDom}`)
      .catch(() => ({ semana: [], template: [] }))
      .then((escalaPack) => {
      if (S.page !== 'dia') return;
      try {
        const escRowsWeek = escalaPack?.semana || [];
        const escTpl = escalaPack?.template || [];
        const slotE = document.getElementById('dia-escala-slot');
        if (slotE) slotE.outerHTML = htmlEscalaSemanaReadonly(escRowsWeek, escTpl, S.date);
      } catch (err) {
        const slotE = document.getElementById('dia-escala-slot');
        if (slotE) slotE.innerHTML = `<div class="alert alert-error" style="margin:12px">${err && err.message ? err.message : String(err)}</div>`;
      }
    }).catch((e) => {
      if (S.page !== 'dia') return;
      const slotE = document.getElementById('dia-escala-slot');
      if (slotE) slotE.innerHTML = `<div class="alert alert-error" style="margin:12px">${e.message}</div>`;
    });
  } catch(e) {
    show('dia-content', `<div class="alert alert-error">${e.message}</div>`);
  }
}

function calMonthTitle(ym) {
  const parts = String(ym || '').split('-');
  if (parts.length < 2) return ym;
  const y = parseInt(parts[0], 10);
  const mo = parseInt(parts[1], 10);
  if (!Number.isFinite(y) || !Number.isFinite(mo)) return ym;
  const d = new Date(y, mo - 1, 1);
  const raw = d.toLocaleDateString('pt-AO', { month: 'long', year: 'numeric' });
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

  S.calYM = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  loadCalendarioTurnos();
  persistUiState();

async function loadCalendarioTurnos() {
  const wrap = document.getElementById('cal-content');
  const lab = document.getElementById('cal-month-label');
  if (lab) lab.textContent = calMonthTitle(S.calYM);
  if (!wrap) return;
  wrap.innerHTML = '<div class="text-center" style="padding:32px;color:#64748b"><div class="spinner"></div></div>';
  try {
    const parts = String(S.calYM || '').split('-');
    const y = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    const rows = await api('GET', `/calendario-turnos?ano=${y}&mes=${m}`);
    const byDay = {};
    for (const r of rows) {
      const dk = String(r.data).slice(0, 10);
      if (!byDay[dk]) byDay[dk] = {};
      byDay[dk][r.nome] = { estado: r.estado, id: r.id };
    }
    const pad = (n) => String(n).padStart(2, '0');
    const lastDay = new Date(y, m, 0).getDate();
    const today = new Date().toISOString().split('T')[0];
    const weekHtml = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom']
      .map((w) => `<div class="cal-wd">${w}</div>`)
      .join('');
    const jsDow1 = new Date(y, m - 1, 1).getDay();
    const lead = (jsDow1 + 6) % 7;
    let cells = '';
    for (let i = 0; i < lead; i++) cells += '<div class="cal-cell cal-cell--empty"></div>';
    for (let d = 1; d <= lastDay; d++) {
      const iso = `${y}-${pad(m)}-${pad(d)}`;
      const map = byDay[iso] || {};
      const isToday = iso === today;
      const pills = ['manha', 'tarde', 'noite'].map((nome) => {
        const t = map[nome];
        const L = nome === 'manha' ? 'M' : nome === 'tarde' ? 'T' : 'N';
        if (!t) return `<span class="cal-pill cal-pill--livre" title="${turnoLabel(nome)}: não iniciado">${L}</span>`;
        const cls = t.estado === 'aberto' ? 'cal-pill--aberto' : 'cal-pill--fechado';
        const st = t.estado === 'aberto' ? 'aberto' : 'fechado';
        return `<span class="cal-pill ${cls}" title="${turnoLabel(nome)}: ${st}">${L}</span>`;
      }).join('');
      cells += `
        <div class="cal-cell${isToday ? ' cal-cell--today' : ''}" role="button" tabindex="0"
          onclick="runAction(event, () => goDiaFromCal('${iso}'))"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();runAction(event, () => goDiaFromCal('${iso}'))}">
          <div class="cal-daynum">${d}</div>
          <div class="cal-shifts">${pills}</div>
        </div>`;
    }
    wrap.innerHTML = `
      <div class="card">
        <p class="cal-legend-intro">Cada dia: <strong>M</strong> manhã, <strong>T</strong> tarde, <strong>N</strong> noite.
        <span class="cal-pill cal-pill--livre" style="margin:0 4px">M</span> não iniciado ·
        <span class="cal-pill cal-pill--aberto" style="margin:0 4px">M</span> aberto ·
        <span class="cal-pill cal-pill--fechado" style="margin:0 4px">M</span> fechado.
        Toque num dia para ver a vista <strong>Dia</strong>.</p>
        <div class="cal-grid">${weekHtml}${cells}</div>
      </div>`;
  } catch (e) {
    wrap.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
  }
}

function updateDepSaidasDestinoRequired() {
  const inp = document.getElementById('dep-saidas-dia');
  const ta = document.getElementById('dep-saidas-destino-dia');
  const hint = document.getElementById('dep-saidas-destino-hint');
  if (!inp || !ta || !hint) return;
  const s = parseRaw(inp.value);
  const need = s > 0;
  ta.required = need;
  hint.style.display = need ? 'inline' : 'none';
}

function updateDepPreviewTotal() {
  const el = document.getElementById('dep-total-preview');
  if (!el) return;
  let sumB = 0;
  for (const t of (S.turnosDia || [])) {
    if (t.estado !== 'fechado') continue;
    const brutoEl = document.getElementById('dep-bruto-' + t.id);
    if (!brutoEl || brutoEl.disabled) continue;
    const b = parseRaw(brutoEl.value);
    if (b > 0) sumB += b;
  }
  const saidasU = parseRaw(document.getElementById('dep-saidas-dia')?.value);
  const liq = Math.max(0, sumB - saidasU);
  el.textContent = fmt(liq);
  updateDepSaidasDestinoRequired();
}

async function submitDepositosDia() {
  try {
    const dataDep = val('dep-data-dia');
    const refDia = val('dep-ref-dia');
    const notasDia = val('dep-notas-dia');
    const saidasUnica = parseRaw(val('dep-saidas-dia'));
    const destinoSaidas = val('dep-saidas-destino-dia').trim();
    if (saidasUnica < 0) {
      alert('O valor para compras de armazém (saída no depósito) não pode ser negativo.');
      return;
    }
    if (saidasUnica > 0 && !destinoSaidas) {
      alert('Indica o que foi comprado para o armazém / stock (descrição obrigatória quando há valor retirado do depósito).');
      return;
    }
    const rows = [];
    const turnos = S.turnosDia || [];
    for (const t of turnos) {
      if (t.estado !== 'fechado') continue;
      const id = t.id;
      const bruto = parseRaw(val('dep-bruto-' + id));
      if (!bruto || bruto <= 0) continue;
      const vtpa = parseRaw(val('dep-tpa-' + id));
      if (Number.isNaN(vtpa) || vtpa < 0) {
        alert('Indica o valor TPA (≥ 0) para ' + turnoLabel(t.nome) + '.');
        return;
      }
      rows.push({ turno_id: id, bruto, valor_tpa: vtpa });
    }
    if (!rows.length) {
      const temFechado = (S.turnosDia || []).some(t => t.estado === 'fechado');
      alert(
        temFechado
          ? 'Indica valor bruto (> 0) em pelo menos um turno fechado.'
          : 'Não há turnos fechados neste dia — fecha um turno antes de registar o depósito.'
      );
      return;
    }
    const sumB = rows.reduce((s, r) => s + r.bruto, 0);
    if (saidasUnica > sumB) {
      alert('O valor para armazém não pode ser maior que a soma dos valores brutos (' + fmt(sumB) + ').');
      return;
    }
    if (sumB - saidasUnica <= 0) {
      alert('O líquido depositado (brutos menos compras de armazém) tem de ser positivo.');
      return;
    }
    const itens = rows.map((r) => ({
      turno_id: r.turno_id,
      data_deposito: dataDep,
      valor_bruto: r.bruto,
      valor_tpa: r.valor_tpa,
      referencia: refDia,
      notas: notasDia
    }));
    const borderoInp = document.getElementById('dep-bordero-dia');
    let borderoB64 = '';
    if (borderoInp && borderoInp.files && borderoInp.files[0]) {
      borderoB64 = await fileToDataUrl(borderoInp.files[0]);
    }
    const payload = { itens, valor_saidas_total: saidasUnica, saidas_destino: destinoSaidas };
    if (borderoB64) payload.bordero_foto_base64 = borderoB64;
    await api('POST', '/depositos/lote', payload);
    await reloadDepositsView();
  } catch (e) {
    alert(e.message || String(e));
  }
}

async function uploadBorderoDia(inputEl) {
  if (!inputEl || !inputEl.files || !inputEl.files[0]) return;
  inputEl.disabled = true;
  try {
    const b64 = await fileToDataUrl(inputEl.files[0]);
    await api('POST', '/depositos/bordero-dia', { data: S.date, foto_base64: b64 });
    inputEl.value = '';
    await reloadDepositsView();
  } catch (e) {
    alert(e.message || String(e));
  } finally {
    inputEl.disabled = false;
  }
}

async function abrirTurno(nome) {
  const pr = podeAbrirTurnoAgora(S.date, nome);
  if (!pr.ok) {
    alert(pr.msg);
    return;
  }
  try {

// Stock buffer for edits
let stockBuf = {};
let caixaBuf = {};
let receitasBuf = {}; // { produto_id: [{componente_id, quantidade}] }
let menuProdIds   = []; // ids dos produtos de menu (inserção manual)
let bebidaProdIds = []; // ids das bebidas (só unidade / stock) em Vendas
let bebidaCopoProdIds = []; // bebidas vendidas por copo (input qty)
let bebidaCopoCfg = {}; // { id: { kgPorCopo, preco, qtdPacote, precoPacote } }
let bebidaProdPrecos = {}; // { produto_id: preco } para calcular total
let avulsoProdIds = []; // ids dos ingredientes com venda_avulso=true
let vendasProdPrecos = {}; // { produto_id: preco } para todos os produtos de vendas
/** Nome a partir do catálogo (evita «Produto uuid» quando stock e vendas diferem no id). */
let vendasProdNomes = {};

/** Fino Barril só na folha de stock (kg), não na aba Vendas nem nos totais de vendas. */
function isFinoBarrilNome(nome) {
  return String(nome || '').trim().toLowerCase() === 'fino barril';
}

/** Linha de stock do turno para um produto: `stockBuf` (editável) ou fallback a `S.turnoData.stock`. */
function getStockLineForProduto(pid) {
  const k = prodIdKey(pid);
  if (!k) return { encontrado: 0, entrada: 0, deixado: 0, fechados: 0 };
  if (stockBuf[k] != null) return stockBuf[k];
  const row = (S.turnoData?.stock || []).find(s => prodIdKey(s.produto_id) === k);
  if (row) {
    return {
      encontrado: parseFloat(row.encontrado) || 0,
      entrada: parseFloat(row.entrada) || 0,
      deixado: parseFloat(row.deixado) || 0,
      fechados: parseFloat(row.fechados) || 0
    };
  }
  return { encontrado: 0, entrada: 0, deixado: 0, fechados: 0 };
}

/** Bebidas por unidade: linhas a partir do stock do turno (API), não só do catálogo /produtos. */
function forEachBebidaUnidadeVendidaLinha(cb) {
  const copo = new Set((bebidaCopoProdIds || []).map((id) => prodIdKey(id)).filter(Boolean));
  for (const s of S.turnoData?.stock || []) {
    if (s.categoria !== 'bebida') continue;
    const pid = prodIdKey(s.produto_id);
    if (!pid) continue;
    if (isFinoBarrilNome(s.produto_nome)) continue;
    if (isFinoBarrilNome(vendasProdNomes[pid])) continue;
    if (copo.has(pid)) continue;
    const b = getStockLineForProduto(pid);
    let vend = Math.max(0, b.encontrado + b.entrada - b.deixado);
    if (vend <= 0 && parseFloat(s.vendido) > 0) vend = Math.max(0, parseFloat(s.vendido));
    if (vend <= 0) continue;
    const nome = s.produto_nome || vendasProdNomes[pid] || 'Bebida';
    let unit = parseFloat(s.preco) || 0;
    if (!unit) unit = parseFloat(vendasProdPrecos[pid]) || parseFloat(vendasProdPrecos[s.produto_id]) || 0;
    const valSnap = s.valor != null && s.valor !== '' ? parseFloat(s.valor) : NaN;
    const sub = !Number.isNaN(valSnap) ? valSnap : vend * unit;
    cb({ pid, s, vend, nome, unit, sub });
  }
}

function calcMenuQty(prodId) {
  const recipe = receitasBuf[prodIdKey(prodId)] || [];
  if (!recipe.length) return null;
  let min = Infinity;
  for (const comp of recipe) {
    const b = stockBuf[prodIdKey(comp.componente_id)] || { encontrado:0, entrada:0, deixado:0 };
    const vendido = Math.max(0, b.encontrado + b.entrada - b.deixado);
    min = Math.min(min, vendido / parseFloat(comp.quantidade));
  }
  return min === Infinity ? 0 : Math.floor(min);
}

function calcStandaloneQty(prodId) {
  const pk = prodIdKey(prodId);
  const b = stockBuf[pk] || { encontrado:0, entrada:0, deixado:0 };
  const total = Math.max(0, b.encontrado + b.entrada - b.deixado);
  let comboUsage = 0;
  for (const [menuProdId, recipe] of Object.entries(receitasBuf)) {
    const comp = recipe.find((r) => prodIdKey(r.componente_id) === pk);
    if (comp) comboUsage += (calcMenuQty(menuProdId) || 0) * comp.quantidade;
  }
  return Math.max(0, total - comboUsage);
}

function refreshMenuQtys() {
  for (const prodId of menuProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    if (!el || document.activeElement === el) continue;
    const v = Math.max(0, Math.round((vendasBuf[prodIdKey(prodId)] || 0) * 1000) / 1000);
    if (el.tagName === 'INPUT') el.value = String(v);
    else el.textContent = String(v);
  }
  for (const prodId of bebidaCopoProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    if (!el || document.activeElement === el) continue;
    const v = Math.max(0, Math.floor(vendasBuf[prodIdKey(prodId)] || 0));
    if (el.tagName === 'INPUT') el.value = String(v);
    else el.textContent = String(v);
  }
  for (const prodId of bebidaProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    const pid = String(prodId);
    const b = getStockLineForProduto(prodId);
    let qty = Math.max(0, b.encontrado + b.entrada - b.deixado);
    const rowSt = (S.turnoData?.stock || []).find(r => String(r.produto_id) === pid);
    if (qty <= 0 && rowSt && parseFloat(rowSt.vendido) > 0) qty = Math.max(0, parseFloat(rowSt.vendido));
    if (el) el.textContent = fmtNum(qty);
  }
  for (const prodId of avulsoProdIds) {
    const el = document.getElementById(`venda-qty-${prodId}`);
    if (el) el.textContent = fmtNum(calcStandaloneQty(prodId));
  }
  refreshVendasTotal();
}

/** Mesma soma que o «Total Vendas» / resumo (Kz). */
function getTotalVendasTurnoKz() {
  let total = 0;
  for (const prodId of menuProdIds) {
    const k = prodIdKey(prodId);
    total += (vendasBuf[k] || 0) * (vendasProdPrecos[prodId] || 0);
  }
  for (const prodId of avulsoProdIds) {
    total += calcStandaloneQty(prodId) * (vendasProdPrecos[prodId] || 0);
  }
  for (const prodId of bebidaCopoProdIds) {
    const k = prodIdKey(prodId);
    const cfg = bebidaCopoCfg[k];
    if (!cfg) continue;
    const copos = vendasBuf[k] || 0;
    total += precoVendaCopos(copos, cfg.preco, cfg.qtdPacote, cfg.precoPacote);
  }
  forEachBebidaUnidadeVendidaLinha(({ sub }) => {
    total += sub;
  });
  return total;
}

function getTotalGeradoCaixaKz() {
  const tpa = parseFloat(document.getElementById('c-tpa')?.value) || 0;
  const transf = parseFloat(document.getElementById('c-transf')?.value) || 0;
  const din = parseFloat(document.getElementById('c-din')?.value) || 0;
  return tpa + transf + din;
}

function refreshVendasTotal() {
  const total = getTotalVendasTurnoKz();
  const elTot = document.getElementById('vendas-total-geral');
  if (elTot) elTot.textContent = fmt(total);
  renderIrregularidadesTurno();
}

async function navTurno(dir) {
  const idx = TURNO_ORDER.indexOf(S.turnoData?.nome);
  let nextIdx = idx + dir;
  let nextDate = S.date;

  if (nextIdx < 0) {
    // vai ao dia anterior
    const d = new Date(S.date + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    nextDate = d.toISOString().split('T')[0];
    nextIdx = TURNO_ORDER.length - 1;
  } else if (nextIdx >= TURNO_ORDER.length) {
    // vai ao próximo dia
    const d = new Date(S.date + 'T12:00:00');
    d.setDate(d.getDate() + 1);
    nextDate = d.toISOString().split('T')[0];
    nextIdx = 0;
  }

  const all = await api('GET', `/dia?data=${nextDate}&resumo=1`);
  const t = all.find(x => x.nome === TURNO_ORDER[nextIdx]);
  if (!t) return;
  S.date = nextDate;
  S.turnoId = t.id;
  await loadTurno();
  persistUiState();
}

let vendasBuf = {};
/** HTML do card «Resumo de vendas» (só na aba Registos; não duplicar em Vendas). */
let lastResumoVendasCardHtml = '';

async function loadVendasMenu(turnoId, canEdit) {
  try {
    const [prods, vendas, todasReceitas] = await Promise.all([
      api('GET', '/produtos?todos=0'),
      api('GET', `/turnos/${turnoId}/vendas`),
      api('GET', '/receitas')
    ]);
    const menuProds   = prods.filter(p => p.categoria === 'menu');
    const bebidaProds = prods.filter(p => p.categoria === 'bebida').filter((p) => !isFinoBarrilNome(p.nome));
    const avulsoProds = prods.filter(p => p.venda_avulso && p.categoria !== 'menu' && p.categoria !== 'bebida');
    vendasProdNomes = {};
    prods.forEach((p) => {
      const id = prodIdKey(p.id);
      if (id) vendasProdNomes[id] = p.nome;
    });
    vendasBuf = {};
    vendas.forEach((v) => {
      const pid = prodIdKey(v.produto_id);
      if (!pid) return;
      vendasBuf[pid] = parseFloat(v.quantidade);
      if (v.produto_nome) vendasProdNomes[pid] = v.produto_nome;
    });

    receitasBuf = {};

/** Grava quantidade de venda (menu ou bebida por copo) ao sair do input. */
async function vendaQtyInputBlur(el) {
  if (!el || el.disabled) return;
  const prodIdRaw = el.getAttribute('data-venda-pid');
  const turnoId = el.getAttribute('data-venda-turno');
  if (!prodIdRaw || !turnoId) return;
  const prodId = prodIdKey(prodIdRaw);
  if (!prodId) return;
  const isCopo = bebidaCopoCfg[prodId]?.kgPorCopo > 0;
  let q = parseFloat(String(el.value).trim());
  if (!Number.isFinite(q)) q = 0;
  if (isCopo) q = Math.max(0, Math.floor(q));
  else q = Math.max(0, Math.round(q * 1000) / 1000);
  el.value = String(q);
  const prev = vendasBuf[prodId] || 0;
  if (q === prev) return;
  vendasBuf[prodId] = q;
  refreshVendasTotal();
  try {
    await api('POST', `/turnos/${turnoId}/vendas`, { produto_id: prodIdRaw, quantidade: q });
    const cfg = bebidaCopoCfg[prodId];
    if (cfg && cfg.kgPorCopo > 0) {
      const delta = q - prev;
      if (!stockBuf[prodId]) stockBuf[prodId] = { encontrado:0, entrada:0, deixado:0, fechados:0 };
      stockBuf[prodId].deixado = Math.max(0, (parseFloat(stockBuf[prodId].deixado) || 0) - delta * cfg.kgPorCopo);
      updateStock(prodIdRaw, 'deixado', fmtStockNumberAttr(stockBuf[prodId].deixado));
    } else {
      renderIrregularidadesTurno();
    }
  } catch(e) {
    vendasBuf[prodId] = prev;
    el.value = String(prev);
    refreshVendasTotal();
    alert('Erro ao registar venda: ' + e.message);
  }
}

function updateStock(pid, field, value) {
  const k = prodIdKey(pid);
  if (!k) return;
  if (!stockBuf[k]) stockBuf[k] = { encontrado:0, entrada:0, deixado:0, fechados:0 };
  stockBuf[k][field] = parseRaw(value);
  const inp = document.querySelector(`input[type="number"][data-stock-pid="${k}"][data-stock-field="${field}"]`);
  if (inp && document.activeElement !== inp) {
    const n = stockBuf[k][field];
    inp.value = fmtStockNumberAttr(n);
  }
  const { encontrado:enc, entrada:ent, deixado:dei } = stockBuf[k];
  const prod = S.turnoData?.stock?.find((s) => prodIdKey(s.produto_id) === k);
  const vend = Math.max(0, enc + ent - dei);
  const ve = document.getElementById(`vend-${k}`);
  const tipoM = prod?.tipo_medicao || 'unidade';
  if (ve) ve.textContent = vend > 0 ? `${fmtNum(vend)} ${medicaoSigla(tipoM)}` : '';
  refreshMenuQtys();
  renderIrregularidadesTurno();
  // Auto-save
  autoSaveSchedule();
}

/**
 * Quantidade «vendida» como na aba Vendas: menu/copos/avulso em vendasBuf; resto = enc+entrada−deixado (stock).
 */
function getVendidoRegistadoEmVendas(s) {
  const pid = prodIdKey(s.produto_id);
  if (!pid) return 0;
  if (menuProdIds.length && menuProdIds.some((id) => prodIdKey(id) === pid)) {
    return Math.max(0, parseFloat(vendasBuf[pid]) || 0);
  }
  if (bebidaCopoProdIds.length && bebidaCopoProdIds.includes(pid)) {
    return Math.max(0, parseFloat(vendasBuf[pid]) || 0);
  }
  if (avulsoProdIds.length && avulsoProdIds.some((id) => prodIdKey(id) === pid)) {
    return calcStandaloneQty(pid);
  }
  const b = getStockLineForProduto(pid);
  let vend = Math.max(0, b.encontrado + b.entrada - b.deixado);
  if (vend <= 0 && parseFloat(s.vendido) > 0) vend = Math.max(0, parseFloat(s.vendido));
  return vend;
}

/** 1 copo Fino = 0,270 kg (barril → copos em irregularidades). */
const KG_FINO_COPO = 0.27;
function prodNomeNorm(n) {
  return String(n || '').trim().toLowerCase();
}
/** Chave estável para mapas `produto_id` / `componente_id` (SERIAL ou UUID). Evita `parseInt` em UUIDs. */
function prodIdKey(id) {
  if (id == null || id === '') return '';
  const s = String(id).trim();
  if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s)) return s.toLowerCase();
  return s;
}
/** Bloco irregularidades Batata: nome legado ou prefixo `Batata Pré-frita …` (ex.: "… stock"). NBSP → espaço. */
function isProdutoBatataIrreg(nome) {
  let bn = String(nome || '')
    .trim()
    .toLowerCase()
    .replace(/\u00a0/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  return bn === 'batata pré-frita' || bn.startsWith('batata pré-frita ');
}
/** Ingrediente Coxa nas irregularidades: nome exacto «Coxa» ou prefixo «Coxa …» (ex.: «Coxa stock»). */
function isProdutoCoxaIrreg(nome) {
  let bn = String(nome || '')
    .trim()
    .toLowerCase()
    .replace(/\u00a0/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  return bn === 'coxa' || bn.startsWith('coxa ');
}
function resolveProdutoIdPorNomeFromLists(stockArr, produtosArr, nomeNorm) {
  const row = stockArr.find((s) => prodNomeNorm(s.produto_nome) === nomeNorm);
  if (row) return String(row.produto_id);
  const pr = (produtosArr || []).find((p) => prodNomeNorm(p.nome) === nomeNorm);
  return pr ? String(pr.id) : null;
}
/** Peso do recipiente vazio (barril): usa `peso_tara_kg` ou 12,9 kg. */
function getFinoBarrilRecipienteKgFromRow(stockRow) {
  if (!stockRow || prodNomeNorm(stockRow.produto_nome) !== 'fino barril') return null;
  const t = parseFloat(stockRow.peso_tara_kg);
  return Number.isFinite(t) && t > 0 ? t : 12.9;
}
/** Encontrado/Deixado a 0 → peso do recipiente (só turno aberto). */
function aplicarFinoBarrilZeroParaRecipienteKg(turno, canEdit) {
  if (!canEdit || !turno?.stock?.length) return false;
  const row = turno.stock.find((s) => prodNomeNorm(s.produto_nome) === 'fino barril');
  if (!row) return false;
  const kg = getFinoBarrilRecipienteKgFromRow(row);
  if (kg == null) return false;
  const sid = prodIdKey(row.produto_id);
  if (!sid || !stockBuf[sid]) return false;
  let ch = false;
  if (parseFloat(stockBuf[sid].encontrado) === 0) {
    stockBuf[sid].encontrado = kg;
    ch = true;
  }
  if (parseFloat(stockBuf[sid].deixado) === 0) {
    stockBuf[sid].deixado = kg;
    ch = true;
  }
  return ch;
}

/** Nomes de quem registou presença no turno (equipa real), para o cartão Irregularidades. */
async function refreshIrregularidadesEquipaLine(show) {
  const el = document.getElementById('turno-irregularidades-equipa');
  if (!el) return;
  if (!show) {
    el.textContent = '';
    return;
  }
  const tid = S.turnoData?.id;
  if (!tid) {
    el.textContent = '';
    return;
  }
  try {
    const equipaReal = await api('GET', `/turnos/${tid}/equipa-real`);
    const names = (equipaReal || [])
      .map((r) => String(r.utilizador_nome || '').trim())
      .filter(Boolean);
    el.textContent = names.length
      ? `Trabalharam: ${names.join(', ')}`
      : 'Trabalharam: — (sem registo na aba Escala)';
  } catch (_) {
    el.textContent = '';
  }
}

/** Tolerância ao comparar quantidade ingrediente vs Σ menus (Batata, Coxa, …; ruído float). */
const KG_IRREG_COMPONENTE_EPS = 0.02;

/**
 * Quantidade (un. ou kg conforme receita) imputável a partir de vendas de **menu** com linha de receita
 * directa para o `componenteProdId` (sem venda avulsa nem expansão recursiva).
 */
function totalQtyComponenteFromMenusReceitaDirecta(vm, componenteProdId, receitasByProduto, produtos) {
  const compKey = prodIdKey(componenteProdId);
  if (!compKey) return 0;
  let total = 0;
  const menus = (produtos || []).filter((p) => p.categoria === 'menu');
  for (const p of menus) {
    const menuKey = prodIdKey(p.id);
    if (!menuKey) continue;
    const qtyMenu = parseFloat(vm[menuKey]) || 0;
    if (qtyMenu <= 0) continue;
    const rows = receitasByProduto[menuKey] || [];
    for (const r of rows) {
      if (prodIdKey(r.componente_id) !== compKey) continue;
      total += qtyMenu * parseFloat(r.quantidade);
    }
  }
  return total;
}

/**
 * Bloco HTML stock vs Σ menus para um ingrediente (Batata, Coxa, …).
 * @param {string} receitaLabel — texto curto em «Σ menus com … na receita»
 */
function buildIrregStockVsMenusHtml({ stockRow, stockBuf, vendasBuf, receitasIrreg, prodArr, receitaLabel }) {
  const pidB = prodIdKey(stockRow.produto_id);
  const b = stockBuf[pidB] || { encontrado: 0, entrada: 0, deixado: 0 };
  const enc = parseFloat(b.encontrado);
  const ent = parseFloat(b.entrada);
  const dei = parseFloat(b.deixado);
  const encN = Number.isFinite(enc) ? enc : parseFloat(stockRow.encontrado) || 0;
  const entN = Number.isFinite(ent) ? ent : parseFloat(stockRow.entrada) || 0;
  const deiN = Number.isFinite(dei) ? dei : parseFloat(stockRow.deixado) || 0;
  const qtyStock = Math.max(0, encN + entN - deiN);
  const rbp = receitasByProdutoFromIrregBuf(receitasIrreg);
  const vm = vmFromVendasBufIrreg(vendasBuf);
  const qtyMenus = totalQtyComponenteFromMenusReceitaDirecta(vm, stockRow.produto_id, rbp, prodArr);
  const diff = qtyStock - qtyMenus;
  const um = medicaoSigla(stockRow.tipo_medicao || 'unidade');
  if (Math.abs(diff) < KG_IRREG_COMPONENTE_EPS) return '';
  const border = 'rgba(251,146,60,0.45)';
  const bg = 'rgba(251,146,60,0.1)';
  return `
    <div style="margin-top:10px;padding:8px 10px;border-radius:6px;border:1px solid ${border};background:${bg};font-size:12px;color:#cbd5e1;line-height:1.4">
      <div style="font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;color:#fb923c">${escapeHtml(stockRow.produto_nome)} (stock vs menus)</div>
      <div>Stock <span style="color:#94a3b8">(enc.+entr.−deix.)</span> <strong>${fmtNum(qtyStock)}</strong> ${um}</div>
      <div style="margin-top:4px">Σ menus com ${escapeHtml(receitaLabel)} na receita <span style="color:#64748b">(vendas × qtd. na receita)</span> <strong>${fmtNum(qtyMenus)}</strong> ${um}</div>
      <div style="margin-top:4px"><span style="color:#94a3b8">Δ</span> <strong style="color:#fb923c">${diff >= 0 ? '+' : ''}${fmtNum(diff)}</strong> ${um}</div>
    </div>`;
}

function receitasByProdutoFromIrregBuf(buf) {
  const o = {};
  if (!buf) return o;
  for (const [k, rows] of Object.entries(buf)) {
    const pid = prodIdKey(k);
    if (!pid) continue;
    if (!o[pid]) o[pid] = [];
    for (const r of rows) {
      o[pid].push({ componente_id: r.componente_id, quantidade: parseFloat(r.quantidade) });
    }
  }
  return o;
}

function vmFromVendasBufIrreg(vb) {
  const vm = {};
  for (const [k, v] of Object.entries(vb || {})) {
    const key = prodIdKey(k);
    if (key) vm[key] = parseFloat(v) || 0;
  }
  return vm;
}

/**
 * Blocos HTML de irregularidades (caixa, stock vs T. anterior, Fino barril, Batata/Coxa stock vs Σ menus).
 * Fonte única: cartão no turno (`renderIrregularidadesTurno`) e página Irregularidades (lista).
 * @param {object} p
 * @param {object} p.turno — com `stock` e `caixa` (histórico)
 * @param {object} p.stockBuf — `{ [pid]: { encontrado, entrada, deixado, fechados? } }`
 * @param {object} p.vendasBuf — quantidades por produto (copos Fino 400/1000, etc.)
 * @param {number} p.totalVendasKz — mesma soma que `getTotalVendasTurnoKz` / resumo vendas
 * @param {number} p.totalGeradoKz — TPA+transf+din (turno: inputs caixa; histórico: `turno.caixa`)
 * @param {Array} [p.produtos] — catálogo para resolver Fino 400/1000 (fallback: stock + `S.produtos`)
 * @param {object} [p.receitasIrreg] — mapa `produto_id` → [{ componente_id, quantidade }] (receitas); sem isto não há check stock vs menus
 * @returns {{ hasAny: boolean, caixaHtml: string, stockHtml: string, finoHtml: string, batataHtml: string, coxaHtml: string }}
 */
function buildIrregularidadesHtmlParts({
  turno,
  stockBuf,
  vendasBuf,
  totalVendasKz,
  totalGeradoKz,
  produtos,
  receitasIrreg
}) {
  const stock = turno?.stock || [];
  const prodArr = produtos && produtos.length ? produtos : (S.produtos || []);

  const tv = totalVendasKz;
  const tg = totalGeradoKz;
  const diffCaixa = tv - tg;
  const caixaIrreg = Math.round(tv * 100) !== Math.round(tg * 100);
  let caixaHtml = '';
  if (caixaIrreg) {
    caixaHtml = `<div style="padding:8px 10px;background:rgba(251,146,60,0.1);border-radius:6px;margin-bottom:10px;border:1px solid rgba(251,146,60,0.45);font-size:12px;color:#cbd5e1;line-height:1.4">
      <span style="color:#fb923c;font-weight:700">Caixa:</span> vendas <strong>${fmt(tv)}</strong> ≠ gerado <strong>${fmt(tg)}</strong>
      <span style="color:#94a3b8"> · Δ </span><strong style="color:#fb923c">${diffCaixa >= 0 ? '+' : ''}${fmt(diffCaixa)}</strong>
    </div>`;
  }

  let stockHtml = '';
  if (stock.length) {
    const rowsL = [];
    let temPrev = false;
    for (const s of stock) {
      const prev = s.prev_deixado;
      if (prev !== null && prev !== undefined) temPrev = true;
      const sid = prodIdKey(s.produto_id);
      const b = stockBuf[sid] || { encontrado: 0, entrada: 0, deixado: 0, fechados: 0 };
      const enc = parseFloat(b.encontrado);
      const encN = Number.isFinite(enc) ? enc : parseFloat(s.encontrado) || 0;
      const med = medicaoSigla(s.tipo_medicao || 'unidade');
      let alertEnc = false;
      let prevNum = null;
      if (prev !== null && prev !== undefined) {
        prevNum = parseFloat(prev);
        if (Math.abs(encN - prevNum) >= 0.001) alertEnc = true;
      }
      rowsL.push({ s, encN, med, alertEnc, prevNum });
    }
    if (temPrev) {
      const irr = rowsL.filter((r) => r.alertEnc);
      if (irr.length > 0) {
        const bullets = irr
          .map((r) => {
            const diff = r.encN - r.prevNum;
            const abs = Math.abs(diff);
            const tipo = diff < 0 ? 'Falta' : 'Sobra';
            return `<span style="display:inline-flex;align-items:baseline;gap:6px;padding:5px 10px;border-radius:6px;background:rgba(51,65,85,0.55);font-size:12px;line-height:1.35;max-width:100%;box-sizing:border-box">
            <span style="color:#fb923c;font-weight:700">${tipo} ${fmtNum(abs)} ${r.med}</span>
            <span style="color:#e2e8f0">${escapeHtml(r.s.produto_nome)}</span>
          </span>`;
          })
          .join('');
        stockHtml = `<div style="padding:8px 10px;background:rgba(251,146,60,0.08);border-radius:6px;margin-bottom:10px;border:1px solid rgba(251,146,60,0.32)">
        <div style="font-weight:700;color:#fb923c;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Stock (${irr.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px 10px;align-items:flex-start">${bullets}</div>
      </div>`;
      }
    }
  }

  let finoHtml = '';
  const barrilRow = stock.find((s) => prodNomeNorm(s.produto_nome) === 'fino barril');
  if (barrilRow) {
    const pidB = prodIdKey(barrilRow.produto_id);
    const b = stockBuf[pidB] || { encontrado: 0, entrada: 0, deixado: 0 };
    const enc = parseFloat(b.encontrado);
    const ent = parseFloat(b.entrada);
    const dei = parseFloat(b.deixado);
    const encN = Number.isFinite(enc) ? enc : parseFloat(barrilRow.encontrado) || 0;
    const entN = Number.isFinite(ent) ? ent : parseFloat(barrilRow.entrada) || 0;
    const deiN = Number.isFinite(dei) ? dei : parseFloat(barrilRow.deixado) || 0;
    const kgVend = Math.max(0, encN + entN - deiN);
    const coposStock = kgVend / KG_FINO_COPO;
    const id400 = resolveProdutoIdPorNomeFromLists(stock, prodArr, 'fino 400');
    const id1000 = resolveProdutoIdPorNomeFromLists(stock, prodArr, 'fino 1000');
    let v400 = 0;
    let v1000 = 0;
    if (id400) v400 = parseFloat(vendasBuf[prodIdKey(id400)]) || 0;
    if (id1000) v1000 = parseFloat(vendasBuf[prodIdKey(id1000)]) || 0;
    const coposVendas = v400 + v1000;
    const diff = coposStock - coposVendas;
    const ok = Math.abs(diff) < 0.06;
    const missing = !id400 || !id1000;
    if (!ok || missing) {
      const border = 'rgba(251,146,60,0.45)';
      const bg = 'rgba(251,146,60,0.1)';
      const lin400 = id400 ? `${fmtNum(v400)} copos` : '<span style="color:#64748b">—</span>';
      const lin1000 = id1000 ? `${fmtNum(v1000)} copos` : '<span style="color:#64748b">—</span>';
      finoHtml = `
    <div style="margin-top:10px;padding:8px 10px;border-radius:6px;border:1px solid ${border};background:${bg};font-size:12px;color:#cbd5e1;line-height:1.4">
      <div style="font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;color:#fb923c">Fino barril ↔ 400+1000</div>
      <div><span style="color:#64748b">${fmtNum(kgVend)} kg</span> → <strong>${fmtNum(coposStock)}</strong> copos <span style="color:#475569">/ ${fmtNum(KG_FINO_COPO)}</span></div>
      <div style="margin-top:4px;font-size:11px">400: ${lin400} · 1000: ${lin1000}</div>
      <div style="margin-top:4px">Σ vendas <strong>${fmtNum(coposVendas)}</strong> copos · <span style="color:#94a3b8">Δ</span> <strong style="color:#fb923c">${diff >= 0 ? '+' : ''}${fmtNum(diff)}</strong></div>
      ${missing ? '<div style="margin-top:4px;font-size:11px;color:#fbbf24">Faltam Fino 400/1000 no catálogo/stock.</div>' : ''}
    </div>`;
    }
  }

  if (stockHtml && finoHtml) {
    const stockInner = stockHtml.replace('margin-bottom:10px', 'margin-bottom:0');
    const finoInner = finoHtml.replace('margin-top:10px', 'margin-top:0');
    stockHtml = `<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:stretch;width:100%;margin-bottom:10px">
      <div style="flex:1 1 260px;min-width:0">${stockInner}</div>
      <div style="flex:1 1 260px;min-width:0">${finoInner}</div>
    </div>`;
    finoHtml = '';
  }

  let batataHtml = '';
  let coxaHtml = '';
  const temReceitas = receitasIrreg && Object.keys(receitasIrreg).length;
  if (temReceitas) {
    const batataRow = stock.find((s) => isProdutoBatataIrreg(s.produto_nome));
    if (batataRow) {
      batataHtml = buildIrregStockVsMenusHtml({
        stockRow: batataRow,
        stockBuf,
        vendasBuf,
        receitasIrreg,
        prodArr,
        receitaLabel: 'Batata'
      });
    }
    const coxaRow = stock.find((s) => isProdutoCoxaIrreg(s.produto_nome));
    if (coxaRow) {
      coxaHtml = buildIrregStockVsMenusHtml({
        stockRow: coxaRow,
        stockBuf,
        vendasBuf,
        receitasIrreg,
        prodArr,
        receitaLabel: 'Coxa'
      });
    }
  }

  const hasAny = !!(caixaHtml || stockHtml || finoHtml || batataHtml || coxaHtml);
  return { hasAny, caixaHtml, stockHtml, finoHtml, batataHtml, coxaHtml };
}

/**
 * Mesma lógica que o cartão Irregularidades no turno (sem DOM): constrói buffers a partir de
 * `vendasRows` + catálogo e delega em `buildIrregularidadesHtmlParts`.
 * @returns {{ hasAny: boolean, caixaHtml: string, stockHtml: string, finoHtml: string, batataHtml: string, coxaHtml: string }}
 */
function computeIrregularidadesSnapshot(turno, vendasRows, produtos, receitas) {
  const stock = turno.stock || [];
  const stockBufL = {};
  stock.forEach((s) => {
    const sid = prodIdKey(s.produto_id);
    if (!sid) return;
    stockBufL[sid] = {
      encontrado: parseFloat(s.encontrado) || 0,
      entrada: parseFloat(s.entrada) || 0,
      deixado: parseFloat(s.deixado) || 0,
      fechados: parseFloat(s.fechados) || 0
    };
  });
  const vendasBufL = {};
  const vendasProdNomesL = {};
  produtos.forEach((p) => {
    const id = prodIdKey(p.id);
    if (id) vendasProdNomesL[id] = p.nome;
  });
  (vendasRows || []).forEach((v) => {
    const pid = prodIdKey(v.produto_id);
    if (!pid) return;
    vendasBufL[pid] = parseFloat(v.quantidade) || 0;
    if (v.produto_nome) vendasProdNomesL[pid] = v.produto_nome;
  });
  const receitasBufL = {};
  (receitas || []).forEach((r) => {
    const mk = prodIdKey(r.produto_id);
    if (!mk) return;
    if (!receitasBufL[mk]) receitasBufL[mk] = [];
    receitasBufL[mk].push({ componente_id: r.componente_id, quantidade: parseFloat(r.quantidade) });
  });
  const menuProds = produtos.filter((p) => p.categoria === 'menu');
  const bebidaProds = produtos.filter((p) => p.categoria === 'bebida').filter((p) => !isFinoBarrilNome(p.nome));
  const avulsoProds = produtos.filter((p) => p.venda_avulso && p.categoria !== 'menu' && p.categoria !== 'bebida');
  const menuProdIdsL = menuProds.map((p) => p.id);
  const avulsoProdIdsL = avulsoProds.map((p) => p.id);
  const vendasProdPrecosL = {};
  [...menuProds, ...avulsoProds, ...bebidaProds].forEach((p) => {
    vendasProdPrecosL[p.id] = parseFloat(p.preco) || 0;
  });
  (vendasRows || []).forEach((v) => {
    const pid = prodIdKey(v.produto_id);
    if (!pid || v.preco == null || v.preco === '') return;
    const u = parseFloat(v.preco) || 0;
    vendasProdPrecosL[pid] = u;
    vendasProdPrecosL[v.produto_id] = u;
  });
  const bebidaCopoProds = bebidaProds.filter((p) => p.venda_por_copo && parseFloat(p.kg_por_copo) > 0);
  const bebidaOutras = bebidaProds.filter((p) => !p.venda_por_copo || !(parseFloat(p.kg_por_copo) > 0));
  const bebidaCopoProdIdsL = bebidaCopoProds.map((p) => prodIdKey(p.id)).filter(Boolean);
  const bebidaCopoCfgL = {};
  bebidaCopoProds.forEach((p) => {
    const pid = prodIdKey(p.id);
    if (!pid) return;
    const nomeJoin = vendasProdNomesL[pid];
    bebidaCopoCfgL[pid] = {
      nome: nomeVendaBebidaLegivel(pid, nomeJoin || p.nome),
      kgPorCopo: parseFloat(p.kg_por_copo) || 0,
      preco: parseFloat(p.preco) || 0,
      qtdPacote: parseInt(p.qtd_copos_pacote, 10) || 0,
      precoPacote: parseFloat(p.preco_copos_pacote) || 0
    };
  });
  for (const v of vendasRows || []) {
    const isCopo = !!v.venda_por_copo && parseFloat(v.kg_por_copo) > 0;
    if (!isCopo) continue;
    if (isFinoBarrilNome(v.produto_nome)) continue;
    const pid = prodIdKey(v.produto_id);
    if (!pid) continue;
    if (!bebidaCopoCfgL[pid]) {
      bebidaCopoCfgL[pid] = {
        nome: nomeVendaBebidaLegivel(pid, v.produto_nome),
        kgPorCopo: parseFloat(v.kg_por_copo) || 0,
        preco: 0,
        qtdPacote: 0,
        precoPacote: 0
      };
    }
    bebidaCopoCfgL[pid].preco = parseFloat(v.preco) || 0;
    bebidaCopoCfgL[pid].qtdPacote = parseInt(v.qtd_copos_pacote, 10) || 0;
    bebidaCopoCfgL[pid].precoPacote = parseFloat(v.preco_copos_pacote) || 0;
    if (!bebidaCopoProdIdsL.includes(pid)) bebidaCopoProdIdsL.push(pid);
  }
  const bebidaCopoProdIdSet = new Set(bebidaCopoProdIdsL);
  function getStockLineL(pid) {
    const k = prodIdKey(pid);
    if (!k) return { encontrado: 0, entrada: 0, deixado: 0, fechados: 0 };
    if (stockBufL[k] != null) return stockBufL[k];
    const row = stock.find((s) => prodIdKey(s.produto_id) === k);
    if (row) {
      return {
        encontrado: parseFloat(row.encontrado) || 0,
        entrada: parseFloat(row.entrada) || 0,
        deixado: parseFloat(row.deixado) || 0,
        fechados: parseFloat(row.fechados) || 0
      };
    }
    return { encontrado: 0, entrada: 0, deixado: 0, fechados: 0 };
  }
  function calcMenuQtyL(prodId) {
    const recipe = receitasBufL[prodIdKey(prodId)] || [];
    if (!recipe.length) return null;
    let min = Infinity;
    for (const comp of recipe) {
      const b = stockBufL[prodIdKey(comp.componente_id)] || { encontrado: 0, entrada: 0, deixado: 0 };
      const vendido = Math.max(0, b.encontrado + b.entrada - b.deixado);
      min = Math.min(min, vendido / parseFloat(comp.quantidade));
    }
    return min === Infinity ? 0 : Math.floor(min);
  }
  function calcStandaloneQtyL(prodId) {
    const pk = prodIdKey(prodId);
    const b = stockBufL[pk] || { encontrado: 0, entrada: 0, deixado: 0 };
    const total = Math.max(0, b.encontrado + b.entrada - b.deixado);
    let comboUsage = 0;
    for (const [menuProdId, recipe] of Object.entries(receitasBufL)) {
      const comp = recipe.find((r) => prodIdKey(r.componente_id) === pk);
      if (comp) comboUsage += (calcMenuQtyL(menuProdId) || 0) * comp.quantidade;
    }
    return Math.max(0, total - comboUsage);
  }
  function totalVendasKzL() {
    let total = 0;
    for (const prodId of menuProdIdsL) {
      const k = prodIdKey(prodId);
      total += (vendasBufL[k] || 0) * (vendasProdPrecosL[prodId] || 0);
    }
    for (const prodId of avulsoProdIdsL) {
      total += calcStandaloneQtyL(prodId) * (vendasProdPrecosL[prodId] || 0);
    }
    for (const prodId of bebidaCopoProdIdsL) {
      const cfg = bebidaCopoCfgL[prodId];
      if (!cfg) continue;
      const copos = vendasBufL[prodId] || 0;
      total += precoVendaCopos(copos, cfg.preco, cfg.qtdPacote, cfg.precoPacote);
    }
    for (const s of stock) {
      if (s.categoria !== 'bebida') continue;
      const pid = prodIdKey(s.produto_id);
      if (!pid) continue;
      if (isFinoBarrilNome(s.produto_nome)) continue;
      if (isFinoBarrilNome(vendasProdNomesL[pid])) continue;
      if (bebidaCopoProdIdSet.has(pid)) continue;
      const b = getStockLineL(pid);
      let vend = Math.max(0, b.encontrado + b.entrada - b.deixado);
      if (vend <= 0 && parseFloat(s.vendido) > 0) vend = Math.max(0, parseFloat(s.vendido));
      if (vend <= 0) continue;
      const valSnap = s.valor != null && s.valor !== '' ? parseFloat(s.valor) : NaN;
      if (!Number.isNaN(valSnap)) {
        total += valSnap;
      } else {
        let unit = parseFloat(s.preco) || 0;
        if (!unit) unit = parseFloat(vendasProdPrecosL[s.produto_id]) || parseFloat(vendasProdPrecosL[pid]) || 0;
        total += vend * unit;
      }
    }
    return total;
  }
  const caixa = turno.caixa || {};
  const tg = parseFloat(caixa.tpa || 0) + parseFloat(caixa.transferencia || 0) + parseFloat(caixa.dinheiro || 0);
  const tv = totalVendasKzL();
  return buildIrregularidadesHtmlParts({
    turno,
    stockBuf: stockBufL,
    vendasBuf: vendasBufL,
    totalVendasKz: tv,
    totalGeradoKz: tg,
    produtos,
    receitasIrreg: receitasBufL
  });
}

async function guardarStock(turnoId) {
  try {
    turnoMsgPending('A guardar…');
    const proms = Object.entries(stockBuf).map(([pid, v]) =>
      api('PUT', `/turnos/${turnoId}/stock`, {
        produto_id: pid,
        encontrado: v.encontrado,
        deixado: v.deixado,
        fechados: v.fechados
      })
    );
    await Promise.all(proms);
    turnoMsgOk('Guardado');
    setTimeout(() => turnoMsgIdle(), 1600);
  } catch(e) { turnoMsgErr(e.message); }
}

let autoSaveCaixaTimer = null;
function calcCaixa() {
  const tpa   = parseFloat(document.getElementById('c-tpa')?.value)||0;
  const transf= parseFloat(document.getElementById('c-transf')?.value)||0;
  const din   = parseFloat(document.getElementById('c-din')?.value)||0;
  const saida = parseFloat(document.getElementById('c-saida')?.value)||0;
  const tg = tpa + transf + din;
  const tf = tg - saida;
  const elTG = document.getElementById('c-total-gerado');
  const elTF = document.getElementById('c-total-final');
  if (elTG) elTG.textContent = fmtKzOrEmpty(tg);
  if (elTF) elTF.textContent = fmtKzOrEmpty(tf);
  renderIrregularidadesTurno();
  // Auto-save
  const turnoId = S.turnoData?.id;
  if (!turnoId) return;
  turnoMsgPending('A guardar…');
  clearTimeout(autoSaveCaixaTimer);
  autoSaveCaixaTimer = setTimeout(() => guardarCaixa(turnoId), 2000);
}

async function switchTurnoTab(name, btn) {
  document.querySelectorAll('.turno-tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.turno-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
  btn.classList.add('active');
  if (name === 'escala') {
    await loadEscalaTurno();
  }
  if (name === 'stock') {
    const tid = S.turnoData?.id;
    const stock = S.turnoData?.stock || [];
    if (tid) await loadRegistosMovimentosSection(tid, stock, !!S.turnoCanEdit);
  }
  if (name === 'vendas') {
    const tid = S.turnoData?.id;
    if (tid) await loadVendasMenu(tid, !!S.turnoCanEdit);
  }
  if (name === 'registos') {
    const tid = S.turnoData?.id;
    if (tid) await loadTurnoResumoTab(tid);
    renderIrregularidadesTurno();
  }
}

function clearStockCaixaValidationHighlight() {
  document.querySelectorAll('.stock-caixa-required-missing').forEach((el) =>
    el.classList.remove('stock-caixa-required-missing')
  );
}

function collectMissingStockCaixaObrigatorio() {
  const missing = [];
  document.querySelectorAll('input[data-stock-req="1"]').forEach((el) => {
    if (el.disabled) return;
    if (String(el.value).trim() === '') missing.push(el);
  });
  document.querySelectorAll('input[data-caixa-req="1"]').forEach((el) => {
    if (el.disabled) return;
    if (String(el.value).trim() === '') missing.push(el);
  });
  return missing;
}

async function focusTurnoFieldParaValidacao(el) {
  if (!el) return;
  const panel = el.closest('.turno-tab-panel');
  const tabId = panel && panel.id;
  const name =
    tabId === 'tab-stock' ? 'stock' : tabId === 'tab-registos' ? 'registos' : null;
  if (name) {
    const btn = document.querySelector('.turno-tab[data-turno-tab="' + name + '"]');
    if (btn) await switchTurnoTab(name, btn);
  }
  requestAnimationFrame(() => {
    el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    try {
      el.focus();
    } catch (_) {}
  });
}

async function fecharTurno(ev, id) {
  clearStockCaixaValidationHighlight();
  document.querySelectorAll('input[data-stock-req="1"][type="number"]').forEach((el) => {
    if (!el.disabled) stockNumberInputBlur(el);
  });
  const missing = collectMissingStockCaixaObrigatorio();
  if (missing.length) {
    missing.forEach((el) => el.classList.add('stock-caixa-required-missing'));
    turnoMsgErr(
      'Preenche todos os campos obrigatórios: em Stock (Encontrado e Deixado de cada produto) e em Caixa (TPA, Transferência e Dinheiro). Podes usar 0 quando for o caso.'
    );
    await focusTurnoFieldParaValidacao(missing[0]);
    return;
  }
  if (!confirm('Fechar este turno? Não poderá ser editado depois.')) return;
  await runAction(ev, async () => {
    try {
      await guardarStock(id);
      await guardarCaixa(id);
      await api('POST', `/turnos/${id}/fechar`);
      clearStockCaixaValidationHighlight();
      await loadTurno();
    } catch (e) {
      turnoMsgErr(e.message);
    }
  });
}

async function reabrirTurno(ev, id) {
  if (!confirm('Reabrir este turno? Voltará a poder editar stock, caixa e registos. Usar só para corrigir erros.')) return;
  await runAction(ev, async () => {
    try {
      await api('POST', `/turnos/${id}/reabrir`);
      turnoMsgOk('Turno reaberto.');
      setTimeout(() => turnoMsgIdle(), 2200);
      await loadTurno();
    } catch (e) {
      turnoMsgErr(e.message);
    }
  });
}
